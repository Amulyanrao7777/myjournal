function EntryRowMenu({ anchorEl, entry, onClose, onEdit, onPin, onArchive, onDelete }) {
  const [pos, setPos] = React.useState({ top:0, left:0 });
  const menuRef = React.useRef(null);

  React.useEffect(() => {
    if (!anchorEl) return;
    const rect = anchorEl.getBoundingClientRect();
    const menuWidth = 172;
    let left = rect.right - menuWidth;
    if (left < 8) left = 8;
    let top = rect.bottom + 4;
    // flip up if near bottom of viewport
    if (top + 160 > window.innerHeight - 12) top = rect.top - 164;
    setPos({ top: top + window.scrollY, left });
  }, [anchorEl]);

  React.useEffect(() => {
    const close = (e) => {
      // Don't close if clicking the trigger button or inside the menu itself
      if (anchorEl && anchorEl.contains(e.target)) return;
      if (menuRef.current && menuRef.current.contains(e.target)) return;
      onClose();
    };
    // Use mousedown so we catch it before click fires on underlying row
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [anchorEl, onClose]);

  const handleAction = (e, action) => {
    e.stopPropagation();
    e.preventDefault();
    onClose();
    // Defer action so row's click handler sees menu is gone
    setTimeout(() => action(), 0);
  };

  const items = [
    { label:"edit", action: onEdit },
    { label: entry.pinned ? "unpin" : "pin", action: onPin },
    { label: entry.archived ? "unarchive" : "archive", action: onArchive },
    { label:"delete", action: onDelete, danger: true },
  ];

  return ReactDOM.createPortal(
    <div
      ref={menuRef}
      className="fade-in"
      style={{
        position:"absolute", top: pos.top, left: pos.left,
        zIndex:99999, width:172,
        background:"var(--page)", border:"1px solid var(--rule)",
        borderRadius:10, padding:"4px 0",
        boxShadow:"0 8px 28px rgba(43,32,22,0.16)",
      }}
      onMouseDown={e=>e.stopPropagation()}
    >
      {items.map((item, i) => (
        <button key={i}
          onMouseDown={e=>handleAction(e, item.action)}
          style={{ width:"100%", textAlign:"left", padding:"9px 16px", background:"none", border:"none",
            fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.04em",
            color: item.danger ? "#b85030" : "var(--ink-soft)", cursor:"pointer" }}
          onMouseEnter={e=>e.currentTarget.style.background="var(--page-warm)"}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          {item.label}
        </button>
      ))}
    </div>,
    document.body
  );
}

function EntryRow({ entry, allEntries, onOpen, onPin, onEdit, onArchive, onDelete, delay }) {
  const label = entryLabel(entry, allEntries);
  const mood = entry.mood;
  const preview = (entry.shaped || entry.raw || "").replace(/\*/g,"").split("\n\n")[0].slice(0,120);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const btnRef = React.useRef(null);
  const menuJustClosedRef = React.useRef(false);

  const handleRowClick = (e) => {
    if (menuJustClosedRef.current) { menuJustClosedRef.current = false; return; }
    if (menuOpen) return;
    onOpen();
  };

  const handleMenuClose = () => {
    menuJustClosedRef.current = true;
    setMenuOpen(false);
    setTimeout(() => { menuJustClosedRef.current = false; }, 200);
  };

  return (
    <div onClick={handleRowClick} className="fade-in" style={{ padding:"18px 0", borderBottom:`1px solid var(--rule)`, cursor:"pointer", animationDelay:`${delay}ms`, position:"relative" }}
      onMouseEnter={e=>e.currentTarget.style.opacity="0.7"}
      onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.12em", color:"var(--ink-faint)", textTransform:"uppercase" }}>{label}</div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          {entry.locked && <span style={{ fontSize:10, color:"var(--ink-ghost)", letterSpacing:"0.06em", fontFamily:"'Cormorant Garamond',serif" }}>locked</span>}
          {entry.archived && <span style={{ fontSize:10, color:"var(--ink-ghost)", letterSpacing:"0.06em", fontFamily:"'Cormorant Garamond',serif" }}>archived</span>}
          {entry.pinned && <span style={{ fontSize:10, color:"var(--accent)" }}>✦</span>}
          {mood && <div style={{ fontSize:10, letterSpacing:"0.14em", color:MOOD_COLORS[mood]||"var(--ink-faint)", textTransform:"uppercase", fontFamily:"'Cormorant Garamond',serif", border:`1px solid ${MOOD_COLORS[mood]||"var(--rule)"}`, borderRadius:10, padding:"2px 8px" }}>{mood}</div>}
          <button
            ref={btnRef}
            onClick={e=>{ e.stopPropagation(); setMenuOpen(o=>!o); }}
            title="options"
            style={{ background:"none", border:"none", padding:"2px 8px", cursor:"pointer", fontSize:18, color:"var(--ink-ghost)", lineHeight:1, letterSpacing:"0.12em", borderRadius:4, transition:"color 0.15s" }}
            onMouseEnter={e=>e.currentTarget.style.color="var(--ink-soft)"}
            onMouseLeave={e=>e.currentTarget.style.color="var(--ink-ghost)"}>
            ···
          </button>
        </div>
      </div>
      {entry.heading && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:17, color:"var(--ink)", fontStyle:"italic", marginBottom:4, lineHeight:1.3 }}>{entry.heading}</div>}
      {!entry.locked && preview && <div style={{ fontFamily:"'Lora',serif", fontSize:13, color:"var(--ink-soft)", lineHeight:1.6, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{preview}{preview.length===120?"…":""}</div>}
      {entry.locked && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-ghost)", fontStyle:"italic" }}>— locked —</div>}

      {menuOpen && (
        <EntryRowMenu
          anchorEl={btnRef.current}
          entry={entry}
          onClose={handleMenuClose}
          onEdit={onEdit}
          onPin={()=>onPin(entry.id)}
          onArchive={()=>onArchive(entry.id)}
          onDelete={()=>onDelete(entry.id)}
        />
      )}
    </div>
  );
}

// ─── WRITE VIEW ───────────────────────────────────────────────────────────────
function WriteView({ allEntries, editEntry, onSave, onCancel, showBanner, speechLang }) {
  speechLang = speechLang || "en-US";
  const [raw, setRaw]           = useState(() => {
    if (editEntry) return editEntry.raw || "";
    try { const d = JSON.parse(localStorage.getItem(DRAFT_KEY)||"null"); return d?.raw || ""; } catch { return ""; }
  });
  const [shaped, setShaped]     = useState(editEntry?.shaped || "");
  const [heading, setHeading]   = useState(() => {
    if (editEntry) return editEntry.heading || "";
    try { const d = JSON.parse(localStorage.getItem(DRAFT_KEY)||"null"); return d?.heading || ""; } catch { return ""; }
  });
  const [mood, setMood]         = useState(() => {
    if (editEntry) return editEntry.mood || "";
    try { const d = JSON.parse(localStorage.getItem(DRAFT_KEY)||"null"); return d?.mood || ""; } catch { return ""; }
  });
  const [attachedImage, setAttachedImage] = useState(editEntry?.attachedImage || null);
  const [attachedImageKey, setAttachedImageKey] = useState(editEntry?.attachedImageKey || null);
  const [mode, setMode]         = useState(editEntry && editEntry.shaped ? "shaped" : "raw");
  const [shaping, setShaping]   = useState(false);
  const [tags, setTags]         = useState(editEntry?.tags || []);
  const [customTags, setCustomTags] = useState(() => { try { return JSON.parse(localStorage.getItem("myjournal_custom_tags_v1")||"[]"); } catch { return []; } });
  const [people, setPeople]     = useState(editEntry?.people || []);
  const [location, setLocation] = useState(editEntry?.location || null);
  const [sealUntil, setSealUntil] = useState(editEntry?.sealUntil || null);
  const [showHandwriting, setShowHandwriting] = useState(false);
  const [showPrompts, setShowPrompts] = useState(false);
  const [listening, setListening] = useState(false);
  const [speechAvail, setSpeechAvail] = useState(false);
  const [speechError, setSpeechError] = useState("");
  const [interimText, setInterimText] = useState("");
  const [draftSaved, setDraftSaved] = useState(false);
  const imgInputRef = useRef(null);

  const recRef = useRef(null);
  const textareaRef = useRef(null);
  const rawRef = useRef(raw);
  const listeningRef = useRef(false);
  useEffect(() => { rawRef.current = raw; }, [raw]);
  useEffect(() => { listeningRef.current = listening; }, [listening]);

  useEffect(() => { setSpeechAvail(!!(window.SpeechRecognition || window.webkitSpeechRecognition)); }, []);

  // Auto-grow textarea
  useEffect(() => {
    if (textareaRef.current) {
      textareaRef.current.style.height = "auto";
      textareaRef.current.style.height = textareaRef.current.scrollHeight + "px";
    }
  }, [raw, shaped]);

  // Auto-save draft (new entries only)
  useEffect(() => {
    if (editEntry) return; // don't overwrite drafts for edits
    if (!raw.trim() && !heading.trim()) return;
    const t = setTimeout(() => {
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify({ raw, heading, mood, savedAt: Date.now() }));
        setDraftSaved(true);
        setTimeout(() => setDraftSaved(false), 1500);
      } catch {}
    }, 800);
    return () => clearTimeout(t);
  }, [raw, heading, mood]);

  const clearDraft = () => { try { localStorage.removeItem(DRAFT_KEY); } catch {} };

  const handleImageAttach = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { showBanner("please attach an image file", 2000); return; }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      // Store in IndexedDB to avoid localStorage 5MB limit; keep a reference key on the entry
      try {
        const key = await saveImageIDB(dataUrl, `entry_img_${Date.now()}`);
        // We still keep the dataUrl in state for display; the key is embedded so sync/export can reference it
        setAttachedImage(dataUrl);
        setAttachedImageKey(key);
      } catch {
        // Fallback: just use dataUrl inline (may hit storage limits but doesn't crash)
        setAttachedImage(dataUrl);
      }
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const startListening = () => {
    setSpeechError("");
    const rec = getSpeechRecognition(speechLang);
    if (!rec) { setSpeechError("Voice not supported in this browser. Try Chrome."); return; }
    recRef.current = rec;
    let finalSoFar = rawRef.current;

    rec.onstart = () => { setListening(true); listeningRef.current = true; };

    rec.onresult = (event) => {
      let interim = "";
      let newFinal = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) newFinal += transcript + " ";
        else interim += transcript;
      }
      if (newFinal) {
        finalSoFar = (finalSoFar + (finalSoFar.endsWith(" ") || !finalSoFar ? "" : " ") + newFinal).trim();
        setRaw(finalSoFar);
      }
      setInterimText(interim);
    };

    rec.onerror = (event) => {
      const msgs = {
        "not-allowed": "Microphone access denied. Please allow mic access in your browser.",
        "no-speech": "No speech detected — tap mic again when ready.",
        "audio-capture": "No microphone found.",
        "network": "Network error during voice recognition.",
        "aborted": "",
      };
      const msg = msgs[event.error] || `Voice error: ${event.error}`;
      if (msg) setSpeechError(msg);
      setListening(false); listeningRef.current = false; setInterimText("");
    };

    rec.onend = () => {
      setInterimText("");
      // Auto-restart on desktop only — mobile re-transcribes buffered audio causing duplication
      const isMobile = navigator.maxTouchPoints > 1;
      if (listeningRef.current && !isMobile) {
        try { rec.start(); } catch { setListening(false); listeningRef.current = false; }
      } else {
        setListening(false); listeningRef.current = false;
      }
    };

    try { rec.start(); }
    catch(err) { setSpeechError("Could not start microphone: " + err.message); setListening(false); }
  };

  const stopListening = () => {
    listeningRef.current = false;
    try { recRef.current?.stop(); } catch {}
    setListening(false); setInterimText("");
  };

  const toggleListening = () => { listening ? stopListening() : startListening(); };

  const handleShape = async () => {
    const text = raw.trim();
    if (!text) { showBanner("write something first", 2000); return; }
    setShaping(true);
    try {
      const result = await shapeEntry(text);
      setShaped(result.shaped);
      setHeading(result.heading);
      setMood(result.mood);
      setMode("shaped");
    } catch(err) {
      showBanner(err.message || "something went wrong — try again", 3500);
    } finally { setShaping(false); }
  };

  const handleSave = () => {
    const content = mode === "shaped" ? shaped : raw;
    if (!content.trim()) { showBanner("nothing to save", 2000); return; }
    if (listening) stopListening();
    const now = Date.now();
    // Save custom tags
    try { localStorage.setItem("myjournal_custom_tags_v1", JSON.stringify(customTags)); } catch {}
    const entry = {
      id: editEntry?.id || ("j_" + now + "_" + Math.random().toString(36).slice(2,8)),
      createdAt: editEntry?.createdAt || now,
      updatedAt: now,
      raw: raw.trim(),
      shaped: mode === "shaped" ? (shaped.trim() || undefined) : undefined,
      heading: heading.trim() || undefined,
      mood: mood || undefined,
      attachedImage: attachedImage || undefined,
      attachedImageKey: attachedImageKey || undefined,
      tags: tags.length ? tags : undefined,
      people: people.length ? people : undefined,
      location: location || undefined,
      sealUntil: sealUntil || undefined,
    };
    clearDraft();
    onSave(entry);
  };

  // Keyboard shortcuts: Cmd/Ctrl+S to save, Esc to go back
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "s") {
        e.preventDefault();
        handleSave();
      } else if (e.key === "Escape") {
        if (listening) stopListening();
        onCancel();
      }
    };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [raw, shaped, mode, heading, mood, attachedImage, listening]);

  const charCount = (mode === "shaped" ? shaped : raw).length;
  const wordCount = (mode === "shaped" ? shaped : raw).trim().split(/\s+/).filter(Boolean).length;

  return (
    <div className="fade-in" style={{ maxWidth:620, margin:"0 auto", padding:"28px 18px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:28 }}>
        <button onClick={()=>{ if(listening) stopListening(); onCancel(); }} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", padding:0 }}>← back</button>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          {draftSaved && !editEntry && <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-ghost)", fontStyle:"italic", letterSpacing:"0.06em" }}>draft saved</span>}
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase" }}>
            {formatDate(editEntry?.createdAt || Date.now())}
          </div>
        </div>
      </div>

      {/* Mode toggle */}
      {shaped && (
        <div style={{ display:"flex", gap:0, marginBottom:20, border:`1px solid var(--rule)`, borderRadius:10, overflow:"hidden", background:"var(--page-warm)" }}>
          {[["raw","your words"],["shaped","shaped"]].map(([m,label]) => (
            <button key={m} onClick={()=>setMode(m)} style={{ flex:1, padding:"9px 0", background: mode===m ? "var(--ink)" : "transparent", color: mode===m ? "var(--page)" : "var(--ink-soft)", border:"none", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.08em" }}>{label}</button>
          ))}
        </div>
      )}

      {/* Heading field (always visible) */}
      {(
        <div style={{ marginBottom:14 }}>
          <input value={heading} onChange={e=>setHeading(e.target.value)} placeholder="heading…"
            style={{ width:"100%", background:"transparent", border:"none", borderBottom:`1px solid var(--rule)`, padding:"8px 0", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:20, color:"var(--ink-soft)", letterSpacing:"0.03em" }}/>
        </div>
      )}

      {/* Mood (always visible) */}
      {(
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:18 }}>
          {Object.keys(MOOD_COLORS).map(m => (
            <button key={m} onClick={()=>setMood(mood===m?"":m)} style={{ padding:"3px 12px", borderRadius:20, border:`1px solid ${mood===m ? MOOD_COLORS[m] : "var(--rule)"}`, background: mood===m ? MOOD_COLORS[m]+"22" : "transparent", color: mood===m ? MOOD_COLORS[m] : "var(--ink-faint)", fontSize:11, letterSpacing:"0.1em", fontFamily:"'Cormorant Garamond',serif", cursor:"pointer", textTransform:"uppercase" }}>{m}</button>
          ))}
        </div>
      )}

      {/* Main textarea */}
      <div style={{ position:"relative", background:"var(--page)", borderRadius:12, border:`1px solid var(--rule)`, padding:"20px 20px 56px", boxShadow:"0 2px 12px rgba(43,32,22,0.06)" }}>
        {/* Ruled lines bg */}
        <div style={{ position:"absolute", inset:0, backgroundImage:"repeating-linear-gradient(to bottom,transparent 0px,transparent 27px,var(--rule) 27px,var(--rule) 28px)", backgroundPosition:"0 52px", opacity:0.4, borderRadius:12, pointerEvents:"none" }}/>
        <textarea
          ref={textareaRef}
          value={(mode === "shaped" ? shaped : raw) + (interimText ? " " + interimText : "")}
          onChange={e => { if (mode==="shaped") setShaped(e.target.value); else setRaw(e.target.value); }}
          placeholder={mode==="shaped" ? "edit your entry…" : listening ? "listening… speak freely" : "write, or tap the mic to speak…"}
          style={{ position:"relative", zIndex:1, width:"100%", minHeight:280, background:"transparent", border:"none", fontFamily:"'Lora',Georgia,serif", fontSize:16, lineHeight:"28px", color: interimText && mode==="raw" ? undefined : "var(--ink)", padding:0, letterSpacing:"0.01em" }}
        />
        {interimText && mode==="raw" && (
          <div style={{ position:"absolute", bottom:60, right:20, fontSize:11, color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic" }}>speaking…</div>
        )}
        <div style={{ position:"absolute", bottom:14, right:16, fontSize:11, color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif" }}>
          {wordCount} {wordCount===1?"word":"words"}
        </div>
      </div>

      {/* Speech error */}
      {speechError && (
        <div style={{ marginTop:10, padding:"8px 14px", background:"#b8503018", border:"1px solid #b8503044", borderRadius:8, fontSize:12, color:"#b85030", fontFamily:"'Cormorant Garamond',serif" }}>
          {speechError}
          <button onClick={()=>setSpeechError("")} style={{ float:"right", background:"none", border:"none", color:"#b85030", cursor:"pointer", fontSize:16 }}>×</button>
        </div>
      )}

      {/* Image attachment */}
      <div style={{ marginTop:12 }}>
        {attachedImage ? (
          <div style={{ position:"relative", display:"inline-block" }}>
            <img src={attachedImage} alt="attached" style={{ maxWidth:"100%", maxHeight:220, borderRadius:10, border:`1px solid var(--rule)`, display:"block" }}/>
            <button onClick={()=>setAttachedImage(null)} style={{ position:"absolute", top:6, right:6, background:"rgba(43,32,22,0.65)", border:"none", borderRadius:"50%", width:22, height:22, color:"#faf7f2", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1 }}>×</button>
          </div>
        ) : (
          <>
            <input ref={imgInputRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleImageAttach}/>
            <button onClick={()=>imgInputRef.current?.click()} style={{ background:"none", border:"none", padding:0, cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-ghost)", letterSpacing:"0.06em", display:"flex", alignItems:"center", gap:5 }}>
              <span style={{ fontSize:14 }}>⌼</span> attach image
            </button>
          </>
        )}
      </div>

      {/* Tags */}
      <div style={{ marginTop:16 }}>
        <TagPlatter selected={tags} onChange={setTags} customTags={customTags} onCustomTagsChange={setCustomTags}/>
      </div>

      {/* People & Places */}
      <div style={{ marginTop:4 }}>
        <PeoplePlacesTagger people={people} onPeopleChange={setPeople} location={location} onLocationChange={setLocation} allEntries={allEntries}/>
      </div>

      {/* Time Capsule */}
      <div style={{ marginTop:12 }}>
        <TimeCapsulePicker sealUntil={sealUntil} onChange={setSealUntil}/>
      </div>

      {/* Handwriting modal */}
      {showHandwriting && (
        <HandwritingCanvas
          onTranscribe={(text) => { if (mode==="shaped") setShaped(p => p + (p.trim() ? "\n\n" : "") + text); else setRaw(p => p + (p.trim() ? "\n\n" : "") + text); }}
          onClose={()=>setShowHandwriting(false)}
          showBanner={showBanner}
        />
      )}

      {/* Prompts drawer */}
      {showPrompts && (
        <PromptDrawer
          entryText={raw}
          onUse={(p) => { setRaw(prev => prev + (prev.trim() ? "\n\n" : "") + p + "\n"); }}
          onClose={()=>setShowPrompts(false)}
          showBanner={showBanner}
        />
      )}

      {/* Actions */}
      <div style={{ display:"flex", gap:10, marginTop:16, alignItems:"center", flexWrap:"wrap" }}>
        {/* Prompts + Handwriting */}
        <button onClick={()=>setShowPrompts(true)} title="writing prompts" style={{ padding:"10px 14px", borderRadius:10, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, cursor:"pointer", flexShrink:0 }}>✦ prompts</button>
        <button onClick={()=>setShowHandwriting(true)} title="write by hand" style={{ padding:"10px 14px", borderRadius:10, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, cursor:"pointer", flexShrink:0 }}>✍ handwrite</button>
      </div>
      <div style={{ display:"flex", gap:10, marginTop:10, alignItems:"center" }}>
        {/* Mic button */}
        {speechAvail && mode === "raw" && (
          <button onClick={toggleListening} className={listening ? "mic-recording" : ""} style={{ width:46, height:46, borderRadius:"50%", border: `2px solid ${listening ? "#b85030" : "var(--rule)"}`, background: listening ? "#b8503018" : "var(--page-warm)", cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.2s" }} title={listening ? "stop recording" : "speak your entry"}>
            {listening ? "◼" : "🎙"}
          </button>
        )}

        {/* Shape button (only in raw mode with content) */}
        {mode === "raw" && raw.trim() && !shaping && (
          <button onClick={handleShape} style={{ flex:1, padding:"12px 0", borderRadius:10, border:`1px solid var(--accent)`, background:"transparent", color:"var(--accent)", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.08em", cursor:"pointer" }}>
            shape with Claude ✦
          </button>
        )}
        {shaping && (
          <div style={{ flex:1, padding:"12px 0", textAlign:"center", fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-faint)", fontStyle:"italic" }}>shaping your words…</div>
        )}

        {/* Save */}
        <button onClick={handleSave} disabled={!(mode==="shaped" ? shaped : raw).trim()} style={{ flex: mode==="raw" && raw.trim() ? 0 : 1, padding:"12px 20px", borderRadius:10, border:"none", background: (mode==="shaped" ? shaped : raw).trim() ? "var(--ink)" : "var(--rule)", color: (mode==="shaped" ? shaped : raw).trim() ? "var(--page)" : "var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.08em", cursor:(mode==="shaped" ? shaped : raw).trim() ? "pointer" : "default", flexShrink:0, transition:"all 0.2s" }}>
          save entry
        </button>
      </div>

      {!speechAvail && (
        <div style={{ marginTop:12, fontSize:12, color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", textAlign:"center" }}>
          voice input requires Chrome or Safari
        </div>
      )}
      <div style={{ marginTop:10, fontSize:11, color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", textAlign:"center", letterSpacing:"0.06em" }}>
        ⌘S save · Esc back
      </div>
    </div>
  );
}

// ─── ENTRY VIEW ───────────────────────────────────────────────────────────────
function EntryView({ entry, allEntries, lockConfig, signature, syncConfig, onSave, onBack, onDelete, onExport, onEdit, onPin, onToggleLock, onThread, onSaveWitness, speechLang }) {
  speechLang = speechLang || "en-US";
  const [showWitness, setShowWitness] = React.useState(false);
  const [lightboxOpen, setLightboxOpen] = React.useState(false);
  const label = entryLabel(entry, allEntries);
  const content = entry.shaped || entry.raw || "";
  const paragraphs = content.split(/\n\n+/).filter(p => p.trim());
  const [unlockInput, setUnlockInput] = React.useState("");
  const [unlockError, setUnlockError] = React.useState(false);
  const [entryUnlocked, setEntryUnlocked] = React.useState(!entry.locked);
  React.useEffect(() => { setEntryUnlocked(!entry.locked); }, [entry.id]);

  // If this entry has a local image key but no cloud URL yet (e.g. device A never
  // finished syncing before the image was created), try uploading now while we're open.
  React.useEffect(() => {
    if (!syncConfig || !onSave) return;
    if (entry.attachedImageUrl) return;           // already uploaded
    if (!entry.attachedImageKey) return;          // no image at all
    if (!navigator.onLine) return;                // offline — skip
    let cancelled = false;
    (async () => {
      try {
        const dataUrl = await idbGet(entry.attachedImageKey);
        if (cancelled || !dataUrl || !dataUrl.startsWith("data:")) return;
        const remoteUrl = await uploadImageToSupabase(syncConfig, dataUrl, entry.attachedImageKey);
        if (cancelled || !remoteUrl) return;
        onSave({ ...entry, attachedImageUrl: remoteUrl, updatedAt: Date.now() });
      } catch(e) { console.warn("EntryView: deferred image upload failed:", e.message); }
    })();
    return () => { cancelled = true; };
  }, [entry.id, entry.attachedImageKey, entry.attachedImageUrl, syncConfig, onSave]);

  const tryUnlockEntry = async () => {
    if (!lockConfig?.appPin) { setEntryUnlocked(true); return; }
    const hashed = await hashPin(unlockInput);
    if (hashed === lockConfig.appPin) { setEntryUnlocked(true); setUnlockError(false); }
    else { setUnlockError(true); setUnlockInput(""); }
  };

  return (
    <div className="fade-in" style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column", alignItems:"center", padding:"32px 20px 60px" }}>
      {/* Nav */}
      <div style={{ width:"100%", maxWidth:640, display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:28 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", padding:0 }}>← journal</button>
        <div style={{ display:"flex", gap:16, flexWrap:"wrap", justifyContent:"flex-end", alignItems:"center" }}>
          <button onClick={onPin} style={{ background:"none", border:"none", cursor:"pointer", color: entry.pinned ? "var(--accent)" : "var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>{entry.pinned ? "✦ pinned" : "✦ pin"}</button>
          <button onClick={onToggleLock} style={{ background:"none", border:"none", cursor:"pointer", color: entry.locked ? "var(--accent-warm)" : "var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>{entry.locked ? "unlock" : "lock"}</button>
          <button onClick={onEdit} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>edit</button>
          <button onClick={onExport} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>export ↓</button>
          <button onClick={onDelete} style={{ background:"none", border:"none", cursor:"pointer", color:"#b85030", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>delete</button>
          {onSaveWitness && <button onClick={()=>setShowWitness(true)} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>witness</button>}
        </div>
      </div>

      {/* Witness modal */}
      {showWitness && onSaveWitness && (
        <WitnessEntry entry={entry} onSave={onSaveWitness} onClose={()=>setShowWitness(false)} showBanner={()=>{}} speechLang={speechLang}/>
      )}

      {/* Time capsule seal */}
      {entry.sealUntil && new Date(entry.sealUntil) > new Date() && (
        <div style={{ maxWidth:640, width:"100%", margin:"0 auto 24px", padding:"18px 20px", borderRadius:12, border:"1px dashed var(--accent)", background:"var(--page-warm)", textAlign:"center" }}>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--accent)", fontStyle:"italic", letterSpacing:"0.04em" }}>⏳ this entry is sealed until {new Date(entry.sealUntil).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
        </div>
      )}

      {/* Locked overlay */}
      {entry.locked && !entryUnlocked && (
        <div className="entry-page page-reveal" style={{ width:"100%", maxWidth:600, padding:"56px 52px 72px 96px", borderRadius:2 }}>
          <div style={{ position:"relative", zIndex:1, textAlign:"center", paddingTop:20 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.2em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:28 }}>this entry is locked</div>
            {lockConfig?.appPin ? (
              <>
                <input type="password" value={unlockInput} onChange={e=>{ setUnlockInput(e.target.value); setUnlockError(false); }} onKeyDown={e=>e.key==="Enter"&&tryUnlockEntry()} placeholder="enter pin" autoFocus
                  style={{ background:"transparent", border:"none", borderBottom:`1px solid ${unlockError?"#b85030":"var(--rule)"}`, padding:"8px 0", fontFamily:"'Cormorant Garamond',serif", fontSize:22, color:"var(--ink)", textAlign:"center", width:160, letterSpacing:"0.3em", outline:"none", display:"block", margin:"0 auto 12px" }}/>
                {unlockError && <div style={{ fontSize:11, color:"#b85030", fontFamily:"'Cormorant Garamond',serif", marginBottom:12 }}>incorrect pin</div>}
                <button onClick={tryUnlockEntry} style={{ padding:"9px 28px", borderRadius:10, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>unlock</button>
              </>
            ) : (
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:14, color:"var(--ink-faint)", lineHeight:1.7 }}>
                set a pin in settings to protect locked entries
                <div><button onClick={()=>setEntryUnlocked(true)} style={{ marginTop:16, background:"none", border:`1px solid var(--rule)`, borderRadius:8, padding:"6px 14px", cursor:"pointer", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:12 }}>view anyway</button></div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Page */}
      {(!entry.locked || entryUnlocked) && (
        <div className="entry-page page-reveal" style={{ width:"100%", maxWidth:600, padding:"56px 52px 72px 96px", borderRadius:2 }}>
          <div style={{ position:"relative", zIndex:1 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, fontWeight:300, letterSpacing:"0.14em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:6 }}>{label}</div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, fontWeight:300, letterSpacing:"0.12em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:32 }}>{formatDate(entry.createdAt)} · {formatTime(entry.createdAt)}</div>
            {entry.mood && (
              <div style={{ fontSize:11, letterSpacing:"0.18em", color:MOOD_COLORS[entry.mood]||"var(--ink-faint)", textTransform:"uppercase", fontFamily:"'Cormorant Garamond',serif", marginBottom:10 }}>{entry.mood}</div>
            )}
            {/* Tags, people, location */}
            {((entry.tags&&entry.tags.length)||(entry.people&&entry.people.length)||entry.location) && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:16, alignItems:"center" }}>
                {(entry.tags||[]).map(t=>(
                  <span key={t} style={{ padding:"2px 9px", borderRadius:10, border:"1px solid var(--rule)", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-faint)", letterSpacing:"0.06em" }}>{t}</span>
                ))}
                {(entry.people||[]).map(p=>(
                  <span key={p} style={{ padding:"2px 9px", borderRadius:10, background:"var(--page-deep)", border:"1px solid var(--rule)", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-soft)" }}>◯ {p}</span>
                ))}
                {entry.location && (
                  <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-faint)", fontStyle:"italic" }}>◬ {entry.location.label||entry.location.manual||""}</span>
                )}
              </div>
            )}
            {entry.heading && (
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:22, fontWeight:300, fontStyle:"italic", color:"var(--ink-soft)", lineHeight:1.55, marginBottom:36, paddingBottom:28, borderBottom:`1px solid var(--rule)` }}>{entry.heading}</div>
            )}
            <div>
              {paragraphs.map((p, i) => {
                const isEmphasis = p.startsWith("*") && p.endsWith("*");
                const text = isEmphasis ? p.slice(1,-1) : p;
                return (
                  <p key={i} style={{ fontSize:16.5, lineHeight:1.95, color: isEmphasis ? "var(--ink-soft)" : "var(--ink)", fontStyle: isEmphasis ? "italic" : "normal", marginBottom:24, fontFamily:"'Lora',Georgia,serif" }}>
                    {text}
                  </p>
                );
              })}
            </div>
            <div style={{ marginTop:48, textAlign:"right", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:17, color:"var(--ink-faint)" }}>{signature || "— A."}</div>
            {entry.shaped && entry.raw && (
              <details style={{ marginTop:40 }}>
                <summary style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.14em", color:"var(--ink-ghost)", textTransform:"uppercase", cursor:"pointer" }}>original words</summary>
                <p style={{ marginTop:12, fontFamily:"'Lora',serif", fontSize:13, color:"var(--ink-faint)", lineHeight:1.8, fontStyle:"italic" }}>{entry.raw}</p>
              </details>
            )}
            {entry.connectedThemes && entry.connectedThemes.length > 0 && (
              <button onClick={onThread} style={{ marginTop:32, background:"none", border:`1px solid var(--rule)`, borderRadius:8, padding:"7px 14px", cursor:"pointer", color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.14em", textTransform:"uppercase" }}>view thread ↗</button>
            )}
            {(entry.attachedImage || entry.attachedImageUrl) && (() => {
              const imgSrc = entry.attachedImageUrl || entry.attachedImage;
              return (
                <div style={{ marginTop:36, paddingTop:28, borderTop:"1px solid var(--rule)" }}>
                  {lightboxOpen && <ImageLightbox src={imgSrc} onClose={()=>setLightboxOpen(false)}/>}
                  <img
                    src={imgSrc} alt="attached"
                    onClick={()=>setLightboxOpen(true)}
                    style={{ maxWidth:"100%", borderRadius:8, opacity:0.92, cursor:"zoom-in", display:"block" }}
                  />
                  <div style={{ marginTop:6, fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-ghost)", letterSpacing:"0.06em" }}>tap to zoom</div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────
function SettingsView({ syncConfig, lockConfig, signature, speechLang, activeTheme, cover, onSave, onSaveLock, onSaveSignature, onSaveSpeechLang, onSaveTheme, onSaveCover, onBack, exportJSON, exportMarkdown, importJSON, showBanner, showConfirm }) {
  const [showCoverEditor, setShowCoverEditor] = React.useState(false);
  speechLang = speechLang || "en-US";

  const SETUP_SQL = ["-- Entries table","create table if not exists journal_data (","  user_id text primary key,","  entries_json text,","  updated_at text",");","","-- Meta table (sticky notes, soul map, draft, notes, custom tags, etc.)","create table if not exists journal_meta (","  user_id text primary key,","  meta_json text,","  updated_at text",");","","-- Allow anon access","alter table journal_data enable row level security;","alter table journal_meta enable row level security;","create policy \"anon rw journal_data\"","  on journal_data for all using (true) with check (true);","create policy \"anon rw journal_meta\"","  on journal_meta for all using (true) with check (true);","","-- Image storage bucket (created automatically on first sync,","-- but you can also run this manually in Supabase Dashboard → Storage)","-- insert into storage.buckets (id, name, public)","-- values ('journal-images', 'journal-images', true)","-- on conflict do nothing;"].join("\n");
  const [url, setUrl]       = useState(syncConfig?.url || "");
  const [key, setKey]       = useState(syncConfig?.anonKey || "");
  const [userId, setUserId] = useState(syncConfig?.userId || "");
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [pinInput, setPinInput]     = useState("");
  const [pinConfirm, setPinConfirm] = useState("");
  const [pinMsg, setPinMsg]         = useState(null); // { ok, msg }
  const [sigInput, setSigInput]     = useState(signature || "— A.");
  const [sigSaved, setSigSaved]     = useState(false);
  const [langInput, setLangInput]   = useState(speechLang);
  const [showSetup, setShowSetup]   = useState(false);
  const [geminiKey, setGeminiKey]   = useState(getGeminiKey);
  const [geminiKeySaved, setGeminiKeySaved] = useState(false);
  const [geminiKeyError, setGeminiKeyError] = useState("");

  const testConnection = async () => {
    const u = url.trim(), k = key.trim(), id = userId.trim();
    if (!u || !k || !id) { setTestResult({ ok:false, msg:"fill in all three fields first" }); return; }
    setTesting(true); setTestResult(null);
    try {
      const data = await supabaseFetch(u, k, `/journal_data?user_id=eq.${encodeURIComponent(id)}&select=updated_at&limit=1`);
      setTestResult({ ok:true, msg: data && data.length ? `connected ✓ — found existing data` : `connected ✓ — ready to sync` });
    } catch(err) {
      setTestResult({ ok:false, msg: `connection failed: ${err.message}` });
    } finally { setTesting(false); }
  };

  const handleSave = () => {
    const u = url.trim(), k = key.trim(), id = userId.trim();
    if (u && k && id) onSave({ url:u, anonKey:k, userId:id });
    else if (!u && !k && !id) onSave(null);
    else { showBanner("fill in all three fields, or clear all to disable sync", 3000); }
  };

  const clearSync = async () => {
    const ok = await showConfirm("Remove sync settings? Your local entries are safe.");
    if (!ok) return;
    setUrl(""); setKey(""); setUserId("");
    onSave(null);
  };

  const setPin = async () => {
    const p = pinInput.trim();
    if (!p) { setPinMsg({ ok:false, msg:"enter a pin first" }); return; }
    if (p !== pinConfirm.trim()) { setPinMsg({ ok:false, msg:"pins don't match" }); return; }
    if (p.length < 4) { setPinMsg({ ok:false, msg:"pin must be at least 4 characters" }); return; }
    const hashed = await hashPin(p);
    const appLock = lockConfig?.appLock ?? false;
    onSaveLock({ appPin: hashed, appLock });
    setPinInput(""); setPinConfirm("");
    setPinMsg({ ok:true, msg:"pin saved ✓" });
  };

  const removePin = async () => {
    const ok = await showConfirm("Remove your PIN? App lock and entry locks will stop working.");
    if (!ok) return;
    onSaveLock(null);
    setPinMsg({ ok:true, msg:"pin removed" });
  };

  const toggleAppLock = () => {
    if (!lockConfig?.appPin) { setPinMsg({ ok:false, msg:"set a pin first" }); return; }
    onSaveLock({ ...lockConfig, appLock: !lockConfig.appLock });
  };

  return (
    <div className="fade-in" style={{ maxWidth:520, margin:"0 auto", padding:"32px 18px 80px" }}>
      <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", marginBottom:28 }}>← back</button>
      <div style={{ fontFamily:"'IM Fell English',serif", fontSize:22, color:"var(--ink)", fontStyle:"italic", marginBottom:6 }}>Settings</div>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-faint)", marginBottom:32, lineHeight:1.6 }}>your entries live in your browser. sync is optional.</div>

      {/* Gemini API Key */}
      <Section title="ai (gemini)">
        <div style={{ marginBottom:8, fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-soft)", lineHeight:1.7 }}>
          Paste your Gemini API key from <a href="https://aistudio.google.com" target="_blank" style={{ color:"var(--accent)" }}>aistudio.google.com</a>. Free tier available, no card needed.
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <input
            type="password"
            value={geminiKey}
            onChange={e => { setGeminiKey(e.target.value); setGeminiKeySaved(false); }}
            placeholder="AIza..."
            style={{ flex:1, padding:"9px 12px", borderRadius:8, border:"1px solid var(--rule)", background:"var(--page-warm)", color:"var(--ink)", fontFamily:"'Cormorant Garamond',serif", fontSize:14, outline:"none" }}
          />
          <button onClick={() => {
              const clean = geminiKey.trim();
              if (!clean) { saveGeminiKey(""); setGeminiKeySaved(true); setGeminiKeyError(""); setTimeout(()=>setGeminiKeySaved(false), 2000); return; }
              if (!isValidGeminiKey(clean)) { setGeminiKeyError("that doesn't look like a valid Gemini key — should start with AIza and contain only letters, numbers, _ or -"); return; }
              setGeminiKeyError("");
              saveGeminiKey(clean);
              setGeminiKey(clean);
              setGeminiKeySaved(true);
              setTimeout(()=>setGeminiKeySaved(false), 2000);
            }}
            style={{ padding:"9px 18px", borderRadius:8, border:"none", background:"var(--ink)", color:"var(--page)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer", letterSpacing:"0.06em", flexShrink:0 }}>
            {geminiKeySaved ? "saved ✓" : "save"}
          </button>
        </div>
        {geminiKeyError && (
          <div style={{ marginTop:8, fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"#b85030", fontStyle:"italic" }}>
            ✗ {geminiKeyError}
          </div>
        )}
        {!geminiKeyError && (getGeminiKey() ? (
          <div style={{ marginTop:8, fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-faint)", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ color:"var(--mood-clear)" }}>✓ key saved</span>
            <button onClick={() => { saveGeminiKey(""); setGeminiKey(""); setGeminiKeyError(""); }} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", fontSize:11, padding:0, letterSpacing:"0.04em" }}>remove</button>
          </div>
        ) : (
          <div style={{ marginTop:8, fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"#b85030", fontStyle:"italic" }}>
            no key set — AI features won't work
          </div>
        ))}
      </Section>

      {/* Supabase sync */}
      <Section title="cloud sync (supabase)">
        <div style={{ marginBottom:14 }}>
          <button onClick={()=>setShowSetup(s=>!s)} style={{ background:"none", border:"none", padding:0, cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--accent)", letterSpacing:"0.08em" }}>
            {showSetup ? "▲ hide setup guide" : "▼ how to set this up"}
          </button>
        </div>
        {showSetup && (
          <div style={{ marginBottom:18, padding:"14px 16px", background:"var(--page-deep)", borderRadius:10, border:"1px solid var(--rule)", fontFamily:"'Cormorant Garamond',serif", fontSize:12.5, color:"var(--ink-soft)", lineHeight:1.85 }}>
            <div style={{ fontWeight:600, marginBottom:6, color:"var(--ink)", letterSpacing:"0.06em" }}>Step 1 — Create a free Supabase project</div>
            <div style={{ marginBottom:12 }}>Go to <a href="https://supabase.com" target="_blank" style={{ color:"var(--accent)" }}>supabase.com</a>, sign up free, click "New project". Pick a name and a region close to you.</div>
            <div style={{ fontWeight:600, marginBottom:6, color:"var(--ink)", letterSpacing:"0.06em" }}>Step 2 — Run this SQL in the SQL Editor</div>
            <div style={{ marginBottom:6 }}>Table Editor → SQL Editor → New query. Paste and run:</div>
            <pre style={{ background:"var(--ink)", color:"var(--page)", padding:"10px 12px", borderRadius:8, fontSize:11, overflowX:"auto", lineHeight:1.7, marginBottom:12 }}>{SETUP_SQL}</pre>
            <div style={{ fontWeight:600, marginBottom:6, color:"var(--ink)", letterSpacing:"0.06em" }}>Step 3 — Get your credentials</div>
            <div style={{ marginBottom:12 }}>In your Supabase project: Settings → API → copy the <strong>Project URL</strong> and the <strong>anon public</strong> key.</div>
            <div style={{ fontWeight:600, marginBottom:6, color:"var(--ink)", letterSpacing:"0.06em" }}>Step 4 — Paste below and test</div>
            <div>Fill in the three fields below and click "test connection". Once it shows ✓, click "save sync settings".</div>
          </div>
        )}
        {[
          { label:"Project URL", val:url, set:setUrl, placeholder:"https://xxxxx.supabase.co", type:"url" },
          { label:"Anon Key", val:key, set:setKey, placeholder:"eyJ…", type:"password" },
          { label:"Your User ID", val:userId, set:setUserId, placeholder:"any unique string, e.g. yourname_journal", type:"text" },
        ].map(f => (
          <div key={f.label} style={{ marginBottom:14 }}>
            <label style={{ display:"block", fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.14em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:5 }}>{f.label}</label>
            <input type={f.type} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.placeholder}
              style={{ width:"100%", padding:"10px 12px", borderRadius:8, border:`1px solid var(--rule)`, background:"var(--page-warm)", color:"var(--ink)", fontSize:13, fontFamily:"'Cormorant Garamond',serif" }}/>
          </div>
        ))}
        <div style={{ display:"flex", gap:8, marginTop:6 }}>
          <button onClick={testConnection} disabled={testing} style={{ padding:"9px 16px", borderRadius:8, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>
            {testing ? "testing…" : "test connection"}
          </button>
          {syncConfig && <button onClick={clearSync} style={{ padding:"9px 16px", borderRadius:8, border:`1px solid #b8503044`, background:"transparent", color:"#b85030", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>remove sync</button>}
        </div>
        {testResult && (
          <div style={{ marginTop:10, padding:"8px 12px", borderRadius:8, background: testResult.ok ? "#5a8b6a18" : "#b8503018", border:`1px solid ${testResult.ok ? "#5a8b6a44" : "#b8503044"}`, fontFamily:"'Cormorant Garamond',serif", fontSize:13, color: testResult.ok ? "#5a8b6a" : "#b85030" }}>
            {testResult.msg}
          </div>
        )}
      </Section>

      {/* Local backup */}
      <Section title="local backup">
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <button onClick={exportJSON} style={{ flex:1, minWidth:120, padding:"10px 0", borderRadius:8, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>export .json</button>
          <button onClick={exportMarkdown} style={{ flex:1, minWidth:120, padding:"10px 0", borderRadius:8, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>export .md</button>
          <label style={{ flex:1, minWidth:120, padding:"10px 0", borderRadius:8, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer", textAlign:"center" }}>
            import .json
            <input type="file" accept=".json" style={{ display:"none" }} onChange={importJSON}/>
          </label>
        </div>
        <div style={{ marginTop:10, fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-ghost)", lineHeight:1.7 }}>
          .md export creates a single Markdown file with all entries — portable, readable forever, works in Obsidian, Notion, or any text editor.
        </div>
      </Section>

      {/* Lock & Privacy */}
      <Section title="lock & privacy">
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-faint)", marginBottom:16, lineHeight:1.7 }}>
          one pin for everything — locks the app on open, and protects individual entries you choose to lock.
        </div>
        {lockConfig?.appPin && (
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, padding:"10px 14px", background:"var(--page)", borderRadius:8, border:`1px solid var(--rule)` }}>
            <div>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-soft)" }}>pin is set</div>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-ghost)", marginTop:2 }}>app locks on open: {lockConfig.appLock ? "on" : "off"}</div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={toggleAppLock} style={{ padding:"6px 12px", borderRadius:8, border:`1px solid var(--rule)`, background:"transparent", color: lockConfig.appLock ? "var(--accent)" : "var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, cursor:"pointer" }}>{lockConfig.appLock ? "app lock on" : "app lock off"}</button>
              <button onClick={removePin} style={{ padding:"6px 12px", borderRadius:8, border:`1px solid #b8503044`, background:"transparent", color:"#b85030", fontFamily:"'Cormorant Garamond',serif", fontSize:12, cursor:"pointer" }}>remove</button>
            </div>
          </div>
        )}
        {[
          { label: lockConfig?.appPin ? "new pin" : "pin", val:pinInput, set:setPinInput, placeholder:"4+ characters" },
          { label:"confirm pin", val:pinConfirm, set:setPinConfirm, placeholder:"same again" },
        ].map(f => (
          <div key={f.label} style={{ marginBottom:12 }}>
            <label style={{ display:"block", fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.14em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:5 }}>{f.label}</label>
            <input type="password" value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.placeholder}
              style={{ width:"100%", padding:"9px 12px", borderRadius:8, border:`1px solid var(--rule)`, background:"var(--page)", color:"var(--ink)", fontSize:13, fontFamily:"'Cormorant Garamond',serif" }}/>
          </div>
        ))}
        <button onClick={setPin} style={{ padding:"9px 18px", borderRadius:8, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>
          {lockConfig?.appPin ? "change pin" : "set pin"}
        </button>
        {pinMsg && (
          <div style={{ marginTop:10, padding:"7px 12px", borderRadius:8, background: pinMsg.ok ? "#5a8b6a18" : "#b8503018", border:`1px solid ${pinMsg.ok ? "#5a8b6a44" : "#b8503044"}`, fontFamily:"'Cormorant Garamond',serif", fontSize:12, color: pinMsg.ok ? "#5a8b6a" : "#b85030" }}>{pinMsg.msg}</div>
        )}
      </Section>

      {/* Signature */}
      <Section title="entry signature">
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-faint)", marginBottom:16, lineHeight:1.7 }}>
          appears at the bottom of every entry and HTML export. keep it short and personal.
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <input
            value={sigInput}
            onChange={e=>{ setSigInput(e.target.value); setSigSaved(false); }}
            placeholder="— A."
            maxLength={60}
            style={{ flex:1, padding:"9px 12px", borderRadius:8, border:`1px solid var(--rule)`, background:"var(--page)", color:"var(--ink)", fontSize:14, fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic" }}
          />
          <button onClick={()=>{ const s=sigInput.trim()||"— A."; onSaveSignature(s); setSigInput(s); setSigSaved(true); setTimeout(()=>setSigSaved(false),2000); }}
            style={{ padding:"9px 16px", borderRadius:8, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer", whiteSpace:"nowrap" }}>
            {sigSaved ? "saved ✓" : "save"}
          </button>
        </div>
        <div style={{ marginTop:10, fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:13, color:"var(--ink-faint)" }}>
          preview: <span style={{ color:"var(--ink-soft)" }}>{sigInput.trim() || "— A."}</span>
        </div>
      </Section>

      {/* Speech language */}
      <Section title="voice input language">
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-faint)", marginBottom:14, lineHeight:1.7 }}>
          used for voice dictation throughout the app.
        </div>
        <select
          value={langInput}
          onChange={e=>setLangInput(e.target.value)}
          style={{ width:"100%", padding:"9px 12px", borderRadius:8, border:`1px solid var(--rule)`, background:"var(--page-warm)", color:"var(--ink)", fontSize:13, fontFamily:"'Cormorant Garamond',serif", marginBottom:10 }}
        >
          {SPEECH_LANGS.map(l => (
            <option key={l.code} value={l.code}>{l.label}</option>
          ))}
        </select>
        <button
          onClick={()=>{ onSaveSpeechLang(langInput); showBanner("speech language saved ✓", 1800); }}
          style={{ padding:"9px 18px", borderRadius:8, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}
        >save language</button>
      </Section>

      {/* Theme selector */}
      <Section title="appearance">
        <ThemeSelector activeTheme={activeTheme || "parchment"} onSelect={(t)=>{ if(onSaveTheme) onSaveTheme(t); }}/>
      </Section>

      {/* Cover page editor */}
      <Section title="cover page">
        {showCoverEditor && (
          <CoverEditor cover={cover} onSave={(c)=>{ if(onSaveCover) onSaveCover(c); }} onClose={()=>setShowCoverEditor(false)}/>
        )}
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <button onClick={()=>setShowCoverEditor(true)} style={{ padding:"8px 16px", borderRadius:8, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>{cover ? "edit cover" : "create cover"}</button>

// ─── YEAR IN REVIEW ───────────────────────────────────────────────────────────
function YearReviewView({ entries, onBack, onOpen }) {
  const today = new Date();
  const [year, setYear] = React.useState(today.getFullYear());

  // Build 365-day grid
  const startOfYear = new Date(year, 0, 1);
  const endOfYear   = new Date(year, 11, 31);
  const days = [];
  for (let d = new Date(startOfYear); d <= endOfYear; d.setDate(d.getDate()+1)) {
    days.push(new Date(d));
  }

  // Map entries to days
  const dayMap = {};
  entries.forEach(e => {
    if (e.archived) return;
    const d = new Date(e.createdAt);
    if (d.getFullYear() !== year) return;
    const key = `${d.getMonth()}-${d.getDate()}`;
    if (!dayMap[key]) dayMap[key] = [];
    dayMap[key].push(e);
  });

  const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const totalEntries = Object.values(dayMap).flat().length;
  const activeDays   = Object.keys(dayMap).length;
  const moodTally    = {};
  Object.values(dayMap).flat().forEach(e => { if(e.mood) moodTally[e.mood] = (moodTally[e.mood]||0)+1; });
  const topMood      = Object.entries(moodTally).sort((a,b)=>b[1]-a[1])[0]?.[0];

  const prevYear = entries.some(e => new Date(e.createdAt).getFullYear() < year);
  const nextYear = year < today.getFullYear();

  // Group days by week columns
  const firstDayOfWeek = startOfYear.getDay();
  const weeks = [];
  let week = Array(firstDayOfWeek).fill(null);
  days.forEach(day => {
    week.push(day);
    if (week.length === 7) { weeks.push(week); week = []; }
  });
  if (week.length) { while (week.length < 7) week.push(null); weeks.push(week); }

  return (
    <div className="fade-in" style={{ maxWidth:720, margin:"0 auto", padding:"36px 18px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:28 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", padding:0 }}>← journal</button>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <button onClick={()=>{ if(prevYear) setYear(y=>y-1); }} style={{ background:"none", border:"none", color: prevYear ? "var(--ink-faint)" : "var(--rule)", cursor: prevYear ? "pointer" : "default", fontSize:16, padding:0 }}>‹</button>
          <div style={{ fontFamily:"'IM Fell English',serif", fontSize:22, color:"var(--ink)", fontStyle:"italic" }}>{year}</div>
          <button onClick={()=>{ if(nextYear) setYear(y=>y+1); }} style={{ background:"none", border:"none", color: nextYear ? "var(--ink-faint)" : "var(--rule)", cursor: nextYear ? "pointer" : "default", fontSize:16, padding:0 }}>›</button>
        </div>
        <div style={{ width:60 }}/>
      </div>

      {/* Stats */}
      <div style={{ display:"flex", gap:24, marginBottom:28, flexWrap:"wrap" }}>
        {[
          { label:"entries", val:totalEntries },
          { label:"active days", val:activeDays },
          { label:"top mood", val:topMood || "—" },
        ].map(s => (
          <div key={s.label}>
            <div style={{ fontFamily:"'IM Fell English',serif", fontSize:24, color:"var(--ink)", fontStyle:"italic" }}>{s.val}</div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.14em", color:"var(--ink-faint)", textTransform:"uppercase" }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Month labels */}
      <div style={{ display:"flex", gap:0, marginBottom:4, paddingLeft:20 }}>
        {MONTH_NAMES.map((m, i) => (
          <div key={m} style={{ flex:1, fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.1em", color:"var(--ink-faint)", textTransform:"uppercase" }}>{m}</div>
        ))}
      </div>

      {/* Heatmap — GitHub style, scrollable on mobile */}
      <div style={{ overflowX:"auto", paddingBottom:8 }}>
        <div style={{ display:"flex", gap:3, minWidth:640 }}>
          {weeks.map((wk, wi) => (
            <div key={wi} style={{ display:"flex", flexDirection:"column", gap:3 }}>
              {wk.map((day, di) => {
                if (!day) return <div key={di} style={{ width:10, height:10 }}/>;
                const key = `${day.getMonth()}-${day.getDate()}`;
                const dayEntries = dayMap[key] || [];
                const count = dayEntries.length;
                const mood  = dayEntries[0]?.mood;
                const isToday = day.toDateString() === today.toDateString();
                const bg = count === 0 ? "var(--page-deep)"
                  : mood ? MOOD_COLORS[mood] + (count > 1 ? "ff" : "88")
                  : `rgba(139,94,60,${Math.min(0.3 + count*0.2, 1)})`;
                return (
                  <div key={di}
                    onClick={() => dayEntries.length && onOpen(dayEntries[0].id)}
                    title={`${day.toLocaleDateString()} · ${count} entr${count===1?"y":"ies"}${mood?" · "+mood:""}`}
                    style={{
                      width:10, height:10, borderRadius:2,
                      background: bg,
                      cursor: count > 0 ? "pointer" : "default",
                      outline: isToday ? `1.5px solid var(--accent)` : "none",
                      outlineOffset:1,
                      transition:"transform 0.1s",
                    }}
                    onMouseEnter={e=>{ if(count) e.currentTarget.style.transform="scale(1.4)"; }}
                    onMouseLeave={e=>e.currentTarget.style.transform=""}
                  />
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* Legend */}
      <div style={{ display:"flex", gap:12, marginTop:16, flexWrap:"wrap", alignItems:"center" }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-faint)", letterSpacing:"0.06em" }}>mood:</div>
        {Object.entries(MOOD_COLORS).map(([m,c]) => (
          <div key={m} style={{ display:"flex", alignItems:"center", gap:4 }}>
            <div style={{ width:8, height:8, borderRadius:2, background:c }}/>
            <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, color:"var(--ink-faint)", letterSpacing:"0.08em" }}>{m}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MONTHLY SUMMARY ──────────────────────────────────────────────────────────
function MonthlySummaryView({ entries, onBack }) {
  const [summary, setSummary]   = React.useState(null);
  const [loading, setLoading]   = React.useState(false);
  const [error, setError]       = React.useState("");

  const last30 = entries
    .filter(e => !e.archived && Date.now() - e.createdAt < 30 * 24 * 60 * 60 * 1000)
    .sort((a,b) => a.createdAt - b.createdAt);

  const generate = async () => {
    if (last30.length === 0) { setError("no entries in the last 30 days"); return; }
    setLoading(true); setError(""); setSummary(null);
    // Cap at 20 entries, 200 chars each to stay well within token limits
    const digestEntries = last30.slice(-20);
    const digest = digestEntries.map((e,i) => {
      const date = formatDate(e.createdAt);
      const text = (e.shaped||e.raw||"").replace(/\*/g,"").slice(0,200);
      return "[" + date + (e.mood ? ", "+e.mood : "") + "]\n" + text;
    }).join("\n\n---\n\n");

    const system = `You are reading someone's journal entries from the past 30 days. Give a short, honest, personal reflection — not therapy, not a list. Write like a perceptive friend who has been paying attention.
Return ONLY valid JSON:
{
  "opening": "One sentence — the feeling that runs through this month, stated plainly",
  "patterns": "2-3 sentences. What kept coming up? What shifted? Be specific — name actual things from the entries.",
  "thread": "One sentence on the underlying current beneath everything",
  "closing": "One sentence that lands — not advice, not a question, just something true"
}
Only return the JSON.`;

    try {
      const raw = await callClaude(system, digest.slice(0, 3500), 500);
      const clean = raw.replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/\s*```$/i,"").trim();
      setSummary(JSON.parse(clean));
    } catch(e) {
      setError("couldn't generate summary — try again");
    } finally { setLoading(false); }
  };

  React.useEffect(() => { generate(); }, []);

  const moodTally = {};
  last30.forEach(e => { if(e.mood) moodTally[e.mood] = (moodTally[e.mood]||0)+1; });

  return (
    <div className="fade-in" style={{ maxWidth:560, margin:"0 auto", padding:"36px 18px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:36 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", padding:0 }}>← journal</button>
        <div style={{ fontFamily:"'IM Fell English',serif", fontSize:22, color:"var(--ink)", fontStyle:"italic" }}>last 30 days</div>
        <div style={{ width:60 }}/>
      </div>

      {/* Entry count + mood spread */}
      <div style={{ marginBottom:28 }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-faint)", letterSpacing:"0.06em", marginBottom:12 }}>
          {last30.length} entr{last30.length===1?"y":"ies"} · {Object.keys(moodTally).length > 0 && "moods: "}
          {Object.entries(moodTally).sort((a,b)=>b[1]-a[1]).map(([m,c]) => (
            <span key={m} style={{ marginRight:8, color:MOOD_COLORS[m] }}>{m} ({c})</span>
          ))}
        </div>
        {/* Mini mood bar */}
        {Object.keys(moodTally).length > 0 && (
          <div style={{ display:"flex", height:4, borderRadius:4, overflow:"hidden", gap:1 }}>
            {Object.entries(moodTally).sort((a,b)=>b[1]-a[1]).map(([m,c]) => (
              <div key={m} style={{ flex:c, background:MOOD_COLORS[m], opacity:0.7 }}/>
            ))}
          </div>
        )}
      </div>

      {loading && (
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:15, color:"var(--ink-faint)", textAlign:"center", padding:"40px 0" }}>reading the month…</div>
      )}

      {error && (
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:14, color:"#b85030", marginBottom:20, textAlign:"center" }}>
          {error}
          <div><button onClick={generate} style={{ marginTop:10, background:"none", border:"none", color:"var(--ink-soft)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>try again</button></div>
        </div>
      )}

      {summary && (
        <div className="entry-page" style={{ padding:"40px 36px 48px", borderRadius:4, position:"relative" }}>
          <div style={{ position:"relative", zIndex:1 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.2em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:24 }}>reflection</div>
            {[summary.opening, summary.patterns, summary.thread, summary.closing].map((p, i) => p && (
              <p key={i} style={{ fontFamily: i===3 ? "'Cormorant Garamond',serif" : "'Lora',serif", fontStyle: i===3 ? "italic" : "normal", fontSize: i===3 ? 18 : 15, lineHeight:1.9, color: i===3 ? "var(--ink-soft)" : "var(--ink)", marginBottom: i===3 ? 0 : 20 }}>{p}</p>
            ))}
          </div>
          <div style={{ marginTop:32, textAlign:"right", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:15, color:"var(--ink-faint)" }}>— Claude</div>
        </div>
      )}

      {summary && (
        <button onClick={generate} style={{ marginTop:20, background:"none", border:"none", cursor:"pointer", color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.06em", padding:0, display:"block", margin:"20px auto 0" }}>regenerate</button>
      )}
    </div>
  );
}

// ─── THE SELF — MIND MAP ──────────────────────────────────────────────────────

const SELF_KEY        = "myjournal_self_v2";
const SOUL_KEY        = "myjournal_soul_v1";
const SOUL_ENABLED_KEY = "myjournal_soul_enabled_v1";
const FEEDBACK_KEY    = "myjournal_feedback_v1";
const CONSTELLATION_KEY = "myjournal_constellations_v1";
const MAP_SNAPSHOTS_KEY = "myjournal_map_snapshots_v1";
const SOUL_QUESTION_KEY = "myjournal_soul_question_v1";

// ─── AI: READ THE SELF — prose map summary ────────────────────────────────────
const aiReadTheSelf = async (nodes, edges, soulProfile, constellations) => {
  if (!nodes.length) throw new Error("no nodes");

  // Build a structured representation
  const nodeLines = nodes.map(n => {
    const conns = edges
      .filter(e => e.from === n.id || e.to === n.id)
      .map(e => {
        const otherId = e.from === n.id ? e.to : e.from;
        const other = nodes.find(x => x.id === otherId);
        const str = e.strength || "faint";
        const lbl = e.label ? ` (${e.label})` : "";
        return other ? `${other.name}${lbl} [${str}]` : null;
      })
      .filter(Boolean);
    const parts = [`• ${n.name} [${n.category}]`];
    if (n.note) parts.push(`note: "${n.note}"`);
    if (n.fingerprint?.archetype) parts.push(`archetype: ${n.fingerprint.archetype}`);
    if (conns.length) parts.push(`connects to: ${conns.join(", ")}`);
    return parts.join(" | ");
  }).join("\n");

  const soulCtx = soulProfile
    ? `\nSoul profile: ${soulProfile.emotionalRegister || ""} Core themes: ${(soulProfile.coreThemes||[]).join(", ")}`
    : "";

  const constCtx = constellations.length
    ? `\nConstellations: ${constellations.map(c => `"${c.name}" (${c.nodeIds.length} nodes)`).join(", ")}`
    : "";

  const system = `You are reading someone's inner world map — a constellation of things that matter to them: films, music, quotes, people, places, dreams, memories.

Your job is to write a short, honest, personal "reading" of their map. Not a list. Not therapy. Flowing prose — like a perceptive friend who has been paying close attention, speaking directly to them.

Structure your response as JSON:
{
  "title": "a short evocative title for this reading (3-6 words, lowercase, poetic)",
  "sections": [
    {
      "heading": "short section title (1-4 words, lowercase)",
      "body": "2-4 sentences of prose. Name specific nodes and explain WHY they connect — what feeling or thread runs between them. Don't be vague. Be concrete. Reference actual node names and edge labels."
    }
  ],
  "closing": "One sentence that lands — the thing the whole map seems to be saying, underneath everything."
}

Write 3-5 sections. Each section should illuminate a real cluster or tension in the map. Name specific things. Say what connects to what and why.
Only return the JSON.`;

  const raw = await callClaude(system, `Map nodes:\n${nodeLines}${soulCtx}${constCtx}`, 1200);
  const clean = raw.replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/\s*```$/i,"").trim();
  return JSON.parse(clean);
};

const EDGE_STRENGTH = {

  faint:   { strokeWidth: 1.2, opacity: 0.4,  dashArray: "6 8",   glow: false },

};

const loadSelf = () => {
  try {
    // Try v2 first, fall back to v1 and migrate
    const raw = localStorage.getItem(SELF_KEY);
    if (raw) return JSON.parse(raw);
    const legacyRaw = localStorage.getItem("myjournal_self_v1");
    if (legacyRaw) {
      const legacy = JSON.parse(legacyRaw);
      // Migrate: add strength field to all edges
      if (legacy.edges) legacy.edges = legacy.edges.map(e => ({ ...e, strength: e.strength || "faint" }));
      return legacy;
    }
    return { nodes:[], edges:[] };
  } catch { return { nodes:[], edges:[] }; }
};
const saveSelf = (data) => {
  try { localStorage.setItem(SELF_KEY, JSON.stringify(data)); } catch {}
};

const loadSoulProfile = () => {

    return raw ? JSON.parse(raw) : null;

};

    if (profile) localStorage.setItem(SOUL_KEY, JSON.stringify(profile));

  } catch {}
};

// ─── FEEDBACK LOG ─────────────────────────────────────────────────────────────
const loadFeedback = () => {
  try {
    const raw = localStorage.getItem(FEEDBACK_KEY);
    if (!raw) return { accepted: [], rejected: [] };
    return JSON.parse(raw);
  } catch { return { accepted: [], rejected: [] }; }
};
const saveFeedback = (fb) => {
  try { localStorage.setItem(FEEDBACK_KEY, JSON.stringify(fb)); } catch {}
};
const logEdgeFeedback = (edge, action) => {
  const fb = loadFeedback();
  const record = { from: edge.from, to: edge.to, strength: edge.strength, ts: Date.now() };
  if (action === "accepted") {
    fb.accepted = [...(fb.accepted || []).slice(-49), record];
  } else {
    fb.rejected = [...(fb.rejected || []).slice(-49), record];
  }
  saveFeedback(fb);
};

LAYER 1 — CULTURAL/UNIVERSAL (weight: ${Math.round(culturalWeight*100)}%):

Return ONLY valid JSON:

// Journal search — find entries resonant with a node name for the journal toggle
const findJournalContext = (nodeName, entries, maxEntries=3) => {
  if (!entries || !entries.length) return "";
  const terms = nodeName.toLowerCase().split(/\s+/).filter(w => w.length > 3);
  const scored = entries.map(e => {
    const text = (e.shaped || e.raw || "").toLowerCase();
    const score = terms.reduce((s, t) => s + (text.includes(t) ? 2 : 0), 0)
      + (text.length > 200 ? 1 : 0); // slight boost for longer entries
    return { text: (e.shaped || e.raw || "").slice(0, 300), score, date: e.createdAt };
  }).filter(e => e.score > 0).sort((a,b) => b.score - a.score);
  return scored.slice(0, maxEntries).map(e => `— "${e.text.trim()}"`).join("\n");
};

// Step 2: Score connections using 3-layer overlap + temporal weighting
const recencyMultiplier = (node) => {
  const ts = node.lastVisited || node.createdAt || 0;
  const age = Date.now() - ts;
  const day = 86400000;
  if (age < 7 * day)  return 1.3;
  if (age < 30 * day) return 1.1;
  return 1.0;
};

const scoreConnection = (nodeA, nodeB) => {
  const a = nodeA.fingerprint || { emotional:[], themes:[], archetype:"" };
  const b = nodeB.fingerprint || { emotional:[], themes:[], archetype:"" };

  // Emotional overlap
  const aEmo = new Set((a.emotional||[]).map(e=>e.toLowerCase()));
  const bEmo = new Set((b.emotional||[]).map(e=>e.toLowerCase()));
  const emoOverlap = [...aEmo].filter(e=>bEmo.has(e)).length;
  const emoScore = emoOverlap / Math.max(aEmo.size + bEmo.size - emoOverlap, 1);

  // Thematic overlap
  const aThm = new Set((a.themes||[]).map(t=>t.toLowerCase()));
  const bThm = new Set((b.themes||[]).map(t=>t.toLowerCase()));
  const thmOverlap = [...aThm].filter(t=>bThm.has(t)).length;
  const thmScore = thmOverlap / Math.max(aThm.size + bThm.size - thmOverlap, 1);

  // Archetypal resonance
  const arcScore = (a.archetype && b.archetype && a.archetype === b.archetype) ? 0.4 : 0;

  // Legacy tags fallback
  const aT = new Set((nodeA.tags||[]).map(t=>t.toLowerCase()));
  const bT = new Set((nodeB.tags||[]).map(t=>t.toLowerCase()));
  const tagOverlap = [...aT].filter(t=>bT.has(t)).length;
  const tagScore = tagOverlap / Math.max(aT.size + bT.size - tagOverlap, 1);

  const structural = emoScore * 0.4 + thmScore * 0.35 + arcScore * 0.15 + tagScore * 0.1;
  // Apply recency multiplier for node B (the existing node being compared)
  return Math.min(structural * recencyMultiplier(nodeB), 1);
};

const scoreToStrength = (score) => {
  if (score >= 0.35) return "strong";
  if (score >= 0.12) return "faint";
  if (score >= 0.04) return "whisper";
  return null; // no connection
};

  ).join("\n");

  const system = `You are judging semantic resonance between nodes in someone's inner world map. For each pair, rate how deeply they resonate — not surface similarity but genuine emotional or archetypal echo. Return ONLY a JSON array of numbers 0–1, one per pair, no other text.${feedbackCtx}`;
