// Live re-scoring — re-evaluate ALL existing node pairs against each other periodically
const aiLiveRescore = async (nodes, edges) => {
  if (nodes.length < 3) return edges;
  // Find pairs that don't have edges yet but might now connect
  const edgeSet = new Set(edges.map(e=>`${[e.from,e.to].sort().join("|")}`));
  const newEdgeCandidates = [];

  for (let i=0; i<nodes.length; i++) {
    for (let j=i+1; j<nodes.length; j++) {
      const key = [nodes[i].id, nodes[j].id].sort().join("|");
      if (edgeSet.has(key)) continue; // already connected
      const score = scoreConnection(nodes[i], nodes[j]);
      if (score >= 0.18) { // only strong latent resonances
        newEdgeCandidates.push({ a: nodes[i], b: nodes[j], score });
      }
    }
  }

  if (!newEdgeCandidates.length) return edges;

  // Take top 3 new candidates and label them
  const top = newEdgeCandidates.sort((a,b)=>b.score-a.score).slice(0,3);
  const newEdges = [];
  for (const { a, b, score } of top) {
    try {
      const label = await aiEdgeLabel(a, b);
      newEdges.push({
        id: `e_rescore_${Date.now()}_${Math.random().toString(36).slice(2,4)}`,
        from: a.id, to: b.id,
        label,
        strength: scoreToStrength(score),
        aiSuggested: true,
        discoveredLater: true,
      });
    } catch {}
  }

  return [...edges, ...newEdges];
};

// Step 6b: Constellation detection — find latent clusters of 3+ nodes sharing DNA without full edges
const aiDetectConstellations = async (nodes, edges, existingConstellations) => {
  if (nodes.length < 4) return [];
  // Build a co-theme map
  const themeMap = {};
  nodes.forEach(n => {
    const themes = [...(n.fingerprint?.themes||[]), ...(n.fingerprint?.emotional||[]), ...(n.tags||[])];
    themes.forEach(t => {
      const key = t.toLowerCase();
      if (!themeMap[key]) themeMap[key] = [];
      themeMap[key].push(n.id);
    });
  });
  // Find themes shared by 3+ nodes that aren't all already connected
  const edgeSet = new Set(edges.map(e=>`${e.from}|${e.to}`));
  const isConnected = (a, b) => edgeSet.has(`${a}|${b}`) || edgeSet.has(`${b}|${a}`);
  const knownConstellationIds = new Set((existingConstellations||[]).flatMap(c=>c.nodeIds||[]));

  const candidates = [];
  Object.entries(themeMap).forEach(([theme, nodeIds]) => {
    if (nodeIds.length < 3) return;
    const unique = [...new Set(nodeIds)];
    if (unique.length < 3) return;
    // Check that not all pairs are already connected
    let unconnectedPairs = 0;
    for (let i=0; i<unique.length; i++)
      for (let j=i+1; j<unique.length; j++)
        if (!isConnected(unique[i], unique[j])) unconnectedPairs++;
    if (unconnectedPairs < 2) return;
    // Check this isn't already a known constellation
    const key = unique.sort().join(",");
    if (candidates.find(c=>c.key===key)) return;
    candidates.push({ theme, nodeIds: unique, key });
  });
  if (!candidates.length) return [];

  // Ask Claude to name the most interesting constellation
  const top = candidates.slice(0, 3);
  const nodeDigest = nodes.reduce((m,n)=>{m[n.id]=n.name;return m;},{});
  const desc = top.map((c,i)=>
    `Cluster ${i+1} (shared: "${c.theme}"): ${c.nodeIds.map(id=>nodeDigest[id]||id).join(", ")}`
  ).join("\n");

  const system = `You are looking at someone's inner world map and noticing latent clusters — groups of nodes that share emotional DNA but aren't fully connected. For each cluster, suggest a poetic name (3–5 words) for what they might be circling. Return ONLY a JSON array: [{"clusterIndex":0,"name":"the name","insight":"one sentence on what this constellation might mean"}]. No other text.`;
  try {
    const raw = await callClaude(system, desc, 300);
    const clean = raw.replace(/```json|```/g, "").trim();
    const named = JSON.parse(clean);
    return named.map(item => ({
      id: `const_${Date.now()}_${Math.random().toString(36).slice(2,5)}`,
      name: item.name,
      insight: item.insight,
      nodeIds: top[item.clusterIndex]?.nodeIds || [],
      theme: top[item.clusterIndex]?.theme || "",
      detectedAt: Date.now(),
    })).filter(c => c.nodeIds.length >= 3);
  } catch { return []; }
};

    // Blend structural + semantic (60/40)

Return ONLY a JSON array: [{"id":"node_id","strength":"strong|faint|whisper"}]. Max 5. Return [] if nothing truly resonates.`;

  const raw = await callClaude(system, prompt, 200);

// Step 6: Re-evaluate edge strengths when soul profile updates (gentle evolution)
const aiEvolveEdges = (edges, nodes) => {
  return edges.map(edge => {
    const a = nodes.find(n=>n.id===edge.from);
    const b = nodes.find(n=>n.id===edge.to);
    if (!a || !b || (!a.fingerprint && !a.tags?.length)) return edge;
    const score = scoreConnection(a, b);
    const newStrength = scoreToStrength(score);
    if (!newStrength) return edge; // never delete, just keep at whisper
    // Gentle: only change if significantly different
    const ranks = { strong:3, faint:2, whisper:1 };
    const current = ranks[edge.strength||"faint"]||2;
    const target = ranks[newStrength]||2;
    if (Math.abs(current - target) >= 1) {
      // Move one step toward target, never jump
      const next = current < target ? current+1 : current-1;
      const reverseRanks = {3:"strong",2:"faint",1:"whisper"};
      return { ...edge, strength: reverseRanks[next] || edge.strength };
    }
    return edge;
  });
};

        {sv.glow && isHighlighted && (
          <line x1={a.x} y1={a.y} x2={b.x} y2={b.y}
            stroke={`rgba(180,140,100,0.18)`} strokeWidth={strokeW * 5} filter="url(#glow)" />
        )}
        <line
          x1={a.x} y1={a.y} x2={b.x} y2={b.y}
          stroke={strokeColor}
          strokeWidth={strokeW}
          strokeDasharray={dash}
        />
        {edge.label && (strength !== "whisper" || isHighlighted) && (
          <text x={mx} y={my} textAnchor="middle" dominantBaseline="middle"
            style={{ fontSize: strength==="strong" ? 9.5 : 8.5, fontFamily:"'Cormorant Garamond',serif",
              fill:`rgba(90,74,56,${isHighlighted?0.8:0.5})`, pointerEvents:"none", userSelect:"none" }}
            transform={`rotate(${labelAngle},${mx},${my})`}
          >
            {edge.label}
          </text>
        )}
      </g>
    );
  });

  return (
    <div style={{ position:"fixed", inset:0, background:"#1a1612", display:"flex", flexDirection:"column", zIndex:100 }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 22px 14px", borderBottom:"1px solid rgba(255,255,255,0.06)", flexShrink:0, zIndex:10 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"rgba(250,247,242,0.4)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", padding:0 }}>← journal</button>
        <div style={{ fontFamily:"'IM Fell English',serif", fontSize:20, color:"rgba(250,247,242,0.85)", fontStyle:"italic", letterSpacing:"0.04em" }}>the self</div>
        <div style={{ display:"flex", gap:18, alignItems:"center" }}>
          {focusId && <button onClick={()=>setFocusId(null)} style={{ background:"none", border:"none", color:"rgba(250,247,242,0.4)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.06em", padding:0 }}>← full map</button>}
          <button onClick={()=>setShowMapHistory(true)} title="map over time" disabled={mapSnapshots.length < 2} style={{ background:"none", border:"none", color: mapSnapshots.length >= 2 ? "rgba(250,247,242,0.35)" : "rgba(250,247,242,0.12)", cursor: mapSnapshots.length >= 2 ? "pointer" : "default", fontFamily:"'Cormorant Garamond',serif", fontSize:16, padding:0, lineHeight:1, width:18, textAlign:"center" }}>◷</button>
          <button onClick={()=>setShowConstellations(true)} title="constellations" disabled={constellations.length === 0} style={{ background:"none", border:"none", color: constellations.length > 0 ? "rgba(176,125,82,0.6)" : "rgba(250,247,242,0.12)", cursor: constellations.length > 0 ? "pointer" : "default", fontFamily:"'Cormorant Garamond',serif", fontSize:16, padding:0, lineHeight:1, width:18, textAlign:"center" }}>✦</button>
          <button onClick={handleReadSelf} title="read my map" disabled={data.nodes.length < 3} style={{ background:"none", border:"none", color: data.nodes.length >= 3 ? "rgba(250,247,242,0.35)" : "rgba(250,247,242,0.12)", cursor: data.nodes.length >= 3 ? "pointer" : "default", fontFamily:"'Cormorant Garamond',serif", fontSize:16, padding:0, lineHeight:1, width:18, textAlign:"center" }}>◈</button>
          <button onClick={()=>setShowSoul(true)} title="soul profile" style={{ background:"none", border:"none", color: soulProfile ? "rgba(196,88,128,0.6)" : "rgba(250,247,242,0.25)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:16, padding:0, lineHeight:1, width:18, textAlign:"center" }}>◇</button>
          <button onClick={()=>{ setAdding(true); setTimeout(()=>addInputRef.current?.focus(),80); }} style={{ background:"none", border:"none", color:"rgba(250,247,242,0.5)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:20, padding:0, lineHeight:1, width:18, textAlign:"center" }}>+</button>
        </div>
      </div>

      {/* Canvas */}
      <div ref={containerRef} style={{ flex:1, position:"relative", overflow:"hidden" }}>
        {data.nodes.length === 0 && !adding && (
          <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"rgba(250,247,242,0.2)", letterSpacing:"0.2em", textTransform:"uppercase", marginBottom:8 }}>your inner world</div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:18, color:"rgba(250,247,242,0.3)", marginBottom:24 }}>nothing mapped yet</div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"rgba(250,247,242,0.2)", letterSpacing:"0.06em" }}>tap + to add your first node</div>
          </div>
        )}

        {/* SVG edges */}
        <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none" }}>
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          {renderEdges()}
        </svg>

        {/* Nodes — rendered from positions state (updated each physics frame) */}
        {data.nodes.map(node => {
          const pos = positions[node.id] || posRef.current[node.id];
          if (!pos) return null;
          if (visibleNodeIds && !visibleNodeIds.has(node.id)) return null;
          const cat = catInfo(node.category);
          const isSelected = selectedId === node.id;
          const isFocus = focusId === node.id;
          const isDimmed = (focusId && !visibleNodeIds.has(node.id)) || (selectedId && !isSelected && !connectedTo(selectedId).find(n=>n.id===node.id));
          const size = isFocus ? 52 : isSelected ? 46 : 36;

          return (
            <div key={node.id}
              onMouseDown={e=>handleNodeMouseDown(e,node.id)}
              onClick={e=>{ e.stopPropagation(); if(draggingId) return; const newSel = selectedId===node.id?null:node.id; setSelectedId(newSel); setInsight(null); setEditingNode(null); if(newSel) setData(prev=>({...prev, nodes:prev.nodes.map(n=>n.id===newSel?{...n,lastVisited:Date.now()}:n)})); }}
              onDoubleClick={e=>{ e.stopPropagation(); setFocusId(node.id); setSelectedId(node.id); }}
              style={{
                position:"absolute",
                left: pos.x - size/2,
                top:  pos.y - size/2,
                width: size, height: size,
                borderRadius:"50%",
                background: node.imageData
                  ? "transparent"
                  : isSelected || isFocus
                    ? cat.color
                    : `${cat.color}44`,
                border: `${isSelected||isFocus?1.5:1}px solid ${cat.color}${isSelected||isFocus?"ff":"88"}`,
                cursor: "grab",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize: isFocus ? 20 : isSelected ? 16 : 13,
                color: isSelected||isFocus ? "rgba(250,247,242,0.95)" : `${cat.color}cc`,
                transition:"width 0.2s,height 0.2s,left 0.2s,top 0.2s,opacity 0.2s,background 0.2s",
                opacity: isDimmed ? 0.2 : 1,
                boxShadow: isSelected ? `0 0 24px ${cat.color}55` : isFocus ? `0 0 40px ${cat.color}66` : "none",
                userSelect:"none",
                zIndex: isSelected||isFocus ? 10 : 1,
                overflow: node.imageData ? "hidden" : "visible",
              }}>
              {node.imageData
                ? <img src={node.imageData} style={{ width:"100%", height:"100%", objectFit:"cover", borderRadius:"50%", opacity: isDimmed ? 0.4 : isSelected||isFocus ? 1 : 0.75 }} alt="" />
                : cat.icon
              }
              {/* Label below */}
              <div style={{
                position:"absolute",
                top:"calc(100% + 5px)",
                left:"50%", transform:"translateX(-50%)",
                whiteSpace:"nowrap",
                fontFamily:"'Cormorant Garamond',serif",
                fontSize: isSelected||isFocus ? 12 : 10,
                color: isSelected||isFocus ? "rgba(250,247,242,0.85)" : "rgba(250,247,242,0.45)",
                letterSpacing:"0.04em",
                pointerEvents:"none",
                maxWidth:120, overflow:"hidden", textOverflow:"ellipsis",
                textAlign:"center",
              }}>{node.name}</div>
            </div>
          );
        })}
      </div>

      {/* Selected node panel */}
      {selected && (
        <div className="fade-in" style={{
          position:"absolute", bottom:0, left:0, right:0,
          background:"rgba(26,22,18,0.97)",
          borderTop:"1px solid rgba(250,247,242,0.08)",
          padding:"20px 22px 28px",
          maxHeight:"44vh", overflowY:"auto",
          zIndex:20,
        }}>
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:12 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:catInfo(selected.category).color, textTransform:"uppercase", marginBottom:4 }}>
                {catInfo(selected.category).label}
              </div>
              <div style={{ fontFamily:"'IM Fell English',serif", fontSize:22, color:"rgba(250,247,242,0.9)", fontStyle:"italic" }}>{selected.name}</div>
            </div>
            {/* Image thumbnail */}
            {selected.imageData && (
              <div style={{ width:56, height:56, borderRadius:6, overflow:"hidden", flexShrink:0, marginLeft:12, border:"1px solid rgba(250,247,242,0.1)" }}>
                <img src={selected.imageData} style={{ width:"100%", height:"100%", objectFit:"cover" }} alt="" />
              </div>
            )}
            <div style={{ display:"flex", gap:16, alignItems:"center", flexShrink:0, marginLeft: selected.imageData ? 12 : 0 }}>
              <button onClick={()=>setFocusId(focusId===selected.id?null:selected.id)} style={{ background:"none", border:"none", color:"rgba(250,247,242,0.35)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.06em", padding:0 }}>{focusId===selected.id?"full map":"focus"}</button>
              <button onClick={()=>setEditingNode(editingNode?.id===selected.id ? null : { id:selected.id, name:selected.name, category:selected.category||"other", note:selected.note||"", imageData:selected.imageData||null })} style={{ background:"none", border:"none", color: editingNode?.id===selected.id ? "rgba(176,125,82,0.9)" : "rgba(250,247,242,0.35)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.06em", padding:0 }}>edit</button>
              <button onClick={()=>deleteNode(selected.id)} style={{ background:"none", border:"none", color:"rgba(180,60,50,0.6)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:12, padding:0 }}>delete</button>
              <button onClick={()=>{ setSelectedId(null); setEditingNode(null); }} style={{ background:"none", border:"none", color:"rgba(250,247,242,0.3)", cursor:"pointer", fontSize:18, padding:0, lineHeight:1 }}>×</button>
            </div>
          </div>

          {/* Inline edit form */}
          {editingNode && editingNode.id === selected.id && (
            <div style={{ marginBottom:16, padding:"14px 16px", background:"rgba(250,247,242,0.04)", border:"1px solid rgba(250,247,242,0.1)", borderRadius:10 }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.18em", color:"rgba(176,125,82,0.6)", textTransform:"uppercase", marginBottom:12 }}>edit node</div>
              {/* Name */}
              <div style={{ marginBottom:10 }}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.12em", color:"rgba(250,247,242,0.3)", textTransform:"uppercase", marginBottom:4 }}>name</div>
                <input
                  value={editingNode.name}
                  onChange={e=>setEditingNode(prev=>({...prev,name:e.target.value}))}
                  onKeyDown={e=>{ if(e.key==="Enter") saveNodeEdit(); if(e.key==="Escape") setEditingNode(null); }}
                  autoFocus
                  style={{ width:"100%", background:"transparent", border:"none", borderBottom:"1px solid rgba(176,125,82,0.4)", padding:"4px 0 6px", fontFamily:"'IM Fell English',serif", fontStyle:"italic", fontSize:18, color:"rgba(250,247,242,0.9)", outline:"none" }}
                />
              </div>
              {/* Category */}
              <div style={{ marginBottom:10 }}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.12em", color:"rgba(250,247,242,0.3)", textTransform:"uppercase", marginBottom:6 }}>category</div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {Object.entries(NODE_CATEGORIES).map(([key,cat])=>(
                    <button key={key} onClick={()=>setEditingNode(prev=>({...prev,category:key}))}
                      style={{ padding:"3px 10px", borderRadius:20, border:`1px solid ${editingNode.category===key ? cat.color : "rgba(250,247,242,0.12)"}`, background: editingNode.category===key ? `${cat.color}22` : "transparent", fontFamily:"'Cormorant Garamond',serif", fontSize:10, color: editingNode.category===key ? cat.color : "rgba(250,247,242,0.4)", cursor:"pointer", letterSpacing:"0.06em", transition:"all 0.15s" }}>
                      {cat.icon} {cat.label}
                    </button>
                  ))}
                </div>
              </div>
              {/* Note */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.12em", color:"rgba(250,247,242,0.3)", textTransform:"uppercase", marginBottom:4 }}>personal note</div>
                <textarea
                  value={editingNode.note}
                  onChange={e=>setEditingNode(prev=>({...prev,note:e.target.value}))}
                  placeholder="add a note…"
                  rows={2}
                  style={{ width:"100%", background:"transparent", border:"none", borderBottom:"1px solid rgba(250,247,242,0.1)", padding:"4px 0", fontFamily:"'Lora',serif", fontSize:13, color:"rgba(250,247,242,0.5)", outline:"none", resize:"none" }}
                />
              </div>
              {/* Image upload */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.12em", color:"rgba(250,247,242,0.3)", textTransform:"uppercase", marginBottom:6 }}>image</div>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  {editingNode.imageData && (
                    <div style={{ width:40, height:40, borderRadius:6, overflow:"hidden", flexShrink:0, border:"1px solid rgba(250,247,242,0.12)" }}>
                      <img src={editingNode.imageData} style={{ width:"100%", height:"100%", objectFit:"cover" }} alt="" />
                    </div>
                  )}
                  <label style={{ cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"rgba(176,125,82,0.7)", letterSpacing:"0.06em", border:"1px solid rgba(176,125,82,0.3)", borderRadius:6, padding:"4px 12px" }}>
                    {editingNode.imageData ? "change image" : "+ add image"}
                    <input type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{
                      const file = e.target.files?.[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = ev => {
                        // Resize to max 400px to keep storage small
                        const img = new Image();
                        img.onload = () => {
                          const max = 400;
                          const scale = Math.min(1, max/Math.max(img.width, img.height));
                          const canvas = document.createElement("canvas");
                          canvas.width = img.width * scale;
                          canvas.height = img.height * scale;
                          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
                          setEditingNode(prev => ({ ...prev, imageData: canvas.toDataURL("image/jpeg", 0.82) }));
                        };
                        img.src = ev.target.result;
                      };
                      reader.readAsDataURL(file);
                      e.target.value = "";
                    }}/>
                  </label>
                  {editingNode.imageData && (
                    <button onClick={()=>setEditingNode(prev=>({...prev,imageData:null}))} style={{ background:"none", border:"none", cursor:"pointer", color:"rgba(250,247,242,0.25)", fontFamily:"'Cormorant Garamond',serif", fontSize:11, padding:0 }}>× remove</button>
                  )}
                </div>
              </div>
              <div style={{ display:"flex", gap:12, justifyContent:"flex-end" }}>
                <button onClick={()=>setEditingNode(null)} style={{ background:"none", border:"none", cursor:"pointer", color:"rgba(250,247,242,0.25)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.06em", padding:0 }}>cancel</button>
                <button onClick={saveNodeEdit} disabled={!editingNode.name.trim()} style={{ background: editingNode.name.trim() ? "rgba(176,125,82,0.2)" : "transparent", border:`1px solid ${editingNode.name.trim() ? "rgba(176,125,82,0.5)" : "rgba(250,247,242,0.1)"}`, borderRadius:6, padding:"5px 16px", cursor: editingNode.name.trim() ? "pointer" : "default", color: editingNode.name.trim() ? "rgba(176,125,82,0.9)" : "rgba(250,247,242,0.2)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.08em" }}>save</button>
              </div>
            </div>
          )}

          {/* Fingerprint tags */}
          {(selected.fingerprint?.emotional||selected.tags)?.length > 0 && (
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
              {(selected.fingerprint?.emotional || selected.tags || []).map(t=>(
                <span key={t} style={{ padding:"2px 10px", borderRadius:20, border:`1px solid ${catInfo(selected.category).color}44`, fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.12em", color:`${catInfo(selected.category).color}99`, textTransform:"lowercase" }}>{t}</span>
              ))}
              {(selected.fingerprint?.themes||[]).map(t=>(
                <span key={t} style={{ padding:"2px 10px", borderRadius:20, border:"1px solid rgba(250,247,242,0.1)", fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.12em", color:"rgba(250,247,242,0.3)", textTransform:"lowercase" }}>{t}</span>
              ))}
            </div>
          )}

          {/* Archetype */}
          {selected.fingerprint?.archetype && (
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.14em", color:"rgba(250,247,242,0.2)", textTransform:"uppercase", marginBottom:10 }}>
              ◇ {selected.fingerprint.archetype}
            </div>
          )}

          {/* Reflection — now conversational */}
          {selected.reflection && (
            <div style={{ marginBottom:12 }}>
              {/* Show active conversation if open for this node */}
              {reflectionConvo && reflectionConvo.nodeId === selected.id ? (
                <div>
                  {reflectionConvo.messages.map((msg, i) => (
                    <div key={i} style={{ marginBottom:10 }}>
                      {msg.role === "ai" ? (
                        <div style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:14, color:"rgba(250,247,242,0.6)", lineHeight:1.8 }}>{msg.text}</div>
                      ) : (
                        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"rgba(250,247,242,0.35)", lineHeight:1.7, borderLeft:"2px solid rgba(196,88,128,0.3)", paddingLeft:10, marginLeft:4 }}>{msg.text}</div>
                      )}
                    </div>
                  ))}
                  {reflectionLoading && (
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:12, color:"rgba(250,247,242,0.2)", marginBottom:8 }}>reconsidering…</div>
                  )}
                  {!reflectionLoading && (
                    <div style={{ display:"flex", gap:8, alignItems:"center", marginTop:8 }}>
                      <input
                        value={reflectionInput}
                        onChange={e=>setReflectionInput(e.target.value)}
                        onKeyDown={async e=>{
                          if(e.key==="Enter"&&reflectionInput.trim()) {
                            const reply = reflectionInput.trim();
                            setReflectionInput("");
                            setReflectionLoading(true);
                            const newMsgs = [...reflectionConvo.messages, {role:"user",text:reply}];
                            setReflectionConvo(prev=>({...prev,messages:newMsgs}));
                            try {
                              const system = `You wrote a brief reflection about a node in someone's inner world map. They pushed back or added to it. Update your understanding and respond in 1-2 sentences — not defensive, genuinely reconsidering. Don't repeat yourself. Let their correction land.`;
                              const ctx = `Original reflection: "${selected.reflection}"\nConversation so far:\n${newMsgs.map(m=>`${m.role==="ai"?"You":"Them"}: ${m.text}`).join("\n")}\nTheir latest: "${reply}"`;
                              const updated = await callClaude(system, ctx, 150);
                              const finalMsgs = [...newMsgs, {role:"ai",text:updated.trim()}];
                              setReflectionConvo(prev=>({...prev,messages:finalMsgs}));
                              // Optionally update the node's reflection if they clarified
                              if(reply.length>20) {
                                setData(prev=>({...prev, nodes:prev.nodes.map(n=>n.id===selected.id?{...n, reflection:updated.trim()}:n)}));
                              }
                            } catch{}
                            setReflectionLoading(false);
                          }
                        }}
                        placeholder="that's not quite right, it's more like…"
                        style={{ flex:1, background:"transparent", border:"none", borderBottom:"1px solid rgba(250,247,242,0.1)", padding:"4px 0", fontFamily:"'Lora',serif", fontSize:12, color:"rgba(250,247,242,0.5)", outline:"none" }}
                      />
                      <button onClick={()=>{setReflectionConvo(null);setReflectionInput("");}} style={{ background:"none",border:"none",cursor:"pointer",color:"rgba(250,247,242,0.2)",fontSize:12,fontFamily:"'Cormorant Garamond',serif",padding:0,letterSpacing:"0.04em" }}>close</button>
                    </div>
                  )}
                </div>
              ) : (
                <div>
                  <div style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:14, color:"rgba(250,247,242,0.6)", lineHeight:1.8 }}>{selected.reflection}</div>
                  <button
                    onClick={()=>setReflectionConvo({nodeId:selected.id, messages:[{role:"ai",text:selected.reflection}]})}
                    style={{ marginTop:6, background:"none", border:"none", cursor:"pointer", color:"rgba(250,247,242,0.18)", fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.1em", padding:0 }}
                  >push back on this ↩</button>
                </div>
              )}
            </div>
          )}

          {/* User note */}
          {selected.note && (
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"rgba(250,247,242,0.4)", lineHeight:1.7, marginBottom:12, borderLeft:"1px solid rgba(250,247,242,0.1)", paddingLeft:12 }}>{selected.note}</div>
          )}

          {/* Connections with strength + edge delete + visit memory */}
          {connectedTo(selected.id).length > 0 && (
            <div style={{ marginBottom:12 }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.16em", color:"rgba(250,247,242,0.25)", textTransform:"uppercase", marginBottom:6 }}>connected to</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {connectedTo(selected.id).map(n=>{
                  const edge = data.edges.find(e=>(e.from===selected.id&&e.to===n.id)||(e.to===selected.id&&e.from===n.id));
                  const str = edge?.strength || "faint";
                  const strOpacity = str==="strong"?0.85:str==="faint"?0.6:0.35;
                  const visits = edge?.coVisits || 0;
                  const isFrequent = visits >= 3;
                  return (
                    <div key={n.id} style={{ display:"flex", alignItems:"center", gap:3 }}>
                      <button
                        onClick={()=>{
                          setSelectedId(n.id);
                          if(edge?.aiSuggested) logEdgeFeedback(edge,"accepted");
                          // Track co-visit
                          if(edge) setData(prev=>({...prev, edges:prev.edges.map(ex=>ex.id===edge.id?{...ex,coVisits:(ex.coVisits||0)+1,lastCoVisit:Date.now()}:ex)}));
                        }}
                        title={visits > 0 ? `visited together ${visits}×` : undefined}
                        style={{ background:`${catInfo(n.category).color}22`, border:`${str==="strong"?"1.5px":"1px"} solid ${catInfo(n.category).color}${str==="strong"?"88":"44"}`, borderRadius:20, padding:"3px 11px", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:`${catInfo(n.category).color}`, opacity:strOpacity, cursor:"pointer", letterSpacing:"0.04em", position:"relative" }}>
                        {n.name}

// ─── IMAGE LIGHTBOX (pinch-to-zoom + drag) ────────────────────────────────────
// Tap an image to open; pinch or scroll to zoom; drag when zoomed; tap backdrop to close.
function ImageLightbox({ src, onClose }) {
  const [scale, setScale] = React.useState(1);
  const [offset, setOffset] = React.useState({ x: 0, y: 0 });
  const lastTouchDist = React.useRef(null);
  const lastTouchMid  = React.useRef(null);
  const dragging      = React.useRef(false);
  const dragStart     = React.useRef(null);
  const offsetAtDrag  = React.useRef(null);

  // Clamp offset so image doesn't drift too far off-screen
  const clamp = (s, ox, oy) => {
    const maxX = Math.max(0, (window.innerWidth  * (s - 1)) / 2);
    const maxY = Math.max(0, (window.innerHeight * (s - 1)) / 2);
    return { x: Math.min(maxX, Math.max(-maxX, ox)), y: Math.min(maxY, Math.max(-maxY, oy)) };
  };

  const onWheel = (e) => {
    e.preventDefault();
    const next = Math.min(6, Math.max(1, scale * (e.deltaY < 0 ? 1.12 : 0.89)));
    const clamped = clamp(next, offset.x, offset.y);
    setScale(next);
    setOffset(clamped);
  };

  const onTouchStart = (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist.current = Math.hypot(dx, dy);
      lastTouchMid.current  = {
        x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
        y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
      };
    } else if (e.touches.length === 1 && scale > 1) {
      dragging.current    = true;
      dragStart.current   = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      offsetAtDrag.current = { ...offset };
    }
  };

  const onTouchMove = (e) => {
    e.preventDefault();
    if (e.touches.length === 2 && lastTouchDist.current !== null) {
      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const next = Math.min(6, Math.max(1, scale * (dist / lastTouchDist.current)));
      lastTouchDist.current = dist;
      const clamped = clamp(next, offset.x, offset.y);
      setScale(next);
      setOffset(clamped);
    } else if (e.touches.length === 1 && dragging.current) {
      const dx = e.touches[0].clientX - dragStart.current.x;
      const dy = e.touches[0].clientY - dragStart.current.y;
      const clamped = clamp(scale, offsetAtDrag.current.x + dx, offsetAtDrag.current.y + dy);
      setOffset(clamped);
    }
  };

  const onTouchEnd = (e) => {
    if (e.touches.length < 2) lastTouchDist.current = null;
    if (e.touches.length === 0) dragging.current = false;
  };

  const onMouseDown = (e) => {
    if (scale <= 1) return;
    dragging.current     = true;
    dragStart.current    = { x: e.clientX, y: e.clientY };
    offsetAtDrag.current = { ...offset };
    e.preventDefault();
  };
  const onMouseMove = (e) => {
    if (!dragging.current) return;
    const clamped = clamp(scale, offsetAtDrag.current.x + e.clientX - dragStart.current.x, offsetAtDrag.current.y + e.clientY - dragStart.current.y);
    setOffset(clamped);
  };
  const onMouseUp = () => { dragging.current = false; };

  // Double-tap to reset
  const lastTap = React.useRef(0);
  const onImgClick = (e) => {
    e.stopPropagation();
    const now = Date.now();
    if (now - lastTap.current < 300) { setScale(1); setOffset({ x:0, y:0 }); }
    lastTap.current = now;
  };

  React.useEffect(() => {
    const esc = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", esc);
    return () => window.removeEventListener("keydown", esc);
  }, [onClose]);

  return (
    <div
      onClick={onClose}
      onWheel={onWheel}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      style={{
        position:"fixed", inset:0, zIndex:9000,
        background:"rgba(0,0,0,0.92)",
        display:"flex", alignItems:"center", justifyContent:"center",
        cursor: scale > 1 ? "grab" : "zoom-in",
        touchAction:"none",
      }}
    >
      <img
        src={src}
        alt="full size"
        onClick={onImgClick}
        onMouseDown={onMouseDown}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        draggable={false}
        style={{
          maxWidth:"100vw", maxHeight:"100vh",
          objectFit:"contain",
          transform:`scale(${scale}) translate(${offset.x / scale}px, ${offset.y / scale}px)`,
          transformOrigin:"center center",
          transition: dragging.current ? "none" : "transform 0.08s ease",
          userSelect:"none",
          cursor: scale > 1 ? "grab" : "zoom-in",
        }}
      />
      <button
        onClick={onClose}
        style={{
          position:"fixed", top:18, right:20,
          background:"none", border:"none", color:"rgba(255,255,255,0.7)",
          fontSize:28, cursor:"pointer", lineHeight:1, padding:"4px 8px",
          fontFamily:"'Cormorant Garamond',serif",
        }}
      >×</button>
      {scale > 1 && (
        <div style={{ position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)", color:"rgba(255,255,255,0.4)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.08em", pointerEvents:"none" }}>
          double-tap to reset · {Math.round(scale * 100)}%
        </div>
      )}
    </div>
  );
}

// ─── ERROR BOUNDARY ───────────────────────────────────────────────────────────
// Catches any render/lifecycle error in ANY child view so a bad entry or broken
// view never blanks the whole app — user always gets a recovery UI instead.
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null, dismissed: false };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("Journal ErrorBoundary caught:", error, info);
    this.setState({ info });
  }
  handleReset() {
    // Try to clear only the view state so data survives
    try {
      sessionStorage.removeItem("journal_active_id");
    } catch {}
    this.setState({ hasError: false, error: null, info: null, dismissed: false });
  }
  handleGoIndex() {
    // Navigate back to the index view — escapes corrupt-entry crash loops
    try { sessionStorage.removeItem("journal_active_id"); } catch {}
    try {
      // Signal the app to go home by dispatching a custom event that App listens for
      window.dispatchEvent(new CustomEvent("journal_go_index"));
    } catch {}
    this.setState({ hasError: false, error: null, info: null, dismissed: false });
  }
  render() {
    if (!this.state.hasError) return this.props.children;
    const isDark = document.documentElement.style.getPropertyValue("--page")
      ? ["#1","#0"].some(p => (document.documentElement.style.getPropertyValue("--page")||"").startsWith(p))
      : false;
    const bg      = isDark ? "#1a1814" : "#faf7f2";
    const ink     = isDark ? "#e8e2d8" : "#2b2016";
    const inkSoft = isDark ? "#b8b0a4" : "#5a4a38";
    const accent  = isDark ? "#9b8b7a" : "#8b5e3c";
    return (
      <div style={{
        minHeight:"100vh", background: bg,
        display:"flex", alignItems:"center", justifyContent:"center",
        padding:"40px 24px", fontFamily:"'Lora',Georgia,serif",
      }}>
        <div style={{
          maxWidth:460, width:"100%", background: isDark ? "#1e1c18" : "#fff",
          borderRadius:2, padding:"48px 40px 44px",
          boxShadow:"0 2px 4px rgba(0,0,0,0.06),0 8px 24px rgba(0,0,0,0.10)",
        }}>
          {/* Red margin line */}
          <div style={{ width:1, position:"absolute", top:0, bottom:0, left:78, background:"rgba(180,80,60,0.15)", pointerEvents:"none" }}/>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", color: accent, marginBottom:20 }}>
            something went wrong
          </div>
          <p style={{ fontSize:16, lineHeight:1.85, color: ink, marginBottom:12 }}>
            A part of the journal ran into an error. Your entries are safe — nothing was deleted.
          </p>
          <p style={{ fontSize:14, lineHeight:1.75, color: inkSoft, marginBottom:32, fontStyle:"italic" }}>
            {this.state.error?.message || "Unknown error"}
          </p>
          <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
            <button
              onClick={() => this.handleGoIndex()}
              style={{
                background:"none", border:`1px solid ${accent}`, borderRadius:2,
                padding:"8px 20px", cursor:"pointer", color: accent,
                fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em",
              }}
            >
              ← back to journal
            </button>
            <button
              onClick={() => this.handleReset()}
              style={{
                background:"none", border:`1px solid ${inkSoft}`, borderRadius:2,
                padding:"8px 20px", cursor:"pointer", color: inkSoft,
                fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em",
              }}
            >
              try to recover
            </button>
            <button
              onClick={() => window.location.reload()}
              style={{
                background:"none", border:"none", cursor:"pointer",
                color: inkSoft, fontFamily:"'Cormorant Garamond',serif",
                fontSize:13, letterSpacing:"0.06em", padding:"8px 0",
              }}
            >
              reload page
            </button>
          </div>
          <p style={{ marginTop:28, fontSize:11, color: inkSoft, fontFamily:"'Cormorant Garamond',serif", letterSpacing:"0.06em", fontStyle:"italic" }}>
            If this keeps happening, open the browser console (F12) for details.
          </p>
        </div>
      </div>
    );
  }
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(
  <ErrorBoundary>
    <App/>
  </ErrorBoundary>
);
</script>
</body>
</html>
