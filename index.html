// ─── LOCK SCREEN ──────────────────────────────────────────────────────────────
function LockScreen({ pin, onUnlock }) {
  const [input, setInput] = React.useState("");
  const [error, setError] = React.useState(false);
  const [shake, setShake] = React.useState(false);
  // Detect SHA-256 legacy pins (they don't start with "pbkdf2:")
  const isLegacyPin = pin && !pin.startsWith("pbkdf2:");

  const tryUnlock = async () => {
    if (!pin) { onUnlock(); return; }
    if (isLegacyPin) {
      // Legacy SHA-256 pin — compare with SHA-256 hash
      const enc = new TextEncoder();
      const buf = await crypto.subtle.digest("SHA-256", enc.encode(input));
      const sha = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
      if (sha === pin) { onUnlock(); return; }
    } else {
      const hashed = await hashPin(input);
      if (hashed === pin) { onUnlock(); return; }
    }
    setError(true); setShake(true); setInput("");
    setTimeout(() => setShake(false), 600);
  };

  if (!pin) { onUnlock(); return null; }
  // Show re-set warning for legacy SHA-256 pins
  const legacyWarning = isLegacyPin;

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"var(--bg)", padding:32 }}>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.22em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:40 }}>your journal</div>
      <div className={shake ? "shake" : ""} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16 }}>
        <input
          type="password" value={input} onChange={e=>{ setInput(e.target.value); setError(false); }}
          onKeyDown={e=>e.key==="Enter"&&tryUnlock()}
          placeholder="enter pin"
          autoFocus
          style={{ background:"transparent", border:"none", borderBottom:`1px solid ${error?"#b85030":"var(--rule)"}`, padding:"10px 0", fontFamily:"'Cormorant Garamond',serif", fontSize:22, color:"var(--ink)", textAlign:"center", width:160, letterSpacing:"0.3em", outline:"none" }}
        />
        {error && <div style={{ fontSize:12, color:"#b85030", fontFamily:"'Cormorant Garamond',serif", letterSpacing:"0.08em" }}>incorrect pin</div>}
        {legacyWarning && !error && <div style={{ fontSize:11, color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", textAlign:"center", maxWidth:240, lineHeight:1.6 }}>your PIN uses an older format. after unlocking, go to Settings → PIN to reset it with stronger security.</div>}
        <button onClick={tryUnlock} style={{ marginTop:8, padding:"10px 32px", borderRadius:10, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.1em", cursor:"pointer" }}>unlock</button>
      </div>
    </div>
  );
}

// ─── BURN VIEW ────────────────────────────────────────────────────────────────
function BurnView({ onBack, onSave, showBanner, speechLang }) {
  speechLang = speechLang || "en-US";
  const [raw, setRaw] = React.useState("");
  const [witness, setWitness] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [burned, setBurned] = React.useState(false);
  const [listening, setListening] = React.useState(false);
  const [speechAvail, setSpeechAvail] = React.useState(false);
  const [speechError, setSpeechError] = React.useState("");
  const [interimText, setInterimText] = React.useState("");

  const recRef = React.useRef(null);
  const rawRef = React.useRef(raw);
  const listeningRef = React.useRef(false);
  React.useEffect(() => { rawRef.current = raw; }, [raw]);
  React.useEffect(() => { listeningRef.current = listening; }, [listening]);
  React.useEffect(() => { setSpeechAvail(!!(window.SpeechRecognition || window.webkitSpeechRecognition)); }, []);

  const startListening = () => {
    setSpeechError("");
    const rec = getSpeechRecognition(speechLang);
    if (!rec) { setSpeechError("Voice not supported in this browser. Try Chrome."); return; }
    recRef.current = rec;
    let finalSoFar = rawRef.current;

    rec.onstart = () => { setListening(true); listeningRef.current = true; };

    rec.onresult = (event) => {
      let interim = "";
      let newFinal = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) newFinal += transcript + " ";
        else interim += transcript;
      }
      if (newFinal) {
        finalSoFar = (finalSoFar + (finalSoFar.endsWith(" ") || !finalSoFar ? "" : " ") + newFinal).trim();
        setRaw(finalSoFar);
      }
      setInterimText(interim);
    };

    rec.onerror = (event) => {
      const msgs = {
        "not-allowed": "Microphone access denied. Please allow mic in your browser settings.",
        "no-speech": "No speech detected — tap mic again when ready.",
        "audio-capture": "No microphone found.",
        "network": "Network error during voice recognition.",
        "aborted": "",
      };
      const msg = msgs[event.error] || `Voice error: ${event.error}`;
      if (msg) setSpeechError(msg);
      setListening(false); listeningRef.current = false; setInterimText("");
    };

    rec.onend = () => {
      setInterimText("");
      // Auto-restart on desktop only — mobile re-transcribes buffered audio causing duplication
      const isMobile = navigator.maxTouchPoints > 1;
      if (listeningRef.current && !isMobile) {
        try { rec.start(); } catch { setListening(false); listeningRef.current = false; }
      } else {
        setListening(false); listeningRef.current = false;
      }
    };

    try { rec.start(); }
    catch(err) { setSpeechError("Could not start microphone: " + err.message); setListening(false); }
  };

  const stopListening = () => {
    listeningRef.current = false;
    try { recRef.current?.stop(); } catch {}
    setListening(false); setInterimText("");
  };

  const toggleListening = () => { listening ? stopListening() : startListening(); };

  const handleBurn = async () => {
    if (listening) stopListening();
    if (!raw.trim()) { showBanner("say something first", 2000); return; }
    setLoading(true);
    try {
      const w = await burnWitness(raw);
      setWitness(w);
      setBurned(true);
    } catch(e) {
      showBanner("couldn't reach Claude — try again", 3000);
    } finally { setLoading(false); }
  };

  const handleSaveAnyway = () => {
    if (!raw.trim()) return;
    const now = Date.now();
    onSave({
      id: `j_${now}_${Math.random().toString(36).slice(2,8)}`,
      createdAt: now, updatedAt: now,
      raw: raw.trim(), mood: "raw",
      heading: "burn entry",
    });
  };

  return (
    <div className="fade-in" style={{ maxWidth:560, margin:"0 auto", padding:"48px 20px 80px" }}>
      <button onClick={()=>{ if(listening) stopListening(); onBack(); }} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", marginBottom:36 }}>← back</button>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.22em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:8 }}>burn it</div>
      <div style={{ fontFamily:"'Lora',serif", fontSize:14, color:"var(--ink-soft)", lineHeight:1.8, marginBottom:28 }}>
        Get it out. This won't be saved — unless you choose to keep it.
      </div>

      {!burned ? (
        <>
          <div style={{ position:"relative", background:"var(--page)", borderRadius:10, border:`1px solid ${listening ? "#b85030aa" : "var(--rule)"}`, padding:"18px 18px 52px", transition:"border-color 0.2s" }}>
            <textarea
              value={raw + (interimText ? " " + interimText : "")}
              onChange={e => setRaw(e.target.value)}
              placeholder={listening ? "listening… say it all" : "say the thing you haven't said…"}
              style={{ width:"100%", minHeight:200, background:"transparent", border:"none", fontFamily:"'Lora',Georgia,serif", fontSize:15, lineHeight:1.85, color:"var(--ink)", resize:"none" }}
            />
            {interimText && (
              <div style={{ position:"absolute", bottom:16, left:18, fontSize:11, color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic" }}>speaking…</div>
            )}
          </div>

          {/* Speech error */}
          {speechError && (
            <div style={{ marginTop:10, padding:"8px 14px", background:"#b8503018", border:"1px solid #b8503044", borderRadius:8, fontSize:12, color:"#b85030", fontFamily:"'Cormorant Garamond',serif" }}>
              {speechError}
              <button onClick={()=>setSpeechError("")} style={{ float:"right", background:"none", border:"none", color:"#b85030", cursor:"pointer", fontSize:16 }}>×</button>
            </div>
          )}

          <div style={{ display:"flex", gap:10, marginTop:14, alignItems:"center" }}>
            {/* Mic button */}
            {speechAvail && (
              <button onClick={toggleListening} className={listening ? "mic-recording" : ""} style={{ width:46, height:46, borderRadius:"50%", border:`2px solid ${listening ? "#b85030" : "var(--rule)"}`, background: listening ? "#b8503018" : "var(--page-warm)", cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.2s" }} title={listening ? "stop recording" : "speak it out"}>
                {listening ? "◼" : "🎙"}
              </button>
            )}
            <button onClick={handleBurn} disabled={loading || !raw.trim()} style={{ flex:1, padding:"12px 0", borderRadius:10, border:"none", background: raw.trim() && !loading ? "#b85030" : "var(--rule)", color:"var(--page)", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.08em", cursor: raw.trim() && !loading ? "pointer" : "default", transition:"all 0.2s" }}>
              {loading ? "witnessing…" : "burn & witness"}
            </button>
          </div>

          {!speechAvail && (
            <div style={{ marginTop:10, fontSize:12, color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", textAlign:"center" }}>
              voice input requires Chrome or Safari
            </div>
          )}
        </>
      ) : (
        <div className="fade-in">
          <div style={{ padding:"28px 32px", background:"var(--page)", borderRadius:12, border:`1px solid var(--rule)`, marginBottom:24 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:12 }}>witnessed</div>
            <div style={{ fontFamily:"'Lora',serif", fontSize:17, lineHeight:1.9, color:"var(--ink)", fontStyle:"italic" }}>{witness}</div>
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={onBack} style={{ flex:1, padding:"12px 0", borderRadius:10, border:`1px solid var(--rule)`, background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.08em", cursor:"pointer" }}>
              let it go
            </button>
            <button onClick={handleSaveAnyway} style={{ flex:1, padding:"12px 0", borderRadius:10, border:`1px solid var(--accent)`, background:"transparent", color:"var(--accent)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.08em", cursor:"pointer" }}>
              keep it anyway
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function CalendarView({ entries, onOpen, onBack }) {
  const today = new Date();
  const [year, setYear]   = React.useState(today.getFullYear());
  const [month, setMonth] = React.useState(today.getMonth());

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay    = new Date(year, month, 1).getDay();
  const monthNames  = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const entryMap = {};
  entries.forEach(e => {
    const d = new Date(e.createdAt);
    if (d.getFullYear() === year && d.getMonth() === month) {
      const key = d.getDate();
      if (!entryMap[key]) entryMap[key] = [];
      entryMap[key].push(e);
    }
  });

  const prevMonth = () => { if (month === 0) { setMonth(11); setYear(y=>y-1); } else setMonth(m=>m-1); };
  const nextMonth = () => { if (month === 11) { setMonth(0); setYear(y=>y+1); } else setMonth(m=>m+1); };

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div className="fade-in" style={{ maxWidth:520, margin:"0 auto", padding:"36px 20px 60px" }}>
      <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", marginBottom:28 }}>← back</button>

      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24 }}>
        <button onClick={prevMonth} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontSize:18 }}>‹</button>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:18, letterSpacing:"0.08em", color:"var(--ink)" }}>{monthNames[month]} {year}</div>
        <button onClick={nextMonth} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontSize:18 }}>›</button>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:8 }}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
          <div key={d} style={{ textAlign:"center", fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.1em", color:"var(--ink-faint)", textTransform:"uppercase", padding:"4px 0" }}>{d}</div>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={`e${i}`}/>;
          const dayEntries = entryMap[day] || [];
          const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
          const mood = dayEntries[0]?.mood;
          return (
            <div key={day} onClick={()=>dayEntries.length && onOpen(dayEntries[0].id)}
              style={{ aspectRatio:"1", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", borderRadius:8, background: isToday ? "var(--ink)" : dayEntries.length ? "var(--page-warm)" : "transparent", border:`1px solid ${isToday ? "var(--ink)" : dayEntries.length ? "var(--rule)" : "transparent"}`, cursor: dayEntries.length ? "pointer" : "default", position:"relative" }}>
              <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:14, color: isToday ? "var(--page)" : dayEntries.length ? "var(--ink)" : "var(--ink-ghost)" }}>{day}</span>
              {mood && !isToday && <div style={{ width:5, height:5, borderRadius:"50%", background:MOOD_COLORS[mood]||"var(--rule)", marginTop:2 }}/>}
              {dayEntries.length > 1 && <div style={{ fontSize:9, color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif" }}>+{dayEntries.length-1}</div>}
            </div>
          );
        })}
      </div>

      <div style={{ marginTop:28, fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-faint)", textAlign:"center", letterSpacing:"0.08em" }}>
        {Object.keys(entryMap).length} entr{Object.keys(entryMap).length===1?"y":"ies"} this month
      </div>
    </div>
  );
}

// ─── THREAD VIEW ──────────────────────────────────────────────────────────────
function ThreadView({ entry, allEntries, onBack, onOpen }) {
  const [analysis, setAnalysis] = React.useState(null);
  const [loading, setLoading]   = React.useState(true);
  const [error, setError]       = React.useState("");

  const themes = entry.connectedThemes || [];
  const related = allEntries.filter(e =>
    e.id !== entry.id &&
    (e.connectedThemes || []).some(t => themes.includes(t))
  ).slice(0, 6);

  React.useEffect(() => {
    const thread = [entry, ...related].slice(0, 5);
    if (thread.length < 2) { setLoading(false); return; }
    analyzeThread(thread)
      .then(r => { setAnalysis(r); setLoading(false); })
      .catch(e => {
        setError("couldn't analyze right now — try again later");
        setLoading(false);
      });
  }, [entry.id]);

  return (
    <div className="fade-in" style={{ maxWidth:580, margin:"0 auto", padding:"36px 20px 60px" }}>
      <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", marginBottom:32 }}>← back</button>

      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.22em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:6 }}>thread</div>
      {entry.heading && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:22, color:"var(--ink)", marginBottom:24 }}>{entry.heading}</div>}

      {themes.length > 0 && (
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:28 }}>
          {themes.map(t=>(
            <span key={t} style={{ padding:"3px 12px", borderRadius:20, border:"1px solid var(--rule)", background:"var(--page-warm)", fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.1em", color:"var(--ink-soft)", textTransform:"uppercase" }}>{t}</span>
          ))}
        </div>
      )}

      {loading && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", color:"var(--ink-faint)", fontSize:14, marginBottom:24 }}>reading the thread…</div>}
      {error && <div style={{ fontFamily:"'Lora',serif", fontSize:13, color:"#b85030", marginBottom:20 }}>{error}</div>}

      {analysis && !loading && (
        <div style={{ padding:"24px 28px", background:"var(--page)", borderRadius:12, border:"1px solid var(--rule)", marginBottom:28 }}>
          {analysis.coreTheme && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.2em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:10 }}>{analysis.coreTheme}</div>}
          {analysis.arc && <div style={{ fontFamily:"'Lora',serif", fontSize:15, lineHeight:1.85, color:"var(--ink)", marginBottom:16 }}>{analysis.arc}</div>}
          {analysis.latestShift && <div style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:14, color:"var(--ink-soft)", borderTop:"1px solid var(--rule)", paddingTop:14 }}>{analysis.latestShift}</div>}
        </div>
      )}

      {related.length > 0 && (
        <>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:12 }}>connected entries</div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {related.map(e=>(
              <div key={e.id} onClick={()=>onOpen(e.id)} style={{ padding:"14px 18px", background:"var(--page-warm)", borderRadius:10, border:"1px solid var(--rule)", cursor:"pointer" }}
                onMouseEnter={ev=>ev.currentTarget.style.opacity="0.7"} onMouseLeave={ev=>ev.currentTarget.style.opacity="1"}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.12em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:4 }}>{formatDate(e.createdAt)}</div>
                <div style={{ fontFamily:"'Lora',serif", fontSize:14, color:"var(--ink-soft)", fontStyle:"italic" }}>
                  {e.heading || (e.shaped||e.raw||"").slice(0,70) + "…"}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {related.length === 0 && !loading && (
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:14, color:"var(--ink-faint)", textAlign:"center", marginTop:20 }}>
          no connected entries yet — keep writing
        </div>
      )}
    </div>
  );
}

  { id:"cream",  bg:"#fdf6e3", border:"#e8d9b0", label:"cream"  },
  { id:"rose",   bg:"#fce8e8", border:"#e8c0c0", label:"rose"   },
  { id:"sage",   bg:"#e8f0e8", border:"#b8d0b8", label:"sage"   },
  { id:"slate",  bg:"#e8ecf0", border:"#b8c8d8", label:"slate"  },
  { id:"ochre",  bg:"#f5ede0", border:"#d8c0a0", label:"ochre"  },
  { id:"lavender",bg:"#ede8f5",border:"#c8b8e0", label:"lilac"  },
];

const loadStickyNotes = () => {
  try {
    const raw = localStorage.getItem(STICKY_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
};
const saveStickyNotes = (notes) => {

};

// ── Quick-create popup (triggered by ✦ FAB) ──────────────────────────────────
function QuickStickyPopup({ onSave, onClose, onGoToPage }) {
  const [heading, setHeading] = React.useState("");
  const [color, setColor] = React.useState(STICKY_COLORS[0].id);
  const [blocks, setBlocks] = React.useState([{ id:`b_${Date.now()}`, type:"text", content:"" }]);
  const firstRef = React.useRef(null);

  React.useEffect(() => { setTimeout(() => firstRef.current?.focus(), 80); }, []);

  const addBlock = (type) => {
    setBlocks(prev => [...prev, { id:`b_${Date.now()}`, type, content:"", checked:false }]);
  };
  const updateBlock = (id, val) => setBlocks(prev => prev.map(b => b.id===id ? {...b, content:val} : b));
  const toggleCheck = (id) => setBlocks(prev => prev.map(b => b.id===id ? {...b, checked:!b.checked} : b));
  const removeBlock = (id) => setBlocks(prev => prev.filter(b => b.id!==id));

  const handleSave = () => {
    // Discard empty blocks before saving
    const cleanBlocks = blocks.filter(b => b.content.trim());
    const hasContent = heading.trim() || cleanBlocks.length > 0;
    if (!hasContent) { onClose(); return; }
    const note = {
      id: `sn_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
      createdAt: Date.now(),
      heading: heading.trim(),
      color,
      blocks: cleanBlocks.length > 0 ? cleanBlocks : [{ id:`b_${Date.now()}`, type:"text", content:"" }],
      pinned: false,
    };
    onSave(note);
    onClose();
  };

  const colorObj = STICKY_COLORS.find(c=>c.id===color) || STICKY_COLORS[0];

  return (
    <>
      {/* Backdrop */}
      <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(43,32,22,0.18)", zIndex:80 }}/>
      {/* Popup */}
      <div className="fade-in" style={{
        position:"fixed", bottom:96, right:20, zIndex:81,
        width: Math.min(window.innerWidth - 40, 300),
        background: colorObj.bg,
        border:`1px solid ${colorObj.border}`,
        borderRadius:14,
        boxShadow:"0 12px 48px rgba(43,32,22,0.22)",
        overflow:"hidden",
      }}>
        {/* Color picker row */}
        <div style={{ display:"flex", gap:6, padding:"12px 14px 8px", borderBottom:`1px solid ${colorObj.border}` }}>
          {STICKY_COLORS.map(c => (
            <button key={c.id} onClick={()=>setColor(c.id)} style={{
              width:18, height:18, borderRadius:"50%", background:c.bg,
              border:`2px solid ${color===c.id ? "#2b2016" : c.border}`,
              cursor:"pointer", flexShrink:0, transition:"border 0.15s"
            }}/>
          ))}
        </div>

        <div style={{ padding:"10px 14px 12px" }}>
          {/* Heading */}
          <input
            ref={firstRef}
            value={heading}
            onChange={e=>setHeading(e.target.value)}
            placeholder="heading…"
            style={{
              width:"100%", background:"transparent", border:"none",
              borderBottom:`1px solid ${colorObj.border}`, padding:"4px 0 6px",
              fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic",
              fontSize:18, color:"var(--ink)", outline:"none", marginBottom:10
            }}
          />

          {/* Blocks */}
          <div style={{ maxHeight:220, overflowY:"auto" }}>
            {blocks.map((block, idx) => (
              <div key={block.id} style={{ display:"flex", alignItems:"flex-start", gap:6, marginBottom:6 }}>
                {block.type === "checkbox" ? (
                  <button onClick={()=>toggleCheck(block.id)} style={{
                    width:16, height:16, borderRadius:4, flexShrink:0, marginTop:3,
                    border:`1.5px solid ${block.checked ? "var(--accent)" : colorObj.border}`,
                    background: block.checked ? "var(--accent)" : "transparent",
                    cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:9, color:"var(--page)", transition:"all 0.15s"
                  }}>{block.checked ? "✓" : ""}</button>
                ) : block.type === "ul" ? (
                  <div style={{ width:5, height:5, borderRadius:"50%", background:colorObj.border, flexShrink:0, marginTop:7 }}/>
                ) : block.type === "ol" ? (
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-faint)", flexShrink:0, marginTop:2 }}>{idx+1}.</div>
                ) : (
                  <div style={{ width:16, flexShrink:0 }}/>
                )}
                <textarea
                  value={block.content}
                  onChange={e=>updateBlock(block.id, e.target.value)}
                  placeholder={block.type==="checkbox" ? "checklist item…" : "write here…"}
                  rows={1}
                  style={{
                    flex:1, background:"transparent", border:"none", resize:"none",
                    fontFamily:"'Lora',serif", fontSize:13, lineHeight:1.6,
                    color: block.checked ? "var(--ink-ghost)" : "var(--ink)",
                    textDecoration: block.checked ? "line-through" : "none",
                    outline:"none", padding:0, overflow:"hidden",
                  }}
                  onInput={e=>{ e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px"; }}
                />
                {blocks.length > 1 && (
                  <button onClick={()=>removeBlock(block.id)} style={{ background:"none", border:"none", color:"var(--ink-ghost)", cursor:"pointer", fontSize:13, flexShrink:0, padding:"2px 0", lineHeight:1 }}>×</button>
                )}
              </div>
            ))}
          </div>

          {/* Add block row */}
          <div style={{ display:"flex", gap:6, marginTop:8, paddingTop:8, borderTop:`1px solid ${colorObj.border}`, flexWrap:"wrap" }}>
            <button onClick={()=>addBlock("text")} style={{ background:"none", border:`1px solid ${colorObj.border}`, borderRadius:6, padding:"3px 8px", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-soft)", cursor:"pointer", letterSpacing:"0.06em" }}>+ text</button>
            <button onClick={()=>addBlock("checkbox")} style={{ background:"none", border:`1px solid ${colorObj.border}`, borderRadius:6, padding:"3px 8px", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-soft)", cursor:"pointer", letterSpacing:"0.06em" }}>☑ check</button>
            <button onClick={()=>addBlock("ul")} style={{ background:"none", border:`1px solid ${colorObj.border}`, borderRadius:6, padding:"3px 8px", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-soft)", cursor:"pointer", letterSpacing:"0.06em" }}>• list</button>
            <button onClick={()=>addBlock("ol")} style={{ background:"none", border:`1px solid ${colorObj.border}`, borderRadius:6, padding:"3px 8px", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-soft)", cursor:"pointer", letterSpacing:"0.06em" }}>1.</button>
            <div style={{ flex:1 }}/>
            <button onClick={handleSave} style={{
              background:"var(--ink)", border:"none", borderRadius:8,
              padding:"5px 14px", fontFamily:"'Cormorant Garamond',serif",
              fontSize:12, color:"var(--page)", cursor:"pointer", letterSpacing:"0.06em"
            }}>save</button>
          </div>
        </div>
      </div>
    </>
  );
}

// ── Full Sticky Notes Page ────────────────────────────────────────────────────
function StickyNotesPage({ stickyNotes, setStickyNotes, onBack, showConfirm }) {
  const [editingId, setEditingId] = React.useState(null);
  const [editNote, setEditNote] = React.useState(null);
  const [showArchived, setShowArchived] = React.useState(false);
  const dragItem = React.useRef(null);
  const dragOver = React.useRef(null);

  const pinNote     = (id) => setStickyNotes(prev => prev.map(n => n.id===id ? {...n, pinned:!n.pinned} : n));
  const deleteNote  = async (id) => { const ok = await showConfirm("Delete this note?"); if (!ok) return; setStickyNotes(prev => prev.filter(n => n.id!==id)); };
  const archiveNote = (id) => setStickyNotes(prev => prev.map(n => n.id===id ? {...n, archived:!n.archived, pinned: n.archived ? n.pinned : false} : n));

  const startEdit = (note) => {
    setEditNote(JSON.parse(JSON.stringify(note)));
    setEditingId(note.id);
  };
  const saveEdit = () => {
    if (!editNote) return;
    const cleanBlocks = editNote.blocks.filter(b => b.content.trim());
    const savedNote = { ...editNote, blocks: cleanBlocks.length > 0 ? cleanBlocks : [{ id:`b_${Date.now()}`, type:"text", content:"" }] };
    setStickyNotes(prev => prev.map(n => n.id===savedNote.id ? savedNote : n));
    setEditingId(null); setEditNote(null);
  };
  const cancelEdit = () => { setEditingId(null); setEditNote(null); };

  const addNewNote = () => {
    const note = {
      id: `sn_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
      createdAt: Date.now(),
      heading: "",
      color: STICKY_COLORS[0].id,
      blocks: [{ id:`b_${Date.now()}`, type:"text", content:"" }],
      pinned: false,
      archived: false,
    };
    setStickyNotes(prev => [note, ...prev]);
    startEdit(note);
  };

  // Drag-to-reorder notes
  const handleDragStart = (idx) => { dragItem.current = idx; };
  const handleDragEnter = (idx) => { dragOver.current = idx; };
  const handleDragEnd   = (filteredList, field) => {
    if (dragItem.current === null || dragOver.current === null || dragItem.current === dragOver.current) {
      dragItem.current = null; dragOver.current = null; return;
    }
    const reordered = [...filteredList];
    const dragged = reordered.splice(dragItem.current, 1)[0];
    reordered.splice(dragOver.current, 0, dragged);
    // Merge back preserving the other group
    setStickyNotes(prev => {
      const others = prev.filter(n => !reordered.find(r=>r.id===n.id));
      return [...reordered, ...others];
    });
    dragItem.current = null; dragOver.current = null;
  };

  if (editingId && editNote) {
    return <StickyNoteEditor note={editNote} setNote={setEditNote} onSave={saveEdit} onCancel={cancelEdit} onDelete={()=>{ deleteNote(editNote.id); cancelEdit(); }}/>;
  }

  const active   = stickyNotes.filter(n => !n.archived);
  const archived = stickyNotes.filter(n => n.archived);
  const pinned   = active.filter(n => n.pinned);
  const unpinned = active.filter(n => !n.pinned);

  const renderGrid = (list, label) => (
    <>
      {label && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.2em", color: label==="pinned to journal" ? "var(--accent)" : "var(--ink-faint)", textTransform:"uppercase", marginBottom:10, paddingBottom:4, borderBottom:"1px solid var(--rule)" }}>{label==="pinned to journal" ? "✦ "+label : label}</div>}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(145px,1fr))", gap:12, marginBottom:24 }}>
        {list.map((note, idx) => (
          <div key={note.id}
            draggable
            onDragStart={()=>handleDragStart(idx)}
            onDragEnter={()=>handleDragEnter(idx)}
            onDragEnd={()=>handleDragEnd(list)}
            onDragOver={e=>e.preventDefault()}>
            <StickyCard
              note={note}
              onEdit={()=>startEdit(note)}
              onPin={()=>pinNote(note.id)}
              onDelete={()=>deleteNote(note.id)}
              onArchive={()=>archiveNote(note.id)}
            />
          </div>
        ))}
      </div>
    </>
  );

  return (
    <div className="fade-in" style={{ maxWidth:580, margin:"0 auto", padding:"32px 18px 100px" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:28 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", padding:0 }}>← journal</button>
        <div style={{ fontFamily:"'IM Fell English',serif", fontSize:22, color:"var(--ink)", fontStyle:"italic" }}>✦ notes</div>
        <button onClick={addNewNote} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", padding:0 }}>+ new</button>
      </div>

      {stickyNotes.length === 0 && (
        <div style={{ textAlign:"center", padding:"60px 20px" }}>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:40, color:"var(--rule)", marginBottom:12 }}>✦</div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:18, color:"var(--ink-soft)", marginBottom:8 }}>no notes yet</div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-faint)", lineHeight:1.7 }}>goals, reminders, courses —<br/>keep it here</div>
        </div>
      )}

      {pinned.length > 0 && renderGrid(pinned, "pinned to journal")}
      {unpinned.length > 0 && renderGrid(unpinned, pinned.length > 0 ? "notes" : null)}

      {archived.length > 0 && (
        <>
          <button onClick={()=>setShowArchived(o=>!o)} style={{ background:"none", border:`1px solid var(--rule)`, borderRadius:20, padding:"5px 14px", fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-faint)", cursor:"pointer", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:16 }}>
            {showArchived ? "hide" : "show"} archived ({archived.length})
          </button>
          {showArchived && renderGrid(archived, "archived")}
        </>
      )}
    </div>
  );
}

function StickyCard({ note, onEdit, onPin, onDelete, onArchive, isDragging, dragHandleProps }) {
  const colorObj = STICKY_COLORS.find(c=>c.id===note.color) || STICKY_COLORS[0];
  const [menuOpen, setMenuOpen] = React.useState(false);
  const menuRef = React.useRef();

  React.useEffect(() => {
    if (!menuOpen) return;
    const h = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener("mousedown", h);
    document.addEventListener("touchstart", h);
    return () => { document.removeEventListener("mousedown", h); document.removeEventListener("touchstart", h); };
  }, [menuOpen]);

  const menuItems = [
    { label:"edit", action: onEdit },
    { label: note.pinned ? "unpin from journal" : "pin to journal", action: () => { onPin(); setMenuOpen(false); } },
    { label: note.archived ? "unarchive" : "archive", action: () => { onArchive(); setMenuOpen(false); } },
    { label:"delete", action: () => { onDelete(); setMenuOpen(false); }, danger: true },
  ];

  const renderBlockPreview = (block, idx) => {
    const colorIdx = block.type === "ol" ? idx + 1 : null;
    return (
      <div key={block.id} style={{ display:"flex", alignItems:"flex-start", gap:5, marginBottom:3 }}>
        {block.type==="checkbox" && (
          <div style={{
            width:11, height:11, borderRadius:3, flexShrink:0, marginTop:3,
            border:`1.5px solid ${block.checked ? "var(--accent)" : colorObj.border}`,
            background: block.checked ? "var(--accent)" : "transparent",
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:6, color:"var(--page)"
          }}>{block.checked?"✓":""}</div>
        )}
        {block.type==="ul" && <div style={{ width:5, height:5, borderRadius:"50%", background: colorObj.border, flexShrink:0, marginTop:5 }}/>}
        {block.type==="ol" && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, color:"var(--ink-faint)", flexShrink:0, marginTop:1 }}>{colorIdx}.</div>}
        {block.content && (
          <div style={{
            fontFamily:"'Lora',serif", fontSize:12, lineHeight:1.5,
            color: block.checked ? "var(--ink-ghost)" : "var(--ink-soft)",
            textDecoration: block.checked ? "line-through" : "none",
            textDecorationColor:"var(--ink-ghost)", wordBreak:"break-word",
          }}>{block.content}</div>
        )}
      </div>
    );
  };

  return (
    <div style={{
      background: colorObj.bg, border:`1px solid ${colorObj.border}`,
      borderRadius:12, padding:"12px 12px 10px",
      boxShadow: isDragging ? "0 8px 28px rgba(43,32,22,0.18)" : "0 2px 12px rgba(43,32,22,0.08)",
      transition:"transform 0.15s, box-shadow 0.15s, opacity 0.15s",
      opacity: isDragging ? 0.7 : 1,
      position:"relative",
    }} className="drag-zone">
      {/* Invisible drag handle in top-left corner */}
      <div {...(dragHandleProps||{})} className="drag-handle" style={{ position:"absolute", top:0, left:0, width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:"var(--ink-ghost)", cursor:"grab", zIndex:2, borderRadius:"12px 0 8px 0", background:"rgba(43,32,22,0.06)", ...(dragHandleProps?.style||{}) }} title="drag to reorder">⠿</div>
      {/* Top row: pin indicator + three-dot */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", marginBottom: note.heading ? 4 : 2 }}>
          {note.pinned && <div style={{ fontSize:9, color:"var(--accent)" }}>✦</div>}
          {note.archived && <div style={{ fontSize:9, color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", letterSpacing:"0.06em" }}>archived</div>}
          <div ref={menuRef} style={{ position:"relative" }}>
            <button onClick={e=>{ e.stopPropagation(); setMenuOpen(o=>!o); }}
              style={{ background:"none", border:"none", cursor:"pointer", padding:"2px 6px", color:"var(--ink-faint)", fontSize:15, lineHeight:1, borderRadius:4 }}
              title="options">⋯</button>
            {menuOpen && (
              <div className="fade-in" style={{
                position:"absolute", right:0, top:"calc(100% + 4px)", zIndex:200,
                background:"var(--page)", border:`1px solid var(--rule)`, borderRadius:10,
                padding:"4px 0", minWidth:160, boxShadow:"0 8px 24px rgba(43,32,22,0.14)"
              }}>
                {menuItems.map((item,i) => (
                  <button key={i} onClick={e=>{ e.stopPropagation(); item.action(); setMenuOpen(false); }}
                    style={{ width:"100%", textAlign:"left", padding:"8px 14px", background:"none", border:"none",
                      fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.04em",
                      color: item.danger ? "#b85030" : "var(--ink-soft)", cursor:"pointer" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--page-warm)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    {item.label}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>

      {/* Click area for edit */}
      <div onClick={onEdit} style={{ cursor:"pointer" }}>
        {note.heading && (
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:15, color:"var(--ink)", marginBottom:6, lineHeight:1.3 }}>{note.heading}</div>
        )}
        {note.blocks && note.blocks.map((block, idx) => renderBlockPreview(block, idx))}
      </div>
    </div>
  );
}

function StickyNoteEditor({ note, setNote, onSave, onCancel, onDelete }) {
  const colorObj = STICKY_COLORS.find(c=>c.id===note.color) || STICKY_COLORS[0];
  const firstRef = React.useRef(null);
  const dragItem = React.useRef(null);
  const dragOver = React.useRef(null);
  React.useEffect(() => { setTimeout(() => firstRef.current?.focus(), 80); }, []);

  const updateHeading = (val) => setNote(n => ({...n, heading:val}));
  const updateColor   = (val) => setNote(n => ({...n, color:val}));
  const addBlock = (type) => setNote(n => ({...n, blocks:[...n.blocks, { id:`b_${Date.now()}`, type, content:"", checked:false }]}));
  const updateBlock = (id, val) => setNote(n => ({...n, blocks: n.blocks.map(b => b.id===id ? {...b, content:val} : b)}));
  const toggleCheck = (id) => setNote(n => ({...n, blocks: n.blocks.map(b => b.id===id ? {...b, checked:!b.checked} : b)}));
  const removeBlock = (id) => setNote(n => ({...n, blocks: n.blocks.filter(b => b.id!==id)}));
  const togglePin   = () => setNote(n => ({...n, pinned:!n.pinned}));

  // Drag reorder
  const handleDragStart = (idx) => { dragItem.current = idx; };
  const handleDragEnter = (idx) => { dragOver.current = idx; };
  const handleDragEnd   = () => {
    if (dragItem.current === null || dragOver.current === null || dragItem.current === dragOver.current) {
      dragItem.current = null; dragOver.current = null; return;
    }
    setNote(n => {
      const blocks = [...n.blocks];
      const dragged = blocks.splice(dragItem.current, 1)[0];
      blocks.splice(dragOver.current, 0, dragged);
      dragItem.current = null; dragOver.current = null;
      return {...n, blocks};
    });
  };

  const olCount = (blocks, upToIdx) => blocks.slice(0, upToIdx+1).filter(b=>b.type==="ol").length;

  return (
    <div className="fade-in" style={{ maxWidth:540, margin:"0 auto", padding:"32px 18px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24 }}>
        <button onClick={onCancel} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", padding:0 }}>← back</button>
        <div style={{ display:"flex", gap:16 }}>
          <button onClick={togglePin} style={{ background:"none", border:"none", cursor:"pointer", color: note.pinned ? "var(--accent)" : "var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>{note.pinned ? "✦ pinned" : "✦ pin"}</button>
          <button onClick={onDelete} style={{ background:"none", border:"none", cursor:"pointer", color:"#b85030", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.06em", padding:0 }}>delete</button>
        </div>
      </div>

      {/* Card */}
      <div style={{
        background: colorObj.bg, border:`1px solid ${colorObj.border}`,
        borderRadius:16, padding:"20px 20px 16px",
        boxShadow:"0 4px 24px rgba(43,32,22,0.10)"
      }}>
        {/* Color picker */}
        <div style={{ display:"flex", gap:8, marginBottom:14 }}>
          {STICKY_COLORS.map(c => (
            <button key={c.id} onClick={()=>updateColor(c.id)} style={{
              width:20, height:20, borderRadius:"50%", background:c.bg,
              border:`2px solid ${note.color===c.id ? "#2b2016" : c.border}`,
              cursor:"pointer", flexShrink:0, transition:"border 0.15s"
            }}/>
          ))}
        </div>

        {/* Heading */}
        <input
          ref={firstRef}
          value={note.heading}
          onChange={e=>updateHeading(e.target.value)}
          placeholder="heading…"
          style={{
            width:"100%", background:"transparent", border:"none",
            borderBottom:`1px solid ${colorObj.border}`, padding:"4px 0 8px",
            fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic",
            fontSize:22, color:"var(--ink)", outline:"none", marginBottom:14
          }}
        />

        {/* Blocks — draggable */}
        <div style={{ minHeight:80 }}>
          {note.blocks.map((block, idx) => (
            <div key={block.id}
              draggable
              onDragStart={()=>handleDragStart(idx)}
              onDragEnter={()=>handleDragEnter(idx)}
              onDragEnd={handleDragEnd}
              onDragOver={e=>e.preventDefault()}
              style={{ display:"flex", alignItems:"flex-start", gap:8, marginBottom:10, cursor:"default" }}>
              {/* Drag handle */}
              <div className="drag-handle" style={{ paddingTop:6, fontSize:13, flexShrink:0 }} title="drag to reorder">⠿</div>
              {/* Block type indicator */}
              {block.type === "checkbox" ? (
                <button onClick={()=>toggleCheck(block.id)} style={{
                  width:18, height:18, borderRadius:4, flexShrink:0, marginTop:4,
                  border:`1.5px solid ${block.checked ? "var(--accent)" : colorObj.border}`,
                  background: block.checked ? "var(--accent)" : "transparent",
                  cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:10, color:"var(--page)", transition:"all 0.15s"
                }}>{block.checked ? "✓" : ""}</button>
              ) : block.type === "ul" ? (
                <div style={{ width:6, height:6, borderRadius:"50%", background:colorObj.border, flexShrink:0, marginTop:8 }}/>
              ) : block.type === "ol" ? (
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-faint)", flexShrink:0, marginTop:4, minWidth:16, textAlign:"right" }}>{olCount(note.blocks,idx)}.</div>
              ) : (
                <div style={{ width:18, flexShrink:0 }}/>
              )}
              <textarea
                value={block.content}
                onChange={e=>updateBlock(block.id, e.target.value)}
                placeholder={
                  block.type==="checkbox" ? "checklist item…" :
                  block.type==="ul" ? "list item…" :
                  block.type==="ol" ? "numbered item…" : "write here…"
                }
                rows={1}
                style={{
                  flex:1, background:"transparent", border:"none", resize:"none",
                  fontFamily:"'Lora',serif", fontSize:14, lineHeight:1.7,
                  color: block.checked ? "var(--ink-ghost)" : "var(--ink)",
                  textDecoration: block.checked ? "line-through" : "none",
                  outline:"none", padding:0,
                  borderBottom:`1px solid ${colorObj.border}`, paddingBottom:6,
                }}
                onInput={e=>{ e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px"; }}
              />
              {note.blocks.length > 1 && (
                <button onClick={()=>removeBlock(block.id)} style={{ background:"none", border:"none", color:"var(--ink-ghost)", cursor:"pointer", fontSize:16, flexShrink:0, padding:"2px 0" }}>×</button>
              )}
            </div>
          ))}
        </div>

        {/* Add block — now with ul + ol */}
        <div style={{ display:"flex", gap:6, marginTop:12, paddingTop:10, borderTop:`1px solid ${colorObj.border}`, flexWrap:"wrap" }}>
          <button onClick={()=>addBlock("text")} style={{ background:"none", border:`1px solid ${colorObj.border}`, borderRadius:6, padding:"4px 9px", fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-soft)", cursor:"pointer" }}>+ text</button>
          <button onClick={()=>addBlock("checkbox")} style={{ background:"none", border:`1px solid ${colorObj.border}`, borderRadius:6, padding:"4px 9px", fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-soft)", cursor:"pointer" }}>☑ checklist</button>
          <button onClick={()=>addBlock("ul")} style={{ background:"none", border:`1px solid ${colorObj.border}`, borderRadius:6, padding:"4px 9px", fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-soft)", cursor:"pointer" }}>• list</button>
          <button onClick={()=>addBlock("ol")} style={{ background:"none", border:`1px solid ${colorObj.border}`, borderRadius:6, padding:"4px 9px", fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-soft)", cursor:"pointer" }}>1. ordered</button>
        </div>
      </div>

      <button onClick={onSave} style={{
        width:"100%", marginTop:16, padding:"13px", borderRadius:10, border:"none",
        background:"var(--ink)", color:"var(--page)", fontFamily:"'Cormorant Garamond',serif",
        fontSize:15, letterSpacing:"0.08em", cursor:"pointer"
      }}>save note</button>
    </div>
  );
}

// ── Pinned sticky shelf on index ──────────────────────────────────────────────
function PinnedStickyShelf({ stickyNotes, setStickyNotes, onGoToNotes }) {
  const pinned = stickyNotes.filter(n => n.pinned && !n.archived);
  const dragItem = React.useRef(null);
  const dragOver = React.useRef(null);

  const handleDragStart = (idx) => { dragItem.current = idx; };
  const handleDragEnter = (idx) => { dragOver.current = idx; };
  const handleDragEnd   = () => {
    if (dragItem.current === null || dragOver.current === null || dragItem.current === dragOver.current) {
      dragItem.current = null; dragOver.current = null; return;
    }
    const reordered = [...pinned];
    const dragged = reordered.splice(dragItem.current, 1)[0];
    reordered.splice(dragOver.current, 0, dragged);
    setStickyNotes(prev => {
      const others = prev.filter(n => !reordered.find(r=>r.id===n.id));
      return [...reordered, ...others];
    });
    dragItem.current = null; dragOver.current = null;
  };

  if (pinned.length === 0) return null;
  return (
    <div style={{ marginBottom:28 }}>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.2em", color:"var(--accent)", textTransform:"uppercase", marginBottom:10 }}>✦ pinned notes</div>
      <div style={{ display:"flex", gap:12, overflowX:"auto", paddingBottom:4, scrollbarWidth:"none" }}>
        {pinned.map((note, idx) => {
          const colorObj = STICKY_COLORS.find(c=>c.id===note.color) || STICKY_COLORS[0];
          return (
            <div key={note.id}
              draggable
              onDragStart={()=>handleDragStart(idx)}
              onDragEnter={()=>handleDragEnter(idx)}
              onDragEnd={handleDragEnd}
              onDragOver={e=>e.preventDefault()}
              onClick={onGoToNotes}
              style={{
                flexShrink:0,
                background: colorObj.bg, border:`1px solid ${colorObj.border}`,
                borderRadius:12, padding:"14px 14px 12px",
                boxShadow:"0 2px 10px rgba(43,32,22,0.08)",
                cursor:"pointer", minWidth:160, maxWidth:220,
                transition:"transform 0.15s",
              }}
              onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
              onMouseLeave={e=>e.currentTarget.style.transform=""}
            >
              {/* invisible drag zone hint */}
              <div style={{ height:4 }}/>
              {note.heading && (
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:15, color:"var(--ink)", marginBottom:8, lineHeight:1.3 }}>{note.heading}</div>
              )}
              {note.blocks && note.blocks.map((block, bIdx) => (
                <div key={block.id} style={{ display:"flex", alignItems:"flex-start", gap:5, marginBottom:4 }}>
                  {block.type==="checkbox" && (
                    <div style={{
                      width:12, height:12, borderRadius:3, flexShrink:0, marginTop:2,
                      border:`1.5px solid ${block.checked ? "var(--accent)" : colorObj.border}`,
                      background: block.checked ? "var(--accent)" : "transparent",
                      display:"flex", alignItems:"center", justifyContent:"center", fontSize:7, color:"var(--page)"
                    }}>{block.checked?"✓":""}</div>
                  )}
                  {block.type==="ul" && <div style={{ width:5, height:5, borderRadius:"50%", background:colorObj.border, flexShrink:0, marginTop:5 }}/>}
                  {block.type==="ol" && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, color:"var(--ink-faint)", flexShrink:0, marginTop:1 }}>{bIdx+1}.</div>}
                  {block.content && (
                    <div style={{
                      fontFamily:"'Lora',serif", fontSize:12, lineHeight:1.55,
                      color: block.checked ? "var(--ink-ghost)" : "var(--ink-soft)",
                      textDecoration: block.checked ? "line-through" : "none",
                      wordBreak:"break-word",
                    }}>{block.content}</div>
                  )}
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

      {/* FABs — pill with two halves */}

function OnThisDay({ allEntries, onOpen }) {
  const now = new Date();
  const todayMD = `${now.getMonth()}-${now.getDate()}`;

  // Find entries from past years on the same calendar day
  const pastEntries = allEntries.filter(e => {
    if (!e.createdAt) return false;
    const d = new Date(e.createdAt);
    const yearsDiff = now.getFullYear() - d.getFullYear();
    if (yearsDiff <= 0) return false; // only past years
    return d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
  }).sort((a, b) => b.createdAt - a.createdAt);

  if (pastEntries.length === 0) return null;

  const yearLabel = (ts) => {
    const yrs = now.getFullYear() - new Date(ts).getFullYear();
    return yrs === 1 ? "1 year ago" : `${yrs} years ago`;
  };

  const preview = (text) => {
    if (!text) return "";
    const plain = text.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
    return plain.length > 120 ? plain.slice(0, 120) + "…" : plain;
  };

  return (
    <div style={{ margin:"0 0 22px 0" }}>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:10, letterSpacing:"0.2em", color:"var(--accent)", textTransform:"uppercase", marginBottom:8, paddingBottom:4, borderBottom:"1px solid var(--rule)", display:"flex", alignItems:"center", gap:6 }}>
        <span style={{ fontSize:13 }}>◷</span> on this day
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
        {pastEntries.map((entry, i) => (
          <button
            key={entry.id}
            onClick={() => onOpen(entry.id)}
            style={{
              all:"unset", cursor:"pointer", display:"block",
              padding:"10px 12px",
              borderRadius:8,
              background: i % 2 === 0 ? "transparent" : "rgba(43,32,22,0.025)",
              transition:"background 0.15s",
              animation:`fadeUp 0.4s ease both`,
              animationDelay:`${i * 60}ms`,
            }}
            onMouseEnter={e => e.currentTarget.style.background="rgba(139,94,60,0.07)"}
            onMouseLeave={e => e.currentTarget.style.background= i % 2 === 0 ? "transparent" : "rgba(43,32,22,0.025)"}
          >
            <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:3 }}>
              <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--accent)", letterSpacing:"0.06em", fontStyle:"italic", flexShrink:0 }}>
                {yearLabel(entry.createdAt)}
              </span>
              {entry.mood && (
                <span style={{ fontSize:10, color:"var(--ink-faint)", letterSpacing:"0.04em" }}>{entry.mood}</span>
              )}
            </div>
            {entry.title && (
              <div style={{ fontFamily:"'Lora',Georgia,serif", fontSize:14, color:"var(--ink)", marginBottom:2, fontWeight:500 }}>{entry.title}</div>
            )}
            <div style={{ fontFamily:"'Lora',Georgia,serif", fontSize:13, color:"var(--ink-soft)", lineHeight:1.55, fontStyle: entry.title ? "normal" : "italic" }}>
              {preview(entry.body || entry.burnText || "")}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}
