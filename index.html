// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [entries, setEntries]     = useState(loadEntries);
  const [view, setView]           = useState("index");
  const [activeId, setActiveId]   = useState(null);
  const [syncConfig, setSyncConfig] = useState(loadSyncConfig);
  const [lockConfig, setLockConfig] = useState(loadLockConfig);
  const [appUnlocked, setAppUnlocked] = useState(()=>!loadLockConfig()?.appPin);
  const [syncPillStatus, setSyncPillStatus] = useState(null);
  const [syncPillMsg, setSyncPillMsg]       = useState("");
  const [bootPullDone, setBootPullDone]     = useState(false);
  const [bootSynced, setBootSynced]         = useState(false);
  const [search, setSearch]       = useState("");
  const [moodFilter, setMoodFilter] = useState("");
  const [menuOpen, setMenuOpen]   = useState(false);
  const [modal, setModal]         = useState(null);
  const [undoEntry, setUndoEntry] = useState(null);

  const entriesRef    = useRef(entries);
  const syncConfigRef = useRef(syncConfig);
  const isSyncingRef  = useRef(false);
  const syncTimer     = useRef(null);
  const menuRef       = useRef();
  const undoTimerRef  = useRef(null);

  useEffect(()=>{ entriesRef.current=entries; }, [entries]);
  useEffect(()=>{ syncConfigRef.current=syncConfig; }, [syncConfig]);

  useEffect(()=>{ _showBannerGlobal=showBanner; return()=>{ _showBannerGlobal=()=>{}; }; }, []);
  useEffect(()=>{ saveEntries(entries); }, [entries]);

  useEffect(()=>{ if (!menuOpen) return; const h=(e)=>{ if(menuRef.current&&!menuRef.current.contains(e.target)) setMenuOpen(false); }; document.addEventListener("mousedown",h); return()=>document.removeEventListener("mousedown",h); }, [menuOpen]);

  // Boot sync
  useEffect(()=>{
    if (!syncConfig||bootSynced) return;
    setBootSynced(true);
    if (!navigator.onLine) { setSyncPillStatus("offline"); setSyncPillMsg("offline"); setBootPullDone(true); return; }
    setSyncPillStatus("syncing"); setSyncPillMsg("checking…");
    showBanner("checking for updates…");
    syncFromCloud(syncConfig).then(remote=>{
      if (!remote||!remote.entries||remote.entries.length===0) { showBanner("no cloud data found",2000); setSyncPillStatus("idle"); setSyncPillMsg("up to date"); return; }
      setEntries(prev=>{ const m=mergeEntries(prev,remote.entries); saveEntries(m); return m; });
      showBanner(`synced ✓ (${remote.entries.length} entries)`,2500);
      setSyncPillStatus("idle"); setSyncPillMsg("synced just now");
    }).catch(e=>{ showBanner("sync failed — "+e.message,3500); setSyncPillStatus(navigator.onLine?"error":"offline"); setSyncPillMsg(navigator.onLine?"sync failed":"offline"); })
    .finally(()=>setBootPullDone(true));
  }, [syncConfig]);

  // ── AUTO-PUSH (simple push — no pull, no loop risk) ──────────────────────────
  // Boot pull already merged cloud into local on startup, so a simple push is safe.
  // The ref-before-state pattern in biDirectionalSync prevents this from re-triggering.
  useEffect(()=>{
    if (!syncConfig) return;
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(async()=>{
      const cfg = syncConfigRef.current; if (!cfg) return;
      // SAFETY 1: never push before boot pull completes (would overwrite cloud with stale local)
      if (!bootPullDone) { console.warn("auto-push skipped: boot pull pending"); return; }
      // SAFETY 2: never push empty (last entry deleted edge case — handled separately)
      if (!entriesRef.current || entriesRef.current.length === 0) { console.warn("auto-push skipped: empty entries"); return; }
      if (isSyncingRef.current) { console.warn("auto-push skipped: sync in flight"); return; }
      isSyncingRef.current = true;
      setSyncPillStatus("syncing"); setSyncPillMsg("saving…");
      try {
        await syncToCloud(cfg, entriesRef.current);
        setSyncPillStatus("idle"); setSyncPillMsg("saved just now");
      } catch(e) {
        // Retry once after 4s on transient failure
        setTimeout(async () => {
          try {
            await syncToCloud(syncConfigRef.current, entriesRef.current);
            setSyncPillStatus("idle"); setSyncPillMsg("saved just now");
          } catch {
            setSyncPillStatus(navigator.onLine ? "error" : "offline");
            setSyncPillMsg(navigator.onLine ? "sync failed" : "offline");
          }
        }, 4000);
        showBanner("sync failed — retrying…", 2500);
        setSyncPillStatus(navigator.onLine ? "error" : "offline");
        setSyncPillMsg(navigator.onLine ? "sync failed" : "offline");
      } finally { isSyncingRef.current = false; }
    }, 1200);
    return () => clearTimeout(syncTimer.current);
  }, [entries]);

  // ── BIDIRECTIONAL SYNC: pull → merge → update refs first → push ──────────────
  // Used by: manual refresh button, reconnect event, post-delete cleanup.
  // Updates entriesRef BEFORE setEntries so the auto-push debounce sees merged data
  // and doesn't re-trigger another biDirectionalSync (no loop).
  const biDirectionalSync = async (label="syncing…") => {
    const cfg = syncConfigRef.current; if (!cfg) return;
    if (isSyncingRef.current) { showBanner("sync already in progress…", 1500); return; }
    isSyncingRef.current = true;
    setSyncPillStatus("syncing"); setSyncPillMsg(label);
    try {
      // 1. pull cloud
      const remote = await syncFromCloud(cfg);
      // 2. merge (per-entry updatedAt wins; neither side drops entries)
      const merged = remote?.entries?.length
        ? mergeEntries(entriesRef.current, remote.entries)
        : entriesRef.current;
      // 3. update ref + localStorage BEFORE setEntries — dampens auto-push debounce
      //    (debounce fires but pushes already-merged data, not stale local)
      entriesRef.current = merged;
      saveEntries(merged);
      // 4. push merged to cloud
      await syncToCloud(cfg, merged);
      // 5. update UI (triggers auto-push debounce, but it just re-pushes the same data — no-op)
      setEntries(merged);
      setSyncPillStatus("idle"); setSyncPillMsg("synced just now");
    } catch(e) {
      showBanner("sync failed — "+e.message, 3500);
      setSyncPillStatus(navigator.onLine ? "error" : "offline");
      setSyncPillMsg(navigator.onLine ? "sync failed" : "offline");
      console.error("biDirectionalSync error:", e);
    } finally { isSyncingRef.current = false; }
  };

  useEffect(()=>{
    const h = () => {
      if (!syncConfigRef.current || !bootPullDone) return;
      biDirectionalSync("reconnected, syncing…");
    };
    window.addEventListener("online", h);
    return () => window.removeEventListener("online", h);
  }, [bootPullDone]);

  const showBanner = useCallback((msg, hide=0) => {
    const b=document.getElementById("sync-banner"); if(!b) return;
    b.textContent=msg; b.classList.add("show");
    if (hide) setTimeout(()=>b.classList.remove("show"),hide);
  }, []);

  const showConfirm = useCallback((opts) => setModal(opts), []);
  const closeModal  = useCallback(() => setModal(null), []);

  const pullFromCloud = async () => {
    if (!syncConfig) return;
    await biDirectionalSync("syncing…");
  };

  const saveEntry = (entry) => {
    setEntries(prev => {
      const exists = prev.find(e=>e.id===entry.id);
      const updated = exists ? prev.map(e=>e.id===entry.id?{...entry,updatedAt:Date.now()}:e) : [{...entry,updatedAt:Date.now()},...prev];
      return updated.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    });
  };

  const deleteEntry = (id) => {
    showConfirm({
      message: "delete this entry?",
      subtext: "you'll have 8 seconds to undo.",
      confirmText: "delete",
      cancelText: "cancel",
      danger: true,
      onConfirm: () => {
        closeModal();
        const toDelete = entriesRef.current.find(e=>e.id===id);
        setEntries(prev=>prev.filter(e=>e.id!==id));
        setView("index");
        if (toDelete) {
          setUndoEntry(toDelete);
          clearTimeout(undoTimerRef.current);
          undoTimerRef.current = setTimeout(()=>{
            setUndoEntry(null);
            const cfg = syncConfigRef.current;
            if (!cfg || isSyncingRef.current) return;
            const latest = entriesRef.current;
            if (latest && latest.length > 0) {
              // Normal: push remaining entries
              syncToCloud(cfg, latest).catch(e => console.warn("post-delete push:", e.message));
            } else {
              // All entries deleted: force push empty state to cloud
              syncToCloud(cfg, [], true).catch(e => console.warn("post-delete empty push:", e.message));
            }
          }, 8000);
        }
      }
    });
  };

  const undoDelete = () => {
    if (!undoEntry) return;
    clearTimeout(undoTimerRef.current);
    setEntries(prev=>mergeEntries(prev,[undoEntry]));
    setUndoEntry(null);
  };

  const exportJSON = () => {
    try {
      const blob = new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download="my_journal.json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    } catch(e) { showBanner("export failed — "+e.message,3000); }
  };

  const importJSON = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    e.target.value="";
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        if (!ev.target?.result) { showBanner("empty file",2500); return; }
        const imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) { showBanner("invalid format — expected JSON array",2500); return; }
        if (imported.length===0) { showBanner("import file is empty",2500); return; }
        const valid = imported.filter(e=>e&&e.id&&e.createdAt);
        if (!valid.length) { showBanner("no valid entries found",2500); return; }
        showConfirm({
          message: `import ${valid.length} entr${valid.length===1?"y":"ies"}?`,
          subtext: "they'll be merged with your current entries. conflicts keep the newer version.",
          confirmText: "import",
          cancelText: "cancel",
          danger: false,
          onConfirm: () => {
            closeModal();
            setEntries(prev=>{ const m=mergeEntries(prev,valid); saveEntries(m); return m; });
            showBanner(`imported ${valid.length} entries ✓`,2500);
          }
        });
      } catch(err) { showBanner("import failed — "+(err.message||"invalid file"),2500); }
    };
    reader.onerror = ()=>showBanner("could not read file",2500);
    reader.readAsText(file);
  };

  const exportEntryHTML = (entry) => {
    try {
      const html=buildEntryHTML(entry); const blob=new Blob([html],{type:"text/html"});
      const url=URL.createObjectURL(blob);
      const safeDate=formatDate(entry.createdAt).replace(/[^a-zA-Z0-9]+/g,"_").replace(/^_|_$/g,"");
      const a=document.createElement("a"); a.href=url; a.download=`journal_${safeDate}.html`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    } catch(e) { showBanner("export failed — "+e.message,3000); }
  };

  const go = (v, id=null) => {
    if (id) setActiveId(id); setView(v); setMenuOpen(false); window.scrollTo(0,0);
  };

  const active = entries.find(e=>e.id===activeId);

  // Fuzzy search: all tokens must appear somewhere in the entry (tolerates word-split queries)
  const fuzzyMatch = (entry, query) => {
    if (!query.trim()) return true;
    const haystack = [entry.raw||"", entry.shaped||"", entry.heading||"", entry.mood||"", ...(entry.connectedThemes||[])].join(" ").toLowerCase();
    const tokens = query.toLowerCase().split(/\s+/).filter(Boolean);
    return tokens.every(token => {
      // exact token match OR partial match with at least 3 chars
      if (haystack.includes(token)) return true;
      if (token.length >= 3) {
        // allow 1-char typo: check if any word in haystack starts with first N-1 chars
        const stem = token.slice(0, token.length - 1);
        return haystack.includes(stem);
      }
      return false;
    });
  };

  const filteredEntries = entries.filter(e=>{
    return fuzzyMatch(e, search) && (!moodFilter||e.mood===moodFilter);
  });

  if (!appUnlocked) return <LockScreen pin={lockConfig?.appPin} onUnlock={()=>setAppUnlocked(true)}/>;

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
      {modal && <ConfirmModal {...modal} onCancel={closeModal} onConfirm={()=>{ modal.onConfirm(); }}/>}

      {undoEntry && (
        <div style={{ position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)", background:"var(--ink)", color:"var(--page)", padding:"10px 18px", borderRadius:20, fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.04em", zIndex:9999, display:"flex", alignItems:"center", gap:14, whiteSpace:"nowrap", boxShadow:"0 4px 20px rgba(43,32,22,0.25)" }}>
          entry deleted
          <button onClick={undoDelete} style={{ background:"none", border:"1px solid rgba(250,247,242,0.4)", borderRadius:10, padding:"3px 12px", color:"var(--page)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer", letterSpacing:"0.06em" }}>undo</button>
        </div>
      )}

      {view==="index"     && <IndexView entries={filteredEntries} allEntries={entries} search={search} setSearch={setSearch} moodFilter={moodFilter} setMoodFilter={setMoodFilter} onOpen={id=>go("open",id)} onEdit={id=>go("write_edit",id)} onDelete={deleteEntry} onNew={()=>go("write")} onBurn={()=>go("burn")} onCalendar={()=>go("calendar")} onSettings={()=>go("settings")} onThread={id=>{ setActiveId(id); go("thread",id); }} syncPillStatus={syncPillStatus} syncPillMsg={syncPillMsg} menuOpen={menuOpen} setMenuOpen={setMenuOpen} menuRef={menuRef} exportJSON={exportJSON} importJSON={importJSON} syncConfig={syncConfig} pullFromCloud={pullFromCloud} showBanner={showBanner}/>}
      {view==="write"     && <WriteView allEntries={entries} onSave={e=>{ saveEntry(e); go("open",e.id); }} onCancel={()=>go("index")} showBanner={showBanner}/>}
      {view==="open"      && active && <EntryView entry={active} allEntries={entries} onBack={()=>go("index")} onDelete={()=>deleteEntry(active.id)} onExport={()=>exportEntryHTML(active)} onEdit={()=>go("write_edit",active.id)} onThread={()=>go("thread",active.id)}/>}
      {view==="write_edit"&& active && <WriteView allEntries={entries} editEntry={active} onSave={e=>{ saveEntry(e); go("open",e.id); }} onCancel={()=>go("open",active.id)} showBanner={showBanner}/>}
      {view==="settings"  && <SettingsView syncConfig={syncConfig} lockConfig={lockConfig} onSave={cfg=>{ setSyncConfig(cfg); saveSyncConfig(cfg); go("index"); }} onSaveLock={cfg=>{ setLockConfig(cfg); saveLockConfig(cfg); }} onBack={()=>go("index")} exportJSON={exportJSON} importJSON={importJSON} showBanner={showBanner} showConfirm={showConfirm} closeModal={closeModal}/>}
      {view==="burn"      && <BurnView onBack={()=>go("index")} onSave={e=>{ saveEntry(e); go("index"); }} showBanner={showBanner}/>}
      {view==="calendar"  && <CalendarView entries={entries} onOpen={id=>go("open",id)} onBack={()=>go("index")}/>}
      {view==="thread"    && active && <ThreadView entry={active} allEntries={entries} onBack={()=>go("open",active.id)} onOpen={id=>go("open",id)}/>}
      {view==="open" && !active && (
        <div style={{ textAlign:"center", padding:"80px 20px" }}>
          <p style={{ color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:18 }}>Entry not found.</p>
          <button onClick={()=>go("index")} style={{ marginTop:20, background:"none", border:"none", color:"var(--accent)", cursor:"pointer", fontFamily:"'Lora',serif", fontSize:14 }}>← back to journal</button>
        </div>
      )}
    </div>
  );
}

// ── LOCK SCREEN ───────────────────────────────────────────────────────────────
function LockScreen({ pin, onUnlock }) {
  const [input, setInput] = React.useState("");
  const [error, setError] = React.useState(false);
  const [shake, setShake] = React.useState(false);
  const tryUnlock = async () => {
    if (!pin) { onUnlock(); return; }
    const hashed = await hashPin(input);
    if (hashed===pin) { onUnlock(); }
    else { setError(true); setShake(true); setInput(""); setTimeout(()=>setShake(false),600); }
  };
  if (!pin) { onUnlock(); return null; }
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"var(--bg)", padding:32 }}>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.22em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:40 }}>your journal</div>
      <div className={shake?"shake":""} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16 }}>
        <input type="password" value={input} onChange={e=>{ setInput(e.target.value); setError(false); }} onKeyDown={e=>e.key==="Enter"&&tryUnlock()} placeholder="enter pin" autoFocus
          style={{ background:"transparent", border:"none", borderBottom:`1px solid ${error?"#b85030":"var(--rule)"}`, padding:"10px 0", fontFamily:"'Cormorant Garamond',serif", fontSize:22, color:"var(--ink)", textAlign:"center", width:160, letterSpacing:"0.3em" }}/>
        {error && <div style={{ fontSize:12, color:"#b85030", fontFamily:"'Cormorant Garamond',serif", letterSpacing:"0.08em" }}>incorrect pin</div>}
        <button onClick={tryUnlock} style={{ marginTop:8, padding:"10px 32px", borderRadius:10, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.1em", cursor:"pointer" }}>unlock</button>
      </div>
    </div>
  );
}

// ── BURN VIEW ─────────────────────────────────────────────────────────────────
function BurnView({ onBack, onSave, showBanner }) {
  const [raw, setRaw]           = React.useState("");
  const [witness, setWitness]   = React.useState("");
  const [loading, setLoading]   = React.useState(false);
  const [burned, setBurned]     = React.useState(false);
  const [listening, setListening] = React.useState(false);
  const [speechAvail, setSpeechAvail] = React.useState(false);
  const [speechError, setSpeechError] = React.useState("");
  const [interimText, setInterimText] = React.useState("");
  const recRef = React.useRef(null);
  const rawRef = React.useRef(raw);
  const listeningRef = React.useRef(false);
  React.useEffect(()=>{ rawRef.current=raw; }, [raw]);
  React.useEffect(()=>{ listeningRef.current=listening; }, [listening]);
  React.useEffect(()=>{ setSpeechAvail(!!(window.SpeechRecognition||window.webkitSpeechRecognition)); }, []);

  const startListening = () => {
    setSpeechError("");
    const rec = getSpeechRecognition(); if (!rec) { setSpeechError("Voice not supported in this browser. Try Chrome."); return; }
    recRef.current=rec; let finalSoFar=rawRef.current;
    rec.onstart=()=>{ setListening(true); listeningRef.current=true; };
    rec.onresult=(event)=>{
      let interim="",newFinal="";
      for(let i=event.resultIndex;i<event.results.length;i++){ const t=event.results[i][0].transcript; if(event.results[i].isFinal) newFinal+=t+" "; else interim+=t; }
      if(newFinal){ finalSoFar=(finalSoFar+(finalSoFar.endsWith(" ")||!finalSoFar?"":" ")+newFinal).trim(); setRaw(finalSoFar); }
      setInterimText(interim);
    };
    rec.onerror=(event)=>{ const msgs={"not-allowed":"Microphone access denied.","no-speech":"No speech detected — tap mic again.","audio-capture":"No microphone found.","network":"Network error.","aborted":""}; const msg=msgs[event.error]||`Voice error: ${event.error}`; if(msg) setSpeechError(msg); setListening(false); listeningRef.current=false; setInterimText(""); };
    rec.onend=()=>{ setInterimText(""); if(listeningRef.current){ try{rec.start();}catch{setListening(false);listeningRef.current=false;} } else setListening(false); };
    try { rec.start(); } catch(err) { setSpeechError("Could not start microphone: "+err.message); setListening(false); }
  };
  const stopListening = () => { listeningRef.current=false; try{recRef.current?.stop();}catch{} setListening(false); setInterimText(""); };
  const toggleListening = () => { listening?stopListening():startListening(); };

  const handleBurn = async () => {
    if (listening) stopListening();
    if (!raw.trim()) { showBanner("say something first",2000); return; }
    setLoading(true);
    try { const w=await burnWitness(raw); setWitness(w); setBurned(true); }
    catch { showBanner("couldn't reach Claude — try again",3000); }
    finally { setLoading(false); }
  };
  const handleSaveAnyway = () => {
    if (!raw.trim()) return;
    const now=Date.now();
    onSave({ id:`j_${now}_${Math.random().toString(36).slice(2,8)}`, createdAt:now, updatedAt:now, raw:raw.trim(), mood:"raw", heading:"burn entry", _v:1 });
  };

  return (
    <div className="fade-in" style={{ maxWidth:560, margin:"0 auto", padding:"48px 20px 80px" }}>
      <button onClick={()=>{ if(listening)stopListening(); onBack(); }} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", marginBottom:36 }}>← back</button>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.22em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:8 }}>burn it</div>
      <div style={{ fontFamily:"'Lora',serif", fontSize:14, color:"var(--ink-soft)", lineHeight:1.8, marginBottom:28 }}>Get it out. This won't be saved — unless you choose to keep it.</div>
      {!burned ? (
        <>
          <div style={{ position:"relative", background:"var(--page)", borderRadius:10, border:`1px solid ${listening?"#b85030aa":"var(--rule)"}`, padding:"18px 18px 52px", transition:"border-color 0.2s" }}>
            <textarea value={raw+(interimText?" "+interimText:"")} onChange={e=>setRaw(e.target.value)} placeholder={listening?"listening… say it all":"say the thing you haven't said…"} style={{ width:"100%", minHeight:200, background:"transparent", border:"none", fontFamily:"'Lora',Georgia,serif", fontSize:15, lineHeight:1.85, color:"var(--ink)", resize:"none" }}/>
            {interimText && <div style={{ position:"absolute", bottom:16, left:18, fontSize:11, color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic" }}>speaking…</div>}
          </div>
          {speechError && <div style={{ marginTop:10, padding:"8px 14px", background:"#b8503018", border:"1px solid #b8503044", borderRadius:8, fontSize:12, color:"#b85030", fontFamily:"'Cormorant Garamond',serif" }}>{speechError}<button onClick={()=>setSpeechError("")} style={{ float:"right", background:"none", border:"none", color:"#b85030", cursor:"pointer", fontSize:16 }}>×</button></div>}
          <div style={{ display:"flex", gap:10, marginTop:14, alignItems:"center" }}>
            {speechAvail && <button onClick={toggleListening} className={listening?"mic-recording":""} style={{ width:46, height:46, borderRadius:"50%", border:`2px solid ${listening?"#b85030":"var(--rule)"}`, background:listening?"#b8503018":"var(--page-warm)", cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.2s" }} title={listening?"stop recording":"speak it out"}>{listening?"◼":"🎙"}</button>}
            <button onClick={handleBurn} disabled={loading||!raw.trim()} style={{ flex:1, padding:"12px 0", borderRadius:10, border:"none", background:raw.trim()&&!loading?"#b85030":"var(--rule)", color:"var(--page)", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.08em", cursor:raw.trim()&&!loading?"pointer":"default", transition:"all 0.2s" }}>
              {loading?"witnessing…":"burn & witness"}
            </button>
          </div>
        </>
      ) : (
        <div className="fade-in">
          <div style={{ padding:"28px 32px", background:"var(--page)", borderRadius:12, border:"1px solid var(--rule)", marginBottom:24 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:12 }}>witnessed</div>
            <div style={{ fontFamily:"'Lora',serif", fontSize:17, lineHeight:1.9, color:"var(--ink)", fontStyle:"italic" }}>{witness}</div>
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={onBack} style={{ flex:1, padding:"12px 0", borderRadius:10, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.08em", cursor:"pointer" }}>let it go</button>
            <button onClick={handleSaveAnyway} style={{ flex:1, padding:"12px 0", borderRadius:10, border:"1px solid var(--accent)", background:"transparent", color:"var(--accent)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.08em", cursor:"pointer" }}>keep it anyway</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CALENDAR VIEW ─────────────────────────────────────────────────────────────
function CalendarView({ entries, onOpen, onBack }) {
  const today = new Date();
  const [year, setYear]           = React.useState(today.getFullYear());
  const [month, setMonth]         = React.useState(today.getMonth());
  const [selectedDay, setSelectedDay] = React.useState(null);

  const daysInMonth = new Date(year,month+1,0).getDate();
  const firstDay    = new Date(year,month,1).getDay();
  const monthNames  = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const entryMap = {};
  entries.forEach(e=>{
    const d=new Date(e.createdAt);
    if(d.getFullYear()===year&&d.getMonth()===month){ const k=d.getDate(); if(!entryMap[k]) entryMap[k]=[]; entryMap[k].push(e); }
  });

  const prevMonth = () => { setSelectedDay(null); if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { setSelectedDay(null); if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  const handleDayClick = (day, dayEntries) => {
    if (!dayEntries.length) return;
    if (dayEntries.length===1) { onOpen(dayEntries[0].id); return; }
    setSelectedDay(selectedDay===day ? null : day);
  };

  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  return (
    <div className="fade-in" style={{ maxWidth:520, margin:"0 auto", padding:"36px 20px 60px" }}>
      <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", marginBottom:28 }}>← back</button>

      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24 }}>
        <button onClick={prevMonth} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontSize:22, lineHeight:1 }}>‹</button>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:18, letterSpacing:"0.08em", color:"var(--ink)" }}>{monthNames[month]} {year}</div>
        <button onClick={nextMonth} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontSize:22, lineHeight:1 }}>›</button>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:8 }}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
          <div key={d} style={{ textAlign:"center", fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.1em", color:"var(--ink-faint)", textTransform:"uppercase", padding:"4px 0" }}>{d}</div>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
        {cells.map((day,i) => {
          if (!day) return <div key={`e${i}`}/>;
          const dayEntries = entryMap[day]||[];
          const isToday = day===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
          const isSelected = selectedDay===day;
          const hasMult = dayEntries.length>1;
          return (
            <div key={day} onClick={()=>handleDayClick(day,dayEntries)}
              style={{ aspectRatio:"1", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", borderRadius:8, background:isSelected?"var(--ink-soft)":isToday?"var(--ink)":dayEntries.length?"var(--page-warm)":"transparent", border:`1px solid ${isSelected?"var(--ink-soft)":isToday?"var(--ink)":dayEntries.length?"var(--rule)":"transparent"}`, cursor:dayEntries.length?"pointer":"default", transition:"background 0.15s", position:"relative" }}>
              <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:14, color:isSelected||isToday?"var(--page)":dayEntries.length?"var(--ink)":"var(--ink-ghost)", fontWeight:dayEntries.length?"500":"400" }}>{day}</span>
              {dayEntries.length===1 && !isToday && !isSelected && (
                <div style={{ width:5, height:5, borderRadius:"50%", background:MOOD_COLORS[dayEntries[0].mood]||"var(--rule)", marginTop:2 }}/>
              )}
              {hasMult && (
                <div style={{ display:"flex", gap:2, marginTop:3, justifyContent:"center" }}>
                  {dayEntries.slice(0,3).map((e,j)=>(
                    <div key={j} style={{ width:4, height:4, borderRadius:"50%", background:isSelected||isToday?"rgba(250,247,242,0.6)":MOOD_COLORS[e.mood]||"var(--rule)" }}/>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Multi-entry day panel */}
      {selectedDay && entryMap[selectedDay] && (
        <div className="fade-in" style={{ marginTop:16, background:"var(--page)", border:"1px solid var(--rule)", borderRadius:12, overflow:"hidden" }}>
          <div style={{ padding:"12px 16px 10px", borderBottom:"1px solid var(--rule)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase" }}>
              {monthNames[month]} {selectedDay}
            </div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-ghost)" }}>
              {entryMap[selectedDay].length} entries
            </div>
          </div>
          {entryMap[selectedDay].map((e,i)=>(
            <div key={e.id} onClick={()=>onOpen(e.id)}
              style={{ padding:"13px 16px", borderBottom:i<entryMap[selectedDay].length-1?"1px solid var(--rule)":"none", cursor:"pointer", display:"flex", alignItems:"center", gap:12, transition:"background 0.1s" }}
              onMouseEnter={ev=>ev.currentTarget.style.background="var(--page-warm)"}
              onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
              <div style={{ width:7, height:7, borderRadius:"50%", background:MOOD_COLORS[e.mood]||"var(--rule)", flexShrink:0 }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.1em", color:"var(--ink-faint)", marginBottom:3 }}>
                  {formatTime(e.createdAt)}{e.mood?` · ${e.mood}`:""}
                </div>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:15, color:"var(--ink)", overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>
                  {e.heading||(e.shaped||e.raw||"").slice(0,55)+"…"}
                </div>
              </div>
              <div style={{ color:"var(--ink-ghost)", fontSize:14, flexShrink:0 }}>→</div>
            </div>
          ))}
        </div>
      )}

      <div style={{ marginTop:20, fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-faint)", textAlign:"center", letterSpacing:"0.08em" }}>
        {(()=>{ const total=Object.values(entryMap).reduce((s,a)=>s+a.length,0); const days=Object.keys(entryMap).length; return `${total} entr${total===1?"y":"ies"} across ${days} day${days===1?"":"s"}`; })()}
      </div>
    </div>
  );
}

// ── THREAD VIEW ───────────────────────────────────────────────────────────────
function ThreadView({ entry, allEntries, onBack, onOpen }) {
  const [analysis, setAnalysis] = React.useState(null);
  const [loading, setLoading]   = React.useState(true);
  const [error, setError]       = React.useState("");
  const themes = entry.connectedThemes||[];
  const related = allEntries.filter(e=>e.id!==entry.id&&(e.connectedThemes||[]).some(t=>themes.includes(t))).slice(0,6);

  React.useEffect(()=>{
    const thread=[entry,...related].slice(0,5);
    if (thread.length<2) { setLoading(false); return; }
    analyzeThread(thread).then(r=>{ setAnalysis(r); setLoading(false); }).catch(()=>{ setError("couldn't analyze right now — try again later"); setLoading(false); });
  }, [entry.id]);

  return (
    <div className="fade-in" style={{ maxWidth:580, margin:"0 auto", padding:"36px 20px 60px" }}>
      <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", marginBottom:32 }}>← back</button>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.22em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:6 }}>thread</div>
      {entry.heading && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:22, color:"var(--ink)", marginBottom:24 }}>{entry.heading}</div>}
      {themes.length>0 && <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:28 }}>{themes.map(t=><span key={t} style={{ padding:"3px 12px", borderRadius:20, border:"1px solid var(--rule)", background:"var(--page-warm)", fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.1em", color:"var(--ink-soft)", textTransform:"uppercase" }}>{t}</span>)}</div>}
      {loading && <div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", color:"var(--ink-faint)", fontSize:14, marginBottom:24 }}>reading the thread…</div>}
      {error && <div style={{ fontFamily:"'Lora',serif", fontSize:13, color:"#b85030", marginBottom:20 }}>{error}</div>}
      {analysis&&!loading&&(
        <div style={{ padding:"24px 28px", background:"var(--page)", borderRadius:12, border:"1px solid var(--rule)", marginBottom:28 }}>
          {analysis.coreTheme&&<div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.2em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:10 }}>{analysis.coreTheme}</div>}
          {analysis.arc&&<div style={{ fontFamily:"'Lora',serif", fontSize:15, lineHeight:1.85, color:"var(--ink)", marginBottom:16 }}>{analysis.arc}</div>}
          {analysis.latestShift&&<div style={{ fontFamily:"'Lora',serif", fontStyle:"italic", fontSize:14, color:"var(--ink-soft)", borderTop:"1px solid var(--rule)", paddingTop:14 }}>{analysis.latestShift}</div>}
        </div>
      )}
      {related.length>0&&(
        <>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:12 }}>connected entries</div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {related.map(e=>(
              <div key={e.id} onClick={()=>onOpen(e.id)} style={{ padding:"14px 18px", background:"var(--page-warm)", borderRadius:10, border:"1px solid var(--rule)", cursor:"pointer" }} onMouseEnter={ev=>ev.currentTarget.style.opacity="0.7"} onMouseLeave={ev=>ev.currentTarget.style.opacity="1"}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.12em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:4 }}>{formatDate(e.createdAt)}</div>
                <div style={{ fontFamily:"'Lora',serif", fontSize:14, color:"var(--ink-soft)", fontStyle:"italic" }}>{e.heading||(e.shaped||e.raw||"").slice(0,70)+"…"}</div>
              </div>
            ))}
          </div>
        </>
      )}
      {related.length===0&&!loading&&<div style={{ fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:14, color:"var(--ink-faint)", textAlign:"center", marginTop:20 }}>no connected entries yet — keep writing</div>}
    </div>
  );
}

// ── INDEX VIEW ────────────────────────────────────────────────────────────────
function IndexView({ entries, allEntries, search, setSearch, moodFilter, setMoodFilter, onOpen, onEdit, onDelete, onNew, onBurn, onCalendar, onSettings, onThread, syncPillStatus, syncPillMsg, menuOpen, setMenuOpen, menuRef, exportJSON, importJSON, syncConfig, pullFromCloud, showBanner }) {
  const pillColor = { idle:"var(--accent)", syncing:"var(--ink-faint)", error:"#b85030", offline:"var(--ink-faint)" };
  const today = new Date();
  const thisDayLastYear = allEntries.filter(e=>{ const d=new Date(e.createdAt); return d.getDate()===today.getDate()&&d.getMonth()===today.getMonth()&&d.getFullYear()<today.getFullYear(); }).sort((a,b)=>b.createdAt-a.createdAt);

  return (
    <div className="fade-in" style={{ maxWidth:580, margin:"0 auto", padding:"32px 18px 100px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:32 }}>
        <div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.2em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:4 }}>my</div>
          <div style={{ fontFamily:"'IM Fell English',serif", fontSize:30, color:"var(--ink)", fontStyle:"italic", lineHeight:1 }}>Journal</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          {syncConfig&&<button onClick={pullFromCloud} title="sync now" style={{ background:"none", border:"1px solid var(--rule)", borderRadius:8, padding:"7px 10px", cursor:"pointer", color:syncPillStatus==="error"?"#b85030":"var(--ink-soft)", fontSize:15, lineHeight:1, display:"flex", alignItems:"center", justifyContent:"center" }}><span className={syncPillStatus==="syncing"?"spinning":""} style={{ display:"inline-block", fontSize:15, lineHeight:1 }}>↻</span></button>}
          {syncPillStatus&&<div style={{ fontSize:11, color:pillColor[syncPillStatus]||"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", letterSpacing:"0.06em", padding:"4px 10px", border:`1px solid ${pillColor[syncPillStatus]||"var(--rule)"}`, borderRadius:20 }}>{syncPillMsg}</div>}
          <button onClick={onCalendar} title="calendar view" style={{ background:"none", border:"1px solid var(--rule)", borderRadius:8, padding:"7px 10px", cursor:"pointer", color:"var(--ink-soft)", fontSize:16, lineHeight:1 }}>▦</button>
          <div ref={menuRef} style={{ position:"relative" }}>
            <button onClick={()=>setMenuOpen(o=>!o)} style={{ background:"none", border:"1px solid var(--rule)", borderRadius:8, padding:"7px 12px", cursor:"pointer", color:"var(--ink-soft)", fontSize:18, lineHeight:1 }}>⋯</button>
            {menuOpen&&(
              <div className="fade-in" style={{ position:"absolute", right:0, top:"calc(100% + 6px)", background:"var(--page)", border:"1px solid var(--rule)", borderRadius:10, padding:"6px 0", minWidth:180, boxShadow:"0 8px 24px var(--shadow)", zIndex:50 }}>
                {[
                  { label:"settings & sync", action:onSettings },
                  { label:"pull from cloud", action:syncConfig?pullFromCloud:null, muted:!syncConfig },
                  { label:"export backup", action:exportJSON },
                  { label:"import backup", action:null, isImport:true },
                  { label:"vent", action:onBurn },
                ].map((item,i)=>item.isImport?(
                  <label key={i} style={{ display:"block", padding:"9px 16px", fontFamily:"'Cormorant Garamond',serif", fontSize:14, color:"var(--ink-soft)", cursor:"pointer" }} onMouseEnter={e=>e.currentTarget.style.background="var(--page-warm)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    import backup<input type="file" accept=".json" style={{ display:"none" }} onChange={importJSON}/>
                  </label>
                ):(
                  <button key={i} onClick={item.action||undefined} disabled={!item.action} style={{ width:"100%", textAlign:"left", padding:"9px 16px", background:"none", border:"none", fontFamily:"'Cormorant Garamond',serif", fontSize:14, color:item.muted?"var(--ink-ghost)":"var(--ink-soft)", cursor:item.action?"pointer":"default" }} onMouseEnter={e=>{ if(item.action) e.currentTarget.style.background="var(--page-warm)"; }} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    {item.label}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {thisDayLastYear.length>0&&(
        <div onClick={()=>onOpen(thisDayLastYear[0].id)} style={{ marginBottom:24, padding:"12px 16px", background:"var(--page-warm)", border:"1px solid var(--rule)", borderRadius:10, cursor:"pointer" }} onMouseEnter={e=>e.currentTarget.style.opacity="0.7"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.16em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:4 }}>
            {new Date(thisDayLastYear[0].createdAt).getFullYear()===today.getFullYear()-1?"one year ago":`${today.getFullYear()-new Date(thisDayLastYear[0].createdAt).getFullYear()} years ago`}
          </div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:16, fontStyle:"italic", color:"var(--ink-soft)" }}>
            {thisDayLastYear[0].heading||(thisDayLastYear[0].shaped||thisDayLastYear[0].raw||"").slice(0,60)+"…"}
          </div>
        </div>
      )}

      {/* Threads section — only shown when entries have themes */}
      {(()=>{
        const themeMap = {};
        allEntries.forEach(e=>{ (e.connectedThemes||[]).forEach(t=>{ if(!themeMap[t]) themeMap[t]=[]; themeMap[t].push(e); }); });
        const threads = Object.entries(themeMap).filter(([,es])=>es.length>=2).sort((a,b)=>b[1].length-a[1].length).slice(0,4);
        if (!threads.length) return null;
        return (
          <div style={{ marginBottom:24 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:10 }}>threads</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {threads.map(([theme, es])=>{
                const latest = es.sort((a,b)=>b.createdAt-a.createdAt)[0];
                const moods = [...new Set(es.map(e=>e.mood).filter(Boolean))];
                return (
                  <div key={theme} onClick={()=>onThread(latest.id)}
                    style={{ padding:"10px 14px", background:"var(--page-warm)", border:"1px solid var(--rule)", borderRadius:10, cursor:"pointer", minWidth:0, flex:"1 1 140px", maxWidth:200 }}
                    onMouseEnter={ev=>ev.currentTarget.style.opacity="0.7"} onMouseLeave={ev=>ev.currentTarget.style.opacity="1"}>
                    <div style={{ display:"flex", gap:4, marginBottom:5 }}>
                      {moods.slice(0,3).map(m=><div key={m} style={{ width:5, height:5, borderRadius:"50%", background:MOOD_COLORS[m]||"var(--rule)" }}/>)}
                    </div>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, fontStyle:"italic", color:"var(--ink)", marginBottom:2 }}>{theme}</div>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, color:"var(--ink-faint)" }}>{es.length} entr{es.length===1?"y":"ies"}</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {allEntries.length>0&&(
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16 }}>
          {Object.keys(MOOD_COLORS).map(m=>{ const has=allEntries.some(e=>e.mood===m); if(!has) return null; return <button key={m} onClick={()=>setMoodFilter(moodFilter===m?"":m)} style={{ padding:"3px 12px", borderRadius:20, border:`1px solid ${moodFilter===m?MOOD_COLORS[m]:"var(--rule)"}`, background:moodFilter===m?MOOD_COLORS[m]+"22":"transparent", color:moodFilter===m?MOOD_COLORS[m]:"var(--ink-faint)", fontSize:11, letterSpacing:"0.1em", fontFamily:"'Cormorant Garamond',serif", cursor:"pointer", textTransform:"uppercase" }}>{m}</button>; })}
          {moodFilter&&<button onClick={()=>setMoodFilter("")} style={{ padding:"3px 10px", borderRadius:20, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-faint)", fontSize:11, fontFamily:"'Cormorant Garamond',serif", cursor:"pointer" }}>× clear</button>}
        </div>
      )}

      {allEntries.length>0&&(
        <div style={{ position:"relative", marginBottom:24 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="search entries…" style={{ width:"100%", padding:"10px 36px 10px 14px", borderRadius:10, border:"1px solid var(--rule)", background:"var(--page-warm)", color:"var(--ink)", fontSize:14, fontFamily:"'Cormorant Garamond',serif", letterSpacing:"0.03em" }}/>
          {search&&<button onClick={()=>setSearch("")} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontSize:18, lineHeight:1 }}>×</button>}
        </div>
      )}

      {allEntries.length===0&&!search ? (
        <EmptyState onNew={onNew}/>
      ) : entries.length===0 ? (
        <div style={{ textAlign:"center", padding:"60px 0", color:"var(--ink-faint)", fontFamily:"'Cormorant Garamond',serif", fontSize:16, fontStyle:"italic" }}>nothing found{search?` for "${search}"`:""}  </div>
      ) : (
        <div>{entries.map((entry,i)=><EntryRow key={entry.id} entry={entry} allEntries={allEntries} onOpen={()=>onOpen(entry.id)} onEdit={onEdit} onDelete={onDelete} delay={i*40}/>)}</div>
      )}

      <div style={{ position:"fixed", bottom:28, right:24, zIndex:40 }}>
        <button onClick={onNew} style={{ width:56, height:56, borderRadius:"50%", background:"var(--ink)", border:"none", cursor:"pointer", fontSize:24, color:"var(--page)", boxShadow:"0 4px 20px rgba(43,32,22,0.3)", display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1 }}>+</button>
      </div>
    </div>
  );
}

function EmptyState({ onNew }) {
  return (
    <div style={{ textAlign:"center", padding:"60px 20px" }}>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:48, color:"var(--rule)", marginBottom:16, fontStyle:"italic" }}>✦</div>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, color:"var(--ink-soft)", marginBottom:8, fontStyle:"italic" }}>this is where you begin</div>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:14, color:"var(--ink-faint)", marginBottom:32, lineHeight:1.7 }}>a place to be fully known<br/>even if only by yourself</div>
      <button onClick={onNew} style={{ padding:"12px 28px", borderRadius:30, background:"var(--ink)", border:"none", color:"var(--page)", fontFamily:"'Cormorant Garamond',serif", fontSize:15, letterSpacing:"0.08em", cursor:"pointer" }}>write first entry</button>
    </div>
  );
}

function EntryRow({ entry, allEntries, onOpen, onEdit, onDelete, delay }) {
  const [rowMenuOpen, setRowMenuOpen] = React.useState(false);
  const menuBtnRef = React.useRef();
  const label = entryLabel(entry, allEntries);
  const mood  = entry.mood;
  const preview = (entry.shaped||entry.raw||"").replace(/\*/g,"").split("\n\n")[0].slice(0,120);

  React.useEffect(()=>{
    if (!rowMenuOpen) return;
    const h=(e)=>{ if(menuBtnRef.current&&!menuBtnRef.current.contains(e.target)) setRowMenuOpen(false); };
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  }, [rowMenuOpen]);

  return (
    <div className="fade-in" style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"18px 0", borderBottom:"1px solid var(--rule)", animationDelay:`${delay}ms` }}>
      {/* Main clickable area */}
      <div onClick={onOpen} style={{ flex:1, cursor:"pointer", minWidth:0 }}
        onMouseEnter={e=>e.currentTarget.style.opacity="0.7"}
        onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.12em", color:"var(--ink-faint)", textTransform:"uppercase" }}>{label}</div>
          {mood&&<div style={{ fontSize:10, letterSpacing:"0.14em", color:MOOD_COLORS[mood]||"var(--ink-faint)", textTransform:"uppercase", fontFamily:"'Cormorant Garamond',serif", border:`1px solid ${MOOD_COLORS[mood]||"var(--rule)"}`, borderRadius:10, padding:"2px 8px", flexShrink:0, marginLeft:6 }}>{mood}</div>}
        </div>
        {entry.heading&&<div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:17, color:"var(--ink)", fontStyle:"italic", marginBottom:4, lineHeight:1.3 }}>{entry.heading}</div>}
        {preview&&<div style={{ fontFamily:"'Lora',serif", fontSize:13, color:"var(--ink-soft)", lineHeight:1.6, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{preview}{preview.length===120?"…":""}</div>}
      </div>

      {/* Three-dot menu */}
      <div ref={menuBtnRef} style={{ position:"relative", flexShrink:0, marginTop:2 }}>
        <button onClick={(e)=>{ e.stopPropagation(); setRowMenuOpen(o=>!o); }}
          style={{ background:"none", border:"none", color:rowMenuOpen?"var(--ink-soft)":"var(--ink-ghost)", cursor:"pointer", padding:"8px 12px", borderRadius:8, fontSize:16, lineHeight:1, letterSpacing:"0.08em", transition:"color 0.15s", minWidth:40, minHeight:40, display:"flex", alignItems:"center", justifyContent:"center" }}
          title="entry options">⋯</button>
        {rowMenuOpen&&(
          <div className="fade-in" style={{ position:"absolute", right:0, top:"calc(100% + 4px)", background:"var(--page)", border:"1px solid var(--rule)", borderRadius:10, padding:"4px 0", minWidth:108, boxShadow:"0 6px 20px rgba(43,32,22,0.15)", zIndex:30 }}>
            <button onClick={(e)=>{ e.stopPropagation(); setRowMenuOpen(false); onEdit(entry.id); }}
              style={{ width:"100%", textAlign:"left", padding:"9px 14px", background:"none", border:"none", fontFamily:"'Cormorant Garamond',serif", fontSize:14, color:"var(--ink-soft)", cursor:"pointer" }}
              onMouseEnter={ev=>ev.currentTarget.style.background="var(--page-warm)"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
              edit
            </button>
            <button onClick={(e)=>{ e.stopPropagation(); setRowMenuOpen(false); onDelete(entry.id); }}
              style={{ width:"100%", textAlign:"left", padding:"9px 14px", background:"none", border:"none", fontFamily:"'Cormorant Garamond',serif", fontSize:14, color:"#b85030", cursor:"pointer" }}
              onMouseEnter={ev=>ev.currentTarget.style.background="var(--page-warm)"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
              delete
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── WRITE VIEW ────────────────────────────────────────────────────────────────
function WriteView({ allEntries, editEntry, onSave, onCancel, showBanner }) {
  const [raw, setRaw]         = useState(editEntry?.raw||"");
  const [shaped, setShaped]   = useState(editEntry?.shaped||"");
  const [heading, setHeading] = useState(editEntry?.heading||"");
  const [mood, setMood]       = useState(editEntry?.mood||"");
  const [mode, setMode]       = useState(editEntry?"shaped":"raw");
  const [shaping, setShaping] = useState(false);
  const [listening, setListening] = useState(false);
  const [speechAvail, setSpeechAvail] = useState(false);
  const [speechError, setSpeechError] = useState("");
  const [interimText, setInterimText] = useState("");

  const recRef = useRef(null);
  const textareaRef = useRef(null);
  const rawRef = useRef(raw);
  const listeningRef = useRef(false);
  useEffect(()=>{ rawRef.current=raw; }, [raw]);
  useEffect(()=>{ listeningRef.current=listening; }, [listening]);
  useEffect(()=>{ setSpeechAvail(!!(window.SpeechRecognition||window.webkitSpeechRecognition)); }, []);
  useEffect(()=>{
    if (textareaRef.current) { textareaRef.current.style.height="auto"; textareaRef.current.style.height=textareaRef.current.scrollHeight+"px"; }
  }, [raw, shaped]);

  const startListening = () => {
    setSpeechError("");
    const rec=getSpeechRecognition(); if(!rec){ setSpeechError("Voice not supported. Try Chrome."); return; }
    recRef.current=rec; let finalSoFar=rawRef.current;
    rec.onstart=()=>{ setListening(true); listeningRef.current=true; };
    rec.onresult=(event)=>{
      let interim="",newFinal="";
      for(let i=event.resultIndex;i<event.results.length;i++){ const t=event.results[i][0].transcript; if(event.results[i].isFinal) newFinal+=t+" "; else interim+=t; }
      if(newFinal){ finalSoFar=(finalSoFar+(finalSoFar.endsWith(" ")||!finalSoFar?"":" ")+newFinal).trim(); setRaw(finalSoFar); }
      setInterimText(interim);
    };
    rec.onerror=(event)=>{ const msgs={"not-allowed":"Microphone access denied.","no-speech":"No speech detected — tap mic again.","audio-capture":"No microphone found.","network":"Network error.","aborted":""}; const msg=msgs[event.error]||`Voice error: ${event.error}`; if(msg) setSpeechError(msg); setListening(false); listeningRef.current=false; setInterimText(""); };
    rec.onend=()=>{ setInterimText(""); if(listeningRef.current){ try{rec.start();}catch{setListening(false);listeningRef.current=false;} }else setListening(false); };
    try { rec.start(); } catch(err) { setSpeechError("Could not start microphone: "+err.message); setListening(false); }
  };
  const stopListening = ()=>{ listeningRef.current=false; try{recRef.current?.stop();}catch{} setListening(false); setInterimText(""); };
  const toggleListening = ()=>{ listening?stopListening():startListening(); };

  const handleShape = async () => {
    const text=raw.trim(); if(!text){ showBanner("write something first",2000); return; }
    setShaping(true);
    try { const result=await shapeEntry(text); setShaped(result.shaped); setHeading(result.heading); setMood(result.mood); setMode("shaped"); }
    catch(err) { showBanner(err.message||"something went wrong — try again",3500); }
    finally { setShaping(false); }
  };

  const handleSave = () => {
    const content=mode==="shaped"?shaped:raw;
    if (!content.trim()){ showBanner("nothing to save",2000); return; }
    if (listening) stopListening();
    const now=Date.now();
    onSave({ id:editEntry?.id||`j_${now}_${Math.random().toString(36).slice(2,8)}`, createdAt:editEntry?.createdAt||now, updatedAt:now, _v:1, raw:raw.trim(), shaped:mode==="shaped"?(shaped.trim()||undefined):undefined, heading:mode==="shaped"?(heading.trim()||undefined):undefined, mood:mode==="shaped"?(mood||undefined):undefined });
  };

  const wordCount = (mode==="shaped"?shaped:raw).trim().split(/\s+/).filter(Boolean).length;

  return (
    <div className="fade-in" style={{ maxWidth:620, margin:"0 auto", padding:"28px 18px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:28 }}>
        <button onClick={()=>{ if(listening)stopListening(); onCancel(); }} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em" }}>← back</button>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase" }}>{formatDate(editEntry?.createdAt||Date.now())}</div>
      </div>

      {shaped&&(
        <div style={{ display:"flex", gap:0, marginBottom:20, border:"1px solid var(--rule)", borderRadius:10, overflow:"hidden", background:"var(--page-warm)" }}>
          {[["raw","your words"],["shaped","shaped"]].map(([m,label])=>(
            <button key={m} onClick={()=>setMode(m)} style={{ flex:1, padding:"9px 0", background:mode===m?"var(--ink)":"transparent", color:mode===m?"var(--page)":"var(--ink-soft)", border:"none", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:13, letterSpacing:"0.08em" }}>{label}</button>
          ))}
        </div>
      )}

      {mode==="shaped"&&(
        <input value={heading} onChange={e=>setHeading(e.target.value)} placeholder="heading…"
          style={{ width:"100%", background:"transparent", border:"none", borderBottom:"1px solid var(--rule)", padding:"8px 0", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:20, color:"var(--ink-soft)", letterSpacing:"0.03em", marginBottom:14 }}/>
      )}
      {mode==="shaped"&&(
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:18 }}>
          {Object.keys(MOOD_COLORS).map(m=><button key={m} onClick={()=>setMood(mood===m?"":m)} style={{ padding:"3px 12px", borderRadius:20, border:`1px solid ${mood===m?MOOD_COLORS[m]:"var(--rule)"}`, background:mood===m?MOOD_COLORS[m]+"22":"transparent", color:mood===m?MOOD_COLORS[m]:"var(--ink-faint)", fontSize:11, letterSpacing:"0.1em", fontFamily:"'Cormorant Garamond',serif", cursor:"pointer", textTransform:"uppercase" }}>{m}</button>)}
        </div>
      )}

      <div style={{ position:"relative", background:"var(--page)", borderRadius:12, border:"1px solid var(--rule)", padding:"20px 20px 56px", boxShadow:"0 2px 12px rgba(43,32,22,0.06)" }}>
        <div style={{ position:"absolute", inset:0, backgroundImage:"repeating-linear-gradient(to bottom,transparent 0px,transparent 27px,var(--rule) 27px,var(--rule) 28px)", backgroundPosition:"0 52px", opacity:0.4, borderRadius:12, pointerEvents:"none" }}/>
        <textarea ref={textareaRef}
          value={(mode==="shaped"?shaped:raw)+(interimText?" "+interimText:"")}
          onChange={e=>{ if(mode==="shaped") setShaped(e.target.value); else setRaw(e.target.value); }}
          placeholder={mode==="shaped"?"edit your entry…":listening?"listening… speak freely":"write, or tap the mic to speak…"}
          style={{ position:"relative", zIndex:1, width:"100%", minHeight:280, background:"transparent", border:"none", fontFamily:"'Lora',Georgia,serif", fontSize:16, lineHeight:"28px", color:"var(--ink)", padding:0, letterSpacing:"0.01em" }}/>
        <div style={{ position:"absolute", bottom:14, right:16, fontSize:11, color:"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif" }}>{wordCount} {wordCount===1?"word":"words"}</div>
      </div>

      {speechError&&<div style={{ marginTop:10, padding:"8px 14px", background:"#b8503018", border:"1px solid #b8503044", borderRadius:8, fontSize:12, color:"#b85030", fontFamily:"'Cormorant Garamond',serif" }}>{speechError}<button onClick={()=>setSpeechError("")} style={{ float:"right", background:"none", border:"none", color:"#b85030", cursor:"pointer", fontSize:16 }}>×</button></div>}

      <div style={{ display:"flex", gap:10, marginTop:16, alignItems:"center" }}>
        {speechAvail&&mode==="raw"&&(
          <button onClick={toggleListening} className={listening?"mic-recording":""} style={{ width:46, height:46, borderRadius:"50%", border:`2px solid ${listening?"#b85030":"var(--rule)"}`, background:listening?"#b8503018":"var(--page-warm)", cursor:"pointer", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.2s" }} title={listening?"stop recording":"speak your entry"}>{listening?"◼":"🎙"}</button>
        )}
        {mode==="raw"&&raw.trim()&&!shaping&&(
          <button onClick={handleShape} style={{ flex:1, padding:"12px 0", borderRadius:10, border:"1px solid var(--accent)", background:"transparent", color:"var(--accent)", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.08em", cursor:"pointer" }}>shape with Claude ✦</button>
        )}
        {shaping&&<div style={{ flex:1, padding:"12px 0", textAlign:"center", fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-faint)", fontStyle:"italic" }}>shaping your words…</div>}
        <button onClick={handleSave} disabled={!(mode==="shaped"?shaped:raw).trim()} style={{ flex:mode==="raw"&&raw.trim()?0:1, padding:"12px 20px", borderRadius:10, border:"none", background:(mode==="shaped"?shaped:raw).trim()?"var(--ink)":"var(--rule)", color:(mode==="shaped"?shaped:raw).trim()?"var(--page)":"var(--ink-ghost)", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.08em", cursor:(mode==="shaped"?shaped:raw).trim()?"pointer":"default", flexShrink:0, transition:"all 0.2s" }}>save entry</button>
      </div>
    </div>
  );
}

// ── ENTRY VIEW ────────────────────────────────────────────────────────────────
function EntryView({ entry, allEntries, onBack, onDelete, onExport, onEdit, onThread }) {
  const label = entryLabel(entry, allEntries);
  const paragraphs = (entry.shaped||entry.raw||"").split(/\n\n+/).filter(p=>p.trim());

  return (
    <div className="fade-in" style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column", alignItems:"center", padding:"32px 20px 60px" }}>
      <div style={{ width:"100%", maxWidth:640, display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:28 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em" }}>← journal</button>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={onEdit} style={{ background:"none", border:"1px solid var(--rule)", borderRadius:8, padding:"6px 12px", cursor:"pointer", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.06em" }}>edit</button>
          <button onClick={onExport} style={{ background:"none", border:"1px solid var(--rule)", borderRadius:8, padding:"6px 12px", cursor:"pointer", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.06em" }}>export ↓</button>
          <button onClick={onDelete} style={{ background:"none", border:"1px solid #b8503044", borderRadius:8, padding:"6px 12px", cursor:"pointer", color:"#b85030", fontFamily:"'Cormorant Garamond',serif", fontSize:12, letterSpacing:"0.06em" }}>delete</button>
        </div>
      </div>

      <div className="entry-page page-reveal" style={{ width:"100%", maxWidth:600, padding:"56px 52px 72px 96px", borderRadius:2 }}>
        <div style={{ position:"relative", zIndex:1 }}>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, fontWeight:300, letterSpacing:"0.14em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:6 }}>{label}</div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, fontWeight:300, letterSpacing:"0.12em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:32 }}>{formatTime(entry.createdAt)}</div>
          {entry.mood&&<div style={{ fontSize:11, letterSpacing:"0.18em", color:MOOD_COLORS[entry.mood]||"var(--ink-faint)", textTransform:"uppercase", fontFamily:"'Cormorant Garamond',serif", marginBottom:10 }}>{entry.mood}</div>}
          {entry.heading&&<div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:22, fontWeight:300, fontStyle:"italic", color:"var(--ink-soft)", lineHeight:1.55, marginBottom:36, paddingBottom:28, borderBottom:"1px solid var(--rule)" }}>{entry.heading}</div>}
          <div>
            {paragraphs.map((p,i)=>{
              const isEmphasis=p.startsWith("*")&&p.endsWith("*")&&(p.match(/\*/g)||[]).length===2;
              const text=isEmphasis?p.slice(1,-1):p;
              const renderInline=(str)=>{ const parts=str.split(/(\*[^*]+\*)/g); if(parts.length===1) return str; return parts.map((part,j)=>part.startsWith("*")&&part.endsWith("*")?<em key={j} style={{ fontStyle:"italic", color:"var(--ink-soft)" }}>{part.slice(1,-1)}</em>:part); };
              return <p key={i} style={{ fontSize:16.5, lineHeight:1.95, color:isEmphasis?"var(--ink-soft)":"var(--ink)", fontStyle:isEmphasis?"italic":"normal", marginBottom:24, fontFamily:"'Lora',Georgia,serif" }}>{isEmphasis?text:renderInline(text)}</p>;
            })}
          </div>
          <div style={{ marginTop:48, textAlign:"right", fontFamily:"'Cormorant Garamond',serif", fontStyle:"italic", fontSize:17, color:"var(--ink-faint)" }}>— A.</div>
          {entry.shaped&&entry.raw&&(
            <details style={{ marginTop:40 }}>
              <summary style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.14em", color:"var(--ink-ghost)", textTransform:"uppercase", cursor:"pointer" }}>original words</summary>
              <p style={{ marginTop:12, fontFamily:"'Lora',serif", fontSize:13, color:"var(--ink-faint)", lineHeight:1.8, fontStyle:"italic" }}>{entry.raw}</p>
            </details>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SETTINGS VIEW ─────────────────────────────────────────────────────────────
function SettingsView({ syncConfig, lockConfig, onSave, onSaveLock, onBack, exportJSON, importJSON, showBanner, showConfirm, closeModal }) {
  const [url, setUrl]       = useState(syncConfig?.url||"");
  const [key, setKey]       = useState(syncConfig?.anonKey||"");
  const [userId, setUserId] = useState(syncConfig?.userId||"");
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const testConnection = async () => {
    const u=url.trim(),k=key.trim(),id=userId.trim();
    if(!u||!k||!id){ setTestResult({ok:false,msg:"fill in all three fields first"}); return; }
    setTesting(true); setTestResult(null);
    try {
      const data = await supabaseFetch(u,k,`/journal_data?user_id=eq.${encodeURIComponent(id)}&select=updated_at&limit=1`);
      setTestResult({ok:true, msg:data&&data.length?"connected ✓ — found existing data":"connected ✓ — ready to sync"});
    } catch(err) { setTestResult({ok:false, msg:`connection failed: ${err.message}`}); }
    finally { setTesting(false); }
  };

  const clearSync = () => {
    showConfirm({
      message: "remove sync settings?",
      subtext: "your local entries are safe.",
      confirmText: "remove",
      cancelText: "cancel",
      danger: true,
      onConfirm: () => { closeModal(); setUrl(""); setKey(""); setUserId(""); onSave(null); }
    });
  };

  const handleSave = () => {
    const u=url.trim(),k=key.trim(),id=userId.trim();
    if(u&&k&&id) onSave({url:u,anonKey:k,userId:id});
    else if(!u&&!k&&!id) onSave(null);
    else showBanner("fill in all three fields, or clear all to disable sync",3000);
  };

  return (
    <div className="fade-in" style={{ maxWidth:520, margin:"0 auto", padding:"32px 18px 80px" }}>
      <button onClick={onBack} style={{ background:"none", border:"none", color:"var(--ink-faint)", cursor:"pointer", fontFamily:"'Cormorant Garamond',serif", fontSize:14, letterSpacing:"0.06em", marginBottom:28 }}>← back</button>
      <div style={{ fontFamily:"'IM Fell English',serif", fontSize:22, color:"var(--ink)", fontStyle:"italic", marginBottom:6 }}>Settings</div>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:"var(--ink-faint)", marginBottom:32, lineHeight:1.6 }}>your entries live in your browser. sync is optional.</div>

      <Section title="cloud sync (supabase)">
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:12, color:"var(--ink-faint)", marginBottom:16, lineHeight:1.7 }}>
          create a free Supabase project → add a table called <code style={{background:"var(--page-deep)",padding:"1px 5px",borderRadius:4}}>journal_data</code> with columns: <code style={{background:"var(--page-deep)",padding:"1px 5px",borderRadius:4}}>user_id (text, primary key), entries_json (text), updated_at (text)</code>
        </div>
        {[
          {label:"Project URL",val:url,set:setUrl,placeholder:"https://xxxxx.supabase.co",type:"url"},
          {label:"Anon Key",val:key,set:setKey,placeholder:"eyJ…",type:"password"},
          {label:"Your User ID",val:userId,set:setUserId,placeholder:"any unique string, e.g. yourname_journal",type:"text"},
        ].map(f=>(
          <div key={f.label} style={{ marginBottom:14 }}>
            <label style={{ display:"block", fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.14em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:5 }}>{f.label}</label>
            <input type={f.type} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.placeholder}
              style={{ width:"100%", padding:"10px 12px", borderRadius:8, border:"1px solid var(--rule)", background:"var(--page-warm)", color:"var(--ink)", fontSize:13, fontFamily:"'Cormorant Garamond',serif" }}/>
          </div>
        ))}
        <div style={{ display:"flex", gap:8, marginTop:6 }}>
          <button onClick={testConnection} disabled={testing} style={{ padding:"9px 16px", borderRadius:8, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>{testing?"testing…":"test connection"}</button>
          {syncConfig&&<button onClick={clearSync} style={{ padding:"9px 16px", borderRadius:8, border:"1px solid #b8503044", background:"transparent", color:"#b85030", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>remove sync</button>}
        </div>
        {testResult&&<div style={{ marginTop:10, padding:"8px 12px", borderRadius:8, background:testResult.ok?"#5a8b6a18":"#b8503018", border:`1px solid ${testResult.ok?"#5a8b6a44":"#b8503044"}`, fontFamily:"'Cormorant Garamond',serif", fontSize:13, color:testResult.ok?"#5a8b6a":"#b85030" }}>{testResult.msg}</div>}
      </Section>

      <Section title="local backup">
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={exportJSON} style={{ flex:1, padding:"10px 0", borderRadius:8, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer" }}>export .json</button>
          <label style={{ flex:1, padding:"10px 0", borderRadius:8, border:"1px solid var(--rule)", background:"transparent", color:"var(--ink-soft)", fontFamily:"'Cormorant Garamond',serif", fontSize:13, cursor:"pointer", textAlign:"center" }}>
            import .json<input type="file" accept=".json" style={{ display:"none" }} onChange={importJSON}/>
          </label>
        </div>
      </Section>

      <button onClick={handleSave} style={{ width:"100%", padding:"13px", borderRadius:10, border:"none", background:"var(--ink)", color:"var(--page)", fontFamily:"'Cormorant Garamond',serif", fontSize:15, letterSpacing:"0.08em", cursor:"pointer", marginTop:8 }}>save settings</button>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ background:"var(--page-warm)", border:"1px solid var(--rule)", borderRadius:12, padding:18, marginBottom:16 }}>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:11, letterSpacing:"0.18em", color:"var(--ink-faint)", textTransform:"uppercase", marginBottom:14 }}>{title}</div>
      {children}
    </div>
  );
}

// ── MOUNT ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
